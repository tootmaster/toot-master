  <!-- Bundled DidgeLab source + the streamlit app, as a JSON blob -->
  <script id="bundled-files" type="application/json">{"didgelab/geo.py": "\"\"\"\nDidgeridoo geometry representation and operations for DidgeLab.\n\nA geometry is a list of segments, each (x, diameter) in mm: distance from\nmouthpiece and bore diameter. Supports loading/saving, scaling, cones,\nbubbles, volume, and interpolation of diameter along the bore.\n\"\"\"\n\nimport copy\nimport pandas as pd\nimport math\nimport json\n\n\nclass Geo:\n    \"\"\"\n    Bore geometry of a didgeridoo as a list of (x, diameter) segments in mm.\n\n    Attributes:\n        geo: List of [x, d] with x = distance from mouthpiece, d = diameter.\n    \"\"\"\n\n    def __init__(self, geo=None, infile=None):\n        self.geo=[]\n\n        if infile != None:\n            self.geo = self.read_geo(infile)\n\n        if geo != None:\n            self.geo=geo\n\n        # remove zero length segments\n        clean_geo=[]\n        for i in range(0, len(self.geo)):\n            if i>0 and self.geo[i][0]==self.geo[i-1][0]:\n                continue\n            clean_geo.append(self.geo[i])\n        self.geo = clean_geo\n\n    @classmethod\n    def make_cone(cls, length, d1, d2, n_segments):\n        \"\"\"Build a conical bore: length (mm), diameters d1 (mouth), d2 (bell), n_segments.\"\"\"\n        shape=[]\n        shape.append([0, d1])\n\n        z=(d2-d1)/2\n        angle=math.atan(z/length)\n        for i in range(1, n_segments):\n            x=length*i/(n_segments-1)\n            y=2*x*math.tan(angle) + d1\n            shape.append([x,y])\n        return Geo(geo=shape)\n\n    def read_geo(self, infile):\n        \"\"\"Load geometry from a JSON file (list of [x, d] pairs).\"\"\"\n        f=open(infile)\n        geo = json.load(f)\n        f.close()\n        return geo\n\n    def write_geo(self, outfile):\n        \"\"\"Write geometry to a text file (one 'x d' line per segment).\"\"\"\n        f=open(outfile, \"w\")\n        for segment in self.geo:\n            seg=f\"{segment[0]:.10f} {segment[1]:.10f}\\n\"\n            f.write(seg)\n        f.close()\n\n    def stretch(self, factor):\n        \"\"\"Scale all x (length) by factor; diameters unchanged.\"\"\"\n        for i in range(0, len(self.geo)):\n            self.geo[i][0]*=factor\n\n    def copy(self):\n        geo=copy.deepcopy(self.geo)\n        return Geo(geo=geo)\n\n    def scale(self, factor):\n        \"\"\"Scale all x and diameter by factor (e.g. mm to m).\"\"\"\n        for i in range(0, len(self.geo)):\n            self.geo[i][0]*=factor\n            self.geo[i][1] *= factor\n\n    def make_bubble(self, pos, width, height):\n        \"\"\"Insert a bulge (bubble) at position pos with given width and height.\"\"\"\n        index=0\n        for i in range(len(self.geo)):\n            if self.geo[i+1][0]>pos:\n                index=i\n                break\n        \n        left=self.geo[0:index+1]\n        right=self.geo[index+1:]\n        new_geo=left + [\n            [pos-width/2, self.geo[index][1]],\n            [pos, height],\n            [pos+width/2, self.geo[index+1][1]],\n        ] + right\n        self.geo = new_geo\n\n    def move_segments_x(self, start, end, offset):\n        \"\"\"Shift x-coordinates of segments [start..end] by offset.\"\"\"\n        for i in range(start, end+1):\n            self.geo[i][0]+=offset\n            pass\n\n    def length(self):\n        \"\"\"Total length in mm (x of last segment).\"\"\"\n        return self.geo[-1][0]\n\n    def bellsize(self):\n        \"\"\"Bell diameter in mm (diameter of last segment).\"\"\"\n        return self.geo[-1][1]\n\n    def segments_to_str(self):\n        df={}\n        for x in [\"x\", \"y\"]:\n            df[x]=[]\n        for i in range(0, len(self.geo)):\n            df[\"x\"].append(int(self.geo[i][0]))\n            df[\"y\"].append(int(self.geo[i][1]))\n        df=pd.DataFrame(df)\n        return str(df)\n\n    def sort_segments(self):\n        \"\"\"Sort segments by x (distance from mouthpiece).\"\"\"\n        self.geo = sorted(self.geo, key=lambda x: x[0])\n\n    def diameter_at_x(self, x):\n        \"\"\"Interpolated bore diameter at position x (mm).\"\"\"\n        return Geo.diameter_at_x(self, x)\n\n    def compute_volume(self):\n        \"\"\"Approximate internal volume in mm³ (trapezoidal rule along bore).\"\"\"\n        v = 0\n        for i in range(1, len(self.geo)):\n            l = self.geo[i][0] - self.geo[i-1][0]\n            v+= l*self.geo[i-1][1]\n            v += l*(self.geo[i][1] - self.geo[i-1][1])\n        \"\"\"Approximate internal volume (mm³) using trapezoidal rule.\"\"\"\n        return v\n\n    @staticmethod\n    def scale_length(geo, max_length):\n        \"\"\"Scale geometry length to max_length (factor applied to x only).\"\"\"\n        factor = max_length / geo.length()\n        for i in range(len(geo.geo)):\n            geo.geo[i][0]*=factor\n        return geo\n\n    @staticmethod\n    def get_max_d(geo):\n        \"\"\"Maximum bore diameter in geometry (mm).\"\"\"\n        return max([x[1] for x in geo.geo])\n\n    @staticmethod\n    def scale_diameter(geo, max_d):\n        \"\"\"Scale diameters so maximum diameter becomes max_d.\"\"\"\n        didge_d = Geo.get_max_d(geo)\n        factor=max_d/didge_d\n        for i in range(1,len(geo.geo)):\n            geo.geo[i][1]*=factor\n        return geo\n\n    @staticmethod\n    def print_geo_summary(geo, peak=None, loss=None):\n        \"\"\"Format a short text summary of the geometry (and optional peak/loss).\"\"\"\n        s = f\"length:\\t\\t{geo.length():.2f}\\n\"\n        s+=f\"bell size:\\t{geo.geo[-1][1]:.2f}\\n\"\n        s+=f\"num segments:\\t{len(geo.geo)}\\n\"\n\n        if peak is not None:\n            s+=f\"num peaks:\\t{len(peak)}\\n\"\n        if loss != None:\n            s+=f\"loss:\\t\\t{loss:.2f}\\n\"\n            \n        s+=str(peak)\n        return s\n\n    @staticmethod\n    def geo_to_json(geo):\n        return geo.geo\n\n    @staticmethod\n    def json_to_geo(geo_json):\n        return Geo(geo=geo_json)\n\n    @staticmethod\n    def diameter_at_x(geo, x):\n        \"\"\"Return interpolated bore diameter at position x (mm). geo may be Geo or list of segments.\"\"\"\n        if type(geo) == Geo:\n            geo=geo.geo\n\n        assert x<=geo[-1][0]\n\n        if x==0:\n            return geo[0][1]\n\n        for i in range(len(geo)):\n            if x<geo[i][0]:\n                break\n\n        x1=geo[i-1][0]\n        y1=geo[i-1][1]\n        x2=geo[i][0]\n        y2=geo[i][1]\n\n        ydiff=(y2-y1)/2\n        xdiff=(x2-x1)\n\n        winkel=math.atan(ydiff/xdiff)\n        y=math.tan(winkel)*(x-x1)*2+y1\n        return y\n\n    @staticmethod\n    def fix_zero_length_segments(geo):\n        \"\"\"Remove segments that have zero length (same x as previous).\"\"\"\n        fix = None\n        new_geo=[geo.geo[0]]\n        for i in range(1, len(geo.geo)):\n            if geo.geo[i][0]-new_geo[-1][0] > 0:\n                new_geo.append(geo.geo[i])\n        return Geo(new_geo)\n\n", "didgelab/acoustical_simulation.py": "\"\"\"\nAcoustical simulation entry point for DidgeLab.\n\nThis module provides a single function to run the transmission-line-based\nacoustical simulation for a didgeridoo geometry over a set of frequencies.\nIt is used for computing impedance spectra and resonant frequencies (e.g. drone\nand toot peaks). The simulation model follows transmission-line theory and\nCADSD-style implementations (see `didgelab.sim.tlm_python` and `didgelab.sim.tlm_cython`).\n\"\"\"\n\nfrom didgelab import sim\nfrom .sim.sim_interface import AcousticSimulationInterface\nfrom .geo import Geo\nimport numpy as np\nimport pandas as pd\nfrom scipy.signal import argrelextrema\nfrom .conv import *\n\ndef acoustical_simulation(\n    geo: Geo,\n    frequencies: np.ndarray,\n    simulation_method: str = \"tlm_cython\",\n):\n    \"\"\"\n    Compute acoustic impedance at the given frequencies for a didgeridoo geometry.\n\n    Uses a transmission-line model of the bore. Impedance peaks correspond to\n    resonances (drone, toots). The result has the same length as `frequencies`.\n\n    Args:\n        geo: Didgeridoo geometry (bore profile as list of segments). Instance of\n            `didgelab.geo.Geo` with `geo.geo` as list of `[x_mm, diameter_mm]`.\n        frequencies: 1D array of frequencies in Hz at which to evaluate impedance.\n        simulation_method: Which backend to use. `\"tlm_python\"` uses the pure-Python\n            implementation; `\"tlm_cython\"` uses the compiled Cython extension (faster,\n            requires a successful build of `didgelab.sim.tlm_cython_lib._cadsd`).\n\n    Returns:\n        Impedance magnitude at each frequency, in the same order as `frequencies`.\n        Type matches the backend (list or array); length equals `len(frequencies)`.\n\n    Raises:\n        Exception: If `simulation_method` is not `\"tlm_python\"` or `\"tlm_cython\"`.\n\n    Example:\n        >>> from didgelab.acoustical_simulation import acoustical_simulation\n        >>> from didgelab.geo import Geo\n        >>> import numpy as np\n        >>> geo = Geo([[0, 32], [1200, 60]])  # 1.2 m cone, 32 mm mouth, 60 mm bell\n        >>> freqs = np.array([73, 150, 300])\n        >>> imp = acoustical_simulation(geo, freqs, simulation_method=\"tlm_python\")\n        >>> len(imp) == 3\n        True\n    \"\"\"\n    if simulation_method == \"tlm_python\":\n        from .sim.tlm_python import TransmissionLineModelPython\n        simulator = TransmissionLineModelPython()\n        return simulator.get_impedance_spectrum(geo, frequencies)\n    elif simulation_method == \"tlm_cython\":\n        from .sim.tlm_cython import TransmissionLineModelCython\n        simulator = TransmissionLineModelCython()\n        return simulator.get_impedance_spectrum(geo, frequencies)\n    elif simulation_method == \"1d_fem\":\n        from .sim.fem import FiniteElementsModeling1D\n        simulator = FiniteElementsModeling1D()\n        return simulator.get_impedance_spectrum(geo, frequencies)\n    else:\n        raise Exception(f\"Unknown simulation backend \\\"{simulation_method}\\\"\")\n\n\n# helper function for compute_ground\ndef _get_closest_index(freqs, f):\n    \"\"\"\n    Return the index in `freqs` whose value is closest to `f`.\n\n    Assumes `freqs` is sorted ascending. If `f` is above the maximum frequency,\n    returns the last index (or len(freqs) when f > freqs[-1]).\n\n    Args:\n        freqs: 1D array of frequencies in Hz (ascending).\n        f: Target frequency in Hz.\n\n    Returns:\n        int: Index such that freqs[index] is closest to f.\n    \"\"\"\n    for i in range(len(freqs)):\n        m2=np.abs(freqs[i]-f)\n        if i==0:\n            m1=m2\n            continue\n        if m2>m1:\n            return i-1\n        m1=m2\n\n    if f>freqs[-1]:\n        return len(freqs)\n    else:\n        return len(freqs)-1\n\n# helper function for compute_ground\n# find first maximum in a list of numbers\ndef _find_first_maximum_index(impedance):\n\n    peaks=[0,0]\n    vally=[0,0]\n\n    up = 0\n    npeaks = 0\n    nvally = 0\n\n    for i in range(1, len(impedance)):\n        if impedance[i] > impedance[i-1]:\n            if npeaks and not up:\n                vally[nvally] = i - 1\n                nvally+=1\n            up = 1\n        else:\n            if up:\n                peaks[npeaks] = i - 1\n                npeaks+=1\n            up = 0\n        if nvally > 1:\n            break\n\n    if peaks[0]<0:\n        raise Exception(\"bad fft\")\n\n    return peaks[0]\n\n        \n# compute ground spektrum from impedance spektrum\n# warning: frequencies must be evenly spaced\ndef compute_ground_spektrum(freqs, impedance):\n    \"\"\"\n    Compute a \"ground\" spectrum (envelope / baseline) from an impedance spectrum.\n\n    Used for visualization or analysis of the resonance envelope. The algorithm\n    builds a baseline from the fundamental and its harmonics, then returns\n    values in dB (20*log10 of a scaled product of impedance and ground).\n\n    Args:\n        freqs: 1D array of frequencies in Hz. Must be evenly spaced.\n        impedance: 1D array of impedance magnitude at each frequency (same length as freqs).\n\n    Returns:\n        np.ndarray: Ground spectrum in dB, same length as freqs.\n    \"\"\"\n\n    impedance = impedance.copy() / 1e-6\n    fmin = 1\n    fmax = freqs[-1]\n    fundamental_i = _find_first_maximum_index(impedance)\n    fundamental_freq = freqs[fundamental_i]\n\n    ground = np.zeros(len(freqs))\n    indizes = np.concatenate((np.arange(1,fundamental_freq), np.arange(fundamental_freq,fmin-1,-1)))\n    window_right = impedance[indizes]\n\n    k = 0.0001\n    for i in range(fundamental_freq, fmax, fundamental_freq):\n\n        il = _get_closest_index(freqs, i-fundamental_freq+1)\n        ir = np.min((len(freqs)-1, il+len(window_right)))\n\n        window_left = impedance[il:ir]\n        if ir-il!=len(window_right):\n            window_right = window_right[0:ir-il]\n\n        ground[il:ir] += window_right*np.exp(i*k)\n\n    for i in range(len(ground)):\n        ground[i] = impedance[i] * ground[i] * 1e-6\n\n    for i in range(len(ground)):\n        x=ground[i]*2e-5\n        ground[i] = 0 if x<1 else 20*np.log10(x) \n        # impedance[i] *= 1e-6\n\n    return np.array(ground)\n\ndef get_log_simulation_frequencies(fmin: float = 30.0, fmax: float = 1000.0, max_error: float = 5):\n    \"\"\"\n    Generate a logarithmically spaced set of frequencies for simulation.\n\n    Frequencies are distributed so that the maximum error (e.g. in cents) between\n    adjacent points is bounded by max_error. Useful for efficient impedance\n    sweeps with roughly constant resolution per octave.\n\n    Args:\n        fmin: Minimum frequency in Hz.\n        fmax: Maximum frequency in Hz.\n        max_error: Target maximum error (used to derive step size; 1200 steps per octave\n            are scaled by max_error).\n\n    Returns:\n        np.ndarray: 1D array of frequencies in Hz, ascending, all <= fmax.\n    \"\"\"\n    frequencies = []\n    stepsize = max_error/1200\n    start_freq = fmin\n    end_freq = start_freq\n    octave = 0\n\n    while end_freq < fmax:\n        notes = np.arange(0,1,stepsize) + octave\n        frequencies.extend(start_freq*np.power(2, notes))\n        end_freq = frequencies[-1]\n        octave += 1\n        \n    frequencies = np.array(list(filter(lambda x:x<=fmax, frequencies)))\n    return frequencies\n\n\n\n# compute the impedance spektrum iteratively with high precision only\n# around the peaks\nimpedance_iteratively_start_freqs = None\ndef compute_impedance_iteratively(geo: Geo, fmax=1000, n_precision_peaks=3, simulation_method='tlm_cython'):\n    \"\"\"\n    Compute the impedance spectrum with adaptive resolution around peaks.\n\n    Runs an initial coarse simulation, then refines with a denser frequency grid\n    around the first few impedance peaks (e.g. drone and toots) to improve\n    accuracy there. Results are merged and sorted by frequency.\n\n    Args:\n        geo: Didgeridoo geometry (instance of didgelab.geo.Geo).\n        fmax: Maximum frequency in Hz for the sweep (default 1000).\n        n_precision_peaks: Number of peaks to refine with denser sampling (default 3).\n        simulation_method: Backend for the transmission-line simulation\n            ('tlm_python' or 'tlm_cython', default 'tlm_cython').\n\n    Returns:\n        tuple: (freqs, impedances) — 1D arrays of frequencies in Hz and\n            impedance magnitudes, sorted by frequency.\n    \"\"\"\n    # start simulation with a low grid size\n    global impedance_iteratively_start_freqs\n    if impedance_iteratively_start_freqs is None:\n        impedance_iteratively_start_freqs = np.concatenate((\n            np.arange(1,50,10),\n            np.arange(50, 100, 5),\n            get_log_simulation_frequencies(fmin=101, fmax=fmax, max_error=10)\n        ))\n    freqs = [impedance_iteratively_start_freqs]\n\n    impedances = acoustical_simulation(geo, freqs, simulation_method=simulation_method)\n\n    # compute a preciser simulation at the peaks\n    extrema = get_max(impedances[0])\n    for i in range(np.min((n_precision_peaks, len(extrema)))):\n        f = freqs[0][extrema[i]]\n        extra_freqs = get_log_simulation_frequencies(fmin=0.9*f, fmax=1.1*f, max_error=2)\n        impedances.append(acoustical_simulation(geo, freqs, simulation_method=simulation_method))\n        freqs.append(extra_freqs)\n\n    # join and sort\n    impedances = np.concatenate(impedances)\n    freqs = np.concatenate(freqs)\n    i = np.arange(len(impedances))\n    i = sorted(i, key=lambda x : freqs[x])\n    freqs=freqs[i]\n    impedances=impedances[i]\n\n    return freqs, impedances\n\n# interpolate the spectrum that is evenly spaced from freq 1 - fmax\ndef interpolate_spectrum(freqs, impedances):\n    \"\"\"\n    Interpolate an impedance spectrum onto an integer grid from 1 Hz to fmax.\n\n    Produces linearly interpolated impedance values at every integer frequency\n    from 1 to the maximum of freqs. Useful for downstream functions that expect\n    evenly spaced data (e.g. compute_ground_spektrum).\n\n    Args:\n        freqs: 1D array of frequencies in Hz (ascending).\n        impedances: 1D array of impedance magnitude at each frequency (same length as freqs).\n\n    Returns:\n        tuple: (freq_interpolated, impedance_interpolated) — 1D arrays with\n            freq_interpolated = [1, 2, ..., int(freqs[-1])] and interpolated impedances.\n    \"\"\"\n    freq_interpolated = np.arange(1, int(np.round(freqs[-1])))\n    impedance_interpolated = [impedances[0]]\n\n    i_orig=1\n    f_ip = 2\n    last_point=0\n    while i_orig<len(freqs):\n\n        if freqs[i_orig]>=f_ip or i_orig==len(freqs)-1:\n            dx = freqs[i_orig]-freqs[last_point]\n            a = (impedances[i_orig]-impedances[last_point]) / dx\n\n            while freqs[i_orig]>=f_ip:\n                val = a*(f_ip-freqs[last_point]) + impedances[last_point]\n                impedance_interpolated.append(val)\n                f_ip +=1\n\n            last_point = i_orig\n\n        i_orig += 1\n\n    return freq_interpolated, np.array(impedance_interpolated)\n\n# get a pandas table about the notes from the resonant spectrum\n# you can pass a different base_freq for alternative, non-440 hz tuning\n# you can also pass target_freqs to include the deviation from the target into the note list\ndef get_notes(freqs, impedances, base_freq=440, target_freqs=None):\n    \"\"\"\n    Build a table of notes from the resonant peaks of an impedance spectrum.\n\n    Detects local maxima in the impedance, converts their frequencies to note\n    names and cent deviations from the nearest semitone, and returns a pandas\n    DataFrame. Optionally adds a target column with deviation from given target\n    frequencies (e.g. for tuning comparison).\n\n    Args:\n        freqs: 1D array of frequencies in Hz.\n        impedances: 1D array of impedance magnitude (same length as freqs).\n        base_freq: Reference frequency in Hz for note conversion (default 440).\n        target_freqs: Optional 1D array of target frequencies in Hz; if provided,\n            adds a \"target\" column with note name and cent deviation from nearest target.\n\n    Returns:\n        pd.DataFrame: Columns include note_name, cent_diff, note_nr, freq, impedance,\n            rel_imp (impedance relative to max), and optionally target.\n    \"\"\"\n    extrema = argrelextrema(impedances, np.greater)\n    peak_freqs = freqs[extrema]\n    note_and_cent = [freq_to_note_and_cent(f, base_freq=base_freq) for f in peak_freqs]\n\n    peaks = {\n        \"note_name\": [note_name(n[0]) for n in note_and_cent],\n        \"cent_diff\": [n[1] for n in note_and_cent],\n        \"note_nr\": [n[0] for n in note_and_cent],\n        \"freq\": peak_freqs,\n        \"impedance\": impedances[extrema],\n    }\n\n    peaks = pd.DataFrame(peaks)\n    peaks[\"rel_imp\"] = peaks.impedance / peaks.impedance.max()\n\n    if target_freqs is not None:\n        targets = []\n        for freq in peak_freqs:\n            i = np.argmin(np.abs(freq-target_freqs))\n            target = target_freqs[i]\n            target_note = note_name(freq_to_note(target))\n            cent = cent_diff(target, freq)\n            sign = \"+\" if cent>0 else \"\"\n            cent = f\"{sign}{cent:.2f}\"\n            targets.append(f\"{target_note} ({cent})\")\n        peaks[\"target\"] = targets\n\n    return peaks\n\ndef quick_analysis(geo: Geo, fmin=1, fmax=1000, max_error=5, base_freq=440, simulation_method='tlm_cython'):\n    \"\"\"\n    Run a full analysis pipeline: impedance sweep, note table, and ground spectrum.\n\n    Computes the impedance spectrum over a log-spaced frequency grid, extracts\n    resonant notes (peaks), interpolates to an integer grid, and computes the\n    ground spectrum. Convenience function for a single geometry.\n\n    Args:\n        geo: Didgeridoo geometry (instance of didgelab.geo.Geo).\n        fmin: Minimum frequency in Hz (default 1).\n        fmax: Maximum frequency in Hz (default 1000).\n        max_error: Parameter for log-spaced frequency resolution (default 5).\n        base_freq: Reference frequency in Hz for note conversion (default 440).\n        simulation_method: 'tlm_python' or 'tlm_cython' (default 'tlm_cython').\n\n    Returns:\n        dict: Keys \"freqs\", \"impedance\", \"notes\" (DataFrame), \"ground_freqs\",\n            \"ground_spectrum\" (array in dB).\n    \"\"\"\n    freqs = get_log_simulation_frequencies(fmin, fmax, max_error)\n    impedance = acoustical_simulation(geo, freqs, simulation_method=simulation_method)\n    notes = get_notes(freqs, impedance, base_freq=base_freq)\n    ground_freqs, imp_ip = interpolate_spectrum(freqs, impedance)\n    ground = compute_ground_spektrum(ground_freqs, imp_ip)\n    result = {\n        \"freqs\": freqs,\n        \"impedance\": impedance,\n        \"notes\": notes,\n        \"ground_freqs\": ground_freqs,\n        \"ground_spectrum\": ground\n    }\n    return result\n\n\ndef get_fundamental(geo : Geo, simulation_method : str ='tlm_cython', min_peak_f : float = 50.0):\n    \"\"\"Return frequency and fundamental of the fundamental of the didgeridoo.\n\n    Args:\n        geo (Geo): Didgeridoo geometry\n        simulation_method (str, optional): Acoustical simulation method. Defaults to 'tlm_cython'.\n        min_peak_f (float, optional): Minimum frequency of the fundamental. Defaults to 50.0.\n\n    Returns:\n        _type_: _description_\n    \"\"\"\n    freqs = get_log_simulation_frequencies()\n    impedances = acoustical_simulation(geo, freqs, simulation_method)\n    i_peaks = find_peaks(impedances)[0]\n    \n    peak_f = freqs[i_peaks]\n    i_peak = i_peaks[np.arange(len(peak_f))[peak_f > min_peak_f][0]]\n    return freqs[i_peak], impedances[i_peak]\n    ", "didgelab/__init__.py": "\"\"\"\nDidgeLab: acoustical simulation and computer-aided design of didgeridoos.\n\nImport from the root for the main API, e.g.::\n\n    from didgelab import Nuevolution, Geo, GeoGenome, SimpleMutation\n    from didgelab import acoustical_simulation, vis_didge\n\nSubmodules (for more specific imports):\n\n- **acoustical_simulation** – run TLM simulation, get_log_simulation_frequencies, get_notes\n- **geo** – Geo (bore geometry)\n- **conv** – note/frequency conversion (note_to_freq, cent_diff)\n- **sim** – simulation backends (tlm_python, tlm_cython)\n- **evo** – evolutionary shape search (Nuevolution, genomes, operators, loss)\n- **shapes** – parametric shapes (e.g. KigaliShape.WebShape)\n- **app** – application shell, config, logging\n\"\"\"\n\nfrom .geo import Geo\nfrom .acoustical_simulation import (\n    acoustical_simulation,\n    get_log_simulation_frequencies,\n    get_notes,\n    compute_ground_spektrum,\n    get_fundamental\n)\nfrom .visualize import (\n    vis_didge,\n    plot_bore,\n    plot_impedance_spectrum,\n    plot_notes,\n    plot_geo_impedance_notes,\n)\nfrom .conv import (\n    note_to_freq,\n    freq_to_note,\n    note_name,\n    freq_to_note_and_cent,\n    freq_to_wavelength,\n    note_name_to_number,\n    cent_diff,\n)\nfrom .shapes.KigaliShape import KigaliShape\n\n# Evolution: genomes, loss, operators, evolution runner, callbacks\nfrom .evo import (\n    Genome,\n    GeoGenome,\n    GeoGenomeA,\n    LossFunction,\n    TestLossFunction,\n    MutationOperator,\n    CrossoverOperator,\n    SimpleMutation,\n    RandomMutation,\n    SingleMutation,\n    RandomCrossover,\n    AverageCrossover,\n    PartSwapCrossover,\n    PartAverageCrossover,\n    Nuevolution,\n    AdaptiveProbabilities,\n    NumpyEncoder,\n    load_latest_evolution\n)\nfrom .evo.callbacks import init_standard_evolution\n\nfrom .loss import (\n    TairuaLoss,\n    LossComponent,\n    FrequencyTuningLoss,\n    QFactorLoss,\n    ModalDensityLoss,\n    HarmonicSplittingLoss,\n    IntegerHarmonicLoss,\n    NearIntegerLoss,\n    StretchedOddLoss,\n    HighInharmonicLoss,\n    ScaleTuningLoss,\n    PeakQuantityLoss,\n    PeakAmplitudeLoss,\n    CompositeTairuaLoss,\n)\n\n__all__ = [\n    \"Geo\",\n    \"acoustical_simulation\",\n    \"get_log_simulation_frequencies\",\n    \"get_notes\",\n    \"compute_ground_spektrum\",\n    \"vis_didge\",\n    \"plot_bore\",\n    \"plot_impedance_spectrum\",\n    \"plot_notes\",\n    \"plot_geo_impedance_notes\",\n    \"note_to_freq\",\n    \"freq_to_note\",\n    \"note_name\",\n    \"freq_to_note_and_cent\",\n    \"freq_to_wavelength\",\n    \"note_name_to_number\",\n    \"cent_diff\",\n    \"KigaliShape\",\n    \"init_standard_evolution\",\n    \"Genome\",\n    \"GeoGenome\",\n    \"GeoGenomeA\",\n    \"LossFunction\",\n    \"TestLossFunction\",\n    \"MutationOperator\",\n    \"CrossoverOperator\",\n    \"SimpleMutation\",\n    \"RandomMutation\",\n    \"SingleMutation\",\n    \"RandomCrossover\",\n    \"AverageCrossover\",\n    \"PartSwapCrossover\",\n    \"PartAverageCrossover\",\n    \"Nuevolution\",\n    \"AdaptiveProbabilities\",\n    \"NumpyEncoder\",\n    \"load_latest_evolution\",\n    \"TairuaLoss\",\n    \"LossComponent\",\n    \"FrequencyTuningLoss\",\n    \"QFactorLoss\",\n    \"ModalDensityLoss\",\n    \"HarmonicSplittingLoss\",\n    \"IntegerHarmonicLoss\",\n    \"NearIntegerLoss\",\n    \"StretchedOddLoss\",\n    \"HighInharmonicLoss\",\n    \"ScaleTuningLoss\",\n    \"PeakQuantityLoss\",\n    \"PeakAmplitudeLoss\",\n    \"CompositeTairuaLoss\",\n]\n", "didgelab/fft.py": "\"\"\"\nFFT and spectrum utilities for DidgeLab.\n\nUsed to compute FFT from WAV files, find harmonic maxima, fundamental frequency,\nand peaks in impedance or audio spectra. Supports sliding-window averaging.\n\"\"\"\n\nimport numpy as np\nfrom scipy.io import wavfile\nimport scipy\n\n\ndef do_fft(infile, maxfreq=1000):\n    \"\"\"Load WAV file and return (freq, magnitude) up to maxfreq Hz. Uses left channel if stereo.\"\"\"\n    sampFreq, sound = wavfile.read(infile)\n    \n    # use only left channel if signal is stereo\n    if len(sound.shape)==2:\n        signal = sound[:,0]\n    else:\n        signal = sound\n\n    size=len(signal)\n    \n    fft_spectrum = np.fft.rfft(signal, n=size)\n    freq = np.fft.rfftfreq(size, d=1./sampFreq)\n    fft_spectrum_abs = np.abs(fft_spectrum)\n \n    i=0\n    while i<len(freq) and freq[i]<=maxfreq:\n        i+=1\n    freq = freq[0:i]\n    fft_spectrum_abs = fft_spectrum_abs[0:i]\n    return freq, fft_spectrum_abs\n\n\ndef get_harmonic_maxima(freq, spectrum, min_freq=60):\n    \"\"\"Find maxima near expected harmonics (multiples of base_freq) up to ~1000 Hz.\"\"\"\n    i = 0\n    maxima = []\n    base_freq = min_freq\n    while i*base_freq<1000:\n        if i==0:\n            window = freq>min_freq\n        else:\n            window = (freq>(i+0.5)*base_freq) & (freq<base_freq*(i+1.5))\n\n        if window.astype(int).sum() == 0:\n            break\n        window_f = freq[window]\n        window_s = spectrum[window]\n        maxi = np.argmax(window_s)\n        max_f = window_f[maxi]\n        if i==0:\n            base_freq=max_f\n\n        maxima.append(max_f)\n        i += 1\n    return maxima\n\n\ndef sling_window_average_spectrum(freq, spectrum, window_size=5):\n    \"\"\"Downsample spectrum by averaging over sliding windows (window_size points).\"\"\"\n    new_freqs = []\n    new_spectrum = []\n    \n    for i in np.arange(window_size, len(freq), window_size):\n        new_freqs.append(freq[i])\n        new_spectrum.append(np.mean(spectrum[i - window_size:i]))\n    return np.array(new_freqs), np.array(new_spectrum)\n\n\ndef get_fundamental(fft_freq, fft, minfreq=50, maxfreq=120, order=40):\n    \"\"\"Find fundamental as the largest local maximum in [minfreq, maxfreq] (argrelextrema order=order).\"\"\"\n    i = scipy.signal.argrelextrema(fft, np.greater, order=order)\n    freqs = fft_freq[i]\n    freqs = freqs[freqs>minfreq]\n    freqs = freqs[freqs<maxfreq]\n    assert len(freqs) == 1\n\n    fundamental_freq = freqs[0]\n    fundamental_freq_i = np.argmin(np.abs(fft_freq - fundamental_freq))\n    return fundamental_freq, fundamental_freq_i\n\n\ndef get_peaks(fft_freq, fft, return_indizes=False):\n    \"\"\"Peaks in fft above fundamental (within ~1.3x fundamental); optionally return indices.\"\"\"\n    fundamental_freq, fundamental_freq_i = get_fundamental(fft_freq, fft)\n    order = 1\n    while fft_freq[fundamental_freq_i+order] < fundamental_freq*1.3:\n        order += 1\n    peaks = [fundamental_freq]\n    indizes = []\n    for i in scipy.signal.argrelextrema(fft, np.greater, order=order)[0]:\n        freq = fft_freq[i]\n        indizes.append(i)\n        if freq>fundamental_freq:\n            peaks.append(freq)\n    if return_indizes:\n        return np.array(peaks), indizes\n    else:\n        return np.array(peaks)\n", "didgelab/conv.py": "\"\"\"\nMusical note and frequency conversion utilities for DidgeLab.\n\nProvides conversion between note numbers, note names (e.g. A4), frequencies (Hz),\nwavelengths, and cent differences. Used for tuning targets and interpreting\nimpedance spectra (e.g. mapping peaks to notes).\n\nAll functions accept \"dual parameters\": arguments can be either Python scalars\n(int, float) or numpy arrays; the return type matches (scalar in -> scalar out,\narray in -> array out). Broadcasting applies when multiple array arguments are used.\n\"\"\"\n\nimport math\nimport numpy as np\n\n\ndef _is_scalar(x):\n    \"\"\"True if x is a Python scalar or 0-d array (single value).\"\"\"\n    if isinstance(x, (int, float)):\n        return True\n    if isinstance(x, np.ndarray) and x.ndim == 0:\n        return True\n    return False\n\n\ndef _as_array(x):\n    \"\"\"Convert to numpy array (at least 1-d) for vectorized computation.\"\"\"\n    return np.atleast_1d(np.asarray(x, dtype=np.float64))\n\n\ndef note_to_freq(note, base_freq=440):\n    \"\"\"Convert note number to frequency in Hz (e.g. 0 -> base_freq, 12 -> 2*base_freq).\n    Accepts scalar or array for note and base_freq; broadcasts.\"\"\"\n    note_scalar = _is_scalar(note)\n    base_scalar = _is_scalar(base_freq)\n    n = _as_array(note)\n    b = _as_array(np.asarray(base_freq, dtype=np.float64))\n    out = np.broadcast_to(b * np.power(2, n / 12), np.broadcast_shapes(n.shape, b.shape))\n    if note_scalar and base_scalar:\n        return float(out.flat[0])\n    return out\n\n\ndef note_name(note):\n    \"\"\"Convert note number to note name (e.g. 0 -> A4). Accepts scalar or array.\"\"\"\n    note_scalar = _is_scalar(note)\n    n = _as_array(note)\n    # Round and compute octave/number per element\n    note_int = np.round(n).astype(int)\n    note_int = note_int + 48\n    octave = np.floor((note_int - 3) / 12).astype(int) + 1\n    number = note_int % 12\n    names = [\"A\", \"A#\", \"B\", \"C\", \"C#\", \"D\", \"D#\", \"E\", \"F\", \"F#\", \"G\", \"G#\"]\n    result = np.array([str(names[num]) + str(oct) for num, oct in zip(number.flat, octave.flat)])\n    result = result.reshape(n.shape)\n    if note_scalar:\n        return result.flat[0]\n    return result\n\n\ndef freq_to_note(freq, base_freq=440):\n    \"\"\"Convert frequency in Hz to note number relative to base_freq (e.g. 440 -> 0).\n    Accepts scalar or array for freq and base_freq; broadcasts.\"\"\"\n    freq_scalar = _is_scalar(freq)\n    base_scalar = _is_scalar(base_freq)\n    f = _as_array(freq)\n    b = _as_array(np.asarray(base_freq, dtype=np.float64))\n    out = np.broadcast_to(12 * (np.log2(f) - np.log2(b)), np.broadcast_shapes(f.shape, b.shape))\n    if freq_scalar and base_scalar:\n        return float(out.flat[0])\n    return out\n\n\ndef freq_to_note_and_cent(freq, base_freq=440):\n    \"\"\"Return (note_number, cent_diff) for a frequency relative to base_freq.\n    Accepts scalar or array for freq and base_freq; returns tuples of arrays or scalars.\"\"\"\n    freq_scalar = _is_scalar(freq)\n    base_scalar = _is_scalar(base_freq)\n    f = _as_array(freq)\n    b = _as_array(np.asarray(base_freq, dtype=np.float64))\n    note_fuzzy = 12 * (np.log2(f) - np.log2(b))\n    note_int = np.round(note_fuzzy).astype(int)\n    diff = note_fuzzy - note_int\n    cents = diff * 100\n    if freq_scalar and base_scalar:\n        return int(note_int.flat[0]), float(cents.flat[0])\n    return note_int, cents\n\n\ndef freq_to_wavelength(freq):\n    \"\"\"Wavelength of sound at given frequency in mm (c=343.2 m/s). Accepts scalar or array.\"\"\"\n    freq_scalar = _is_scalar(freq)\n    f = _as_array(freq)\n    c = 343.2\n    out = 1000 * c / f\n    if freq_scalar:\n        return float(out.flat[0])\n    return out\n\n\ndef note_name_to_number(note):\n    \"\"\"Convert note name to note number (e.g. A4 -> 0 for A4 with base 440).\n    Accepts a single string or array-like of strings.\"\"\"\n    names = [\"A\", \"A#\", \"B\", \"C\", \"C#\", \"D\", \"D#\", \"E\", \"F\", \"F#\", \"G\", \"G#\"]\n\n    def _one(s):\n        assert len(s) in (2, 3)\n        if len(s) == 3:\n            assert s[1] == \"#\"\n        octave = int(s[-1])\n        n = names.index(s[0 : len(s) - 1])\n        return 12 * octave + n - 48\n\n    if isinstance(note, str):\n        return _one(note)\n    note_arr = np.atleast_1d(note)\n    if note_arr.ndim != 1:\n        raise ValueError(\"note_name_to_number expects a string or 1-d array of strings\")\n    out = np.array([_one(str(s)) for s in note_arr.flat], dtype=np.int_)\n    out = out.reshape(note_arr.shape)\n    if note_arr.size == 1:\n        return int(out.flat[0])\n    return out\n\n\ndef cent_diff(freq1, freq2):\n    \"\"\"Difference between two frequencies in cents (1200 * log2(freq2/freq1)).\n    Accepts scalar or array for freq1 and freq2; broadcasts.\"\"\"\n    f1_scalar = _is_scalar(freq1)\n    f2_scalar = _is_scalar(freq2)\n    f1 = _as_array(freq1)\n    f2 = _as_array(freq2)\n    out = 1200 * np.log2(f2 / f1)\n    if f1_scalar and f2_scalar:\n        return float(out.flat[0])\n    return out\n", "didgelab/_version.py": "# file generated by setuptools-scm\n# don't change, don't track in version control\n\n__all__ = [\n    \"__version__\",\n    \"__version_tuple__\",\n    \"version\",\n    \"version_tuple\",\n    \"__commit_id__\",\n    \"commit_id\",\n]\n\nTYPE_CHECKING = False\nif TYPE_CHECKING:\n    from typing import Tuple\n    from typing import Union\n\n    VERSION_TUPLE = Tuple[Union[int, str], ...]\n    COMMIT_ID = Union[str, None]\nelse:\n    VERSION_TUPLE = object\n    COMMIT_ID = object\n\nversion: str\n__version__: str\n__version_tuple__: VERSION_TUPLE\nversion_tuple: VERSION_TUPLE\ncommit_id: COMMIT_ID\n__commit_id__: COMMIT_ID\n\n__version__ = version = '3.0.16'\n__version_tuple__ = version_tuple = (3, 0, 16)\n\n__commit_id__ = commit_id = 'g92428a1b8'\n", "didgelab/app.py": "\"\"\"\nApplication shell and configuration for DidgeLab.\n\nProvides a singleton App with logging, output folders, config (e.g. from config.ini),\npublish/subscribe for events (e.g. generation_ended), and service registration.\n\"\"\"\n\nimport logging\nimport sys\nimport os\nfrom datetime import datetime\nimport configargparse\nfrom multiprocessing import Manager\n\napp = None\n\n\ndef init_app(name=None, create_output_folder=True):\n    \"\"\"Create and set the global App. Call once at startup.\"\"\"\n    global app\n    app = App(name=name, create_output_folder=create_output_folder)\n\n\ndef get_app():\n    \"\"\"Return the global App; initializes with default settings if not yet created.\"\"\"\n    if app is None:\n        init_app(None, True)\n    return app\n\n\ndef get_config():\n    \"\"\"Return the configuration dict from the global App.\"\"\"\n    return get_app().get_config()\n\n\nclass App:\n    \"\"\"\n    Central app: logging, output directory, config, pub/sub, and service registry.\n    \"\"\"\n\n    def __init__(self, name=None, create_output_folder=True):\n\n        self.subscribers = {}\n        self.output_folder = None\n        self.services = {}\n        self.config = None\n        self.create_output_folder = create_output_folder\n        \n        if create_output_folder:\n            if name is None:\n                if \"ipykernel\" in sys.modules:\n                    # we are calling from inside of a jupyter notebook\n                    name = \"jupyter\"\n                else:\n                    # we are calling from python\n                    name = os.path.basename(sys.argv[0])\n                    if name.find(\".\")>0:\n                        name = name[0:name.find(\".\")]\n            outfolder=self.get_output_folder(suffix=name)\n            log_file=os.path.join(outfolder, \"log.txt\")\n            \n            self.init_logging(filename=log_file, log_to_file=create_output_folder)\n\n            self.start_message()\n            logging.info(f\"output folder: {outfolder}\")\n            \n            conf = self.get_config()\n            conf_str = \"Configuration:\"\n            for key in sorted(conf.keys()):\n                conf_str += f\"\\n{key}: {conf[key]}\"\n            logging.info(conf_str)\n\n        if \"ipykernel\" in sys.modules:\n            self.start_message()\n\n    def register_service(self, service):\n        \"\"\"Register a service instance; retrieve later with get_service(type(service)).\"\"\"\n        self.services[type(service)] = service\n\n    def get_service(self, service_type):\n        if service_type in self.services.keys():\n            return self.services[service_type]\n        else:\n            return None\n\n    def get_config(self, path=\"config.ini\"):\n        \"\"\"Load and cache config (e.g. from config.ini and ./ *.conf).\"\"\"\n        \n        if self.config is None:\n            p = configargparse.ArgParser(default_config_files=['./*.conf'])\n            \n            p.add('-log_level', type=str, choices=[\"info\", \"error\", \"debug\", \"warn\"], default=\"info\", help='log level ')\n\n            options = p.parse_known_args()[0]\n            self.config = {}\n\n            for key, value in vars(options).items():\n                self.config[key]=value\n\n        return self.config\n\n    def publish(self, topic, args=None):\n        \"\"\"Notify all subscribers of topic (optional args passed to callbacks).\"\"\"\n        logging.debug(f\"self.publish topic={topic}, args={args}\")\n        if topic not in self.subscribers:\n            return\n        for s in self.subscribers[topic]:\n            if args is None:\n                s()\n            elif type(args) == tuple:\n                s(*args)\n            else:\n                s(args)\n\n    def subscribe(self, topic, fct):\n        \"\"\"Register fct to be called when topic is published.\"\"\"\n        if topic not in self.subscribers:\n            self.subscribers[topic]=[]\n        self.subscribers[topic].append(fct)\n\n    def init_logging(self, filename=\"./log.txt\", log_to_file=True):\n        \"\"\"Configure root logger: file and console, level from config.\"\"\"\n        logFormatter = logging.Formatter(\"%(asctime)s [%(levelname)s] {%(filename)s:%(lineno)d} %(message)s\")\n        rootLogger = logging.getLogger()\n\n        if log_to_file:\n            fileHandler = logging.FileHandler(filename)\n            fileHandler.setFormatter(logFormatter)\n            rootLogger.addHandler(fileHandler)\n\n        consoleHandler = logging.StreamHandler()\n        consoleHandler.setFormatter(logFormatter)\n        rootLogger.addHandler(consoleHandler)\n\n        level=self.get_config()[\"log_level\"]\n        if level == \"info\":\n            rootLogger.setLevel(logging.INFO)\n        elif level == \"debug\":\n            rootLogger.setLevel(logging.DEBUG)\n        elif level == \"error\":\n            rootLogger.setLevel(logging.ERROR)\n        elif level == \"warn\":\n            rootLogger.setLevel(logging.WARN)\n\n    def start_message(self):\n        \"\"\"Log ASCII banner and command line.\"\"\"\n        msg='''\n _____  _     _              _           _     \n|  __ \\(_)   | |            | |         | |    \n| |  | |_  __| | __ _  ___  | |     __ _| |__  \n| |  | | |/ _` |/ _` |/ _ \\ | |    / _` | '_ \\ \n| |__| | | (_| | (_| |  __/ | |___| (_| | |_) |\n|_____/|_|\\__,_|\\__, |\\___| |______\\__,_|_.__/ \n                 __/ |                         \n                |___/                          \n'''\n        msg += \"Starting \" + \" \".join(sys.argv)\n        logging.info(msg)\n\n    def get_output_folder(self, suffix=\"\"):\n        \"\"\"Create and return a timestamped output directory under evolutions/.\"\"\"\n\n        if self.output_folder is None:\n\n            f = os.path.dirname(__file__)\n            f = os.path.join(f, \"../../evolutions/\")\n\n            if not os.path.exists(f):\n                os.mkdir(f)\n\n            my_date = datetime.now()\n\n            folder_name=my_date.strftime('%Y-%m-%dT%H-%M-%S')\n            if len(suffix)>0:\n                folder_name += \"_\" + suffix\n\n            config = self.get_config()\n            if \"log_folder_suffix\" in config:\n                folder_name += \"_\" + config[\"log_folder_suffix\"]\n\n            self.output_folder=os.path.join(f, folder_name)\n            os.mkdir(self.output_folder)\n\n        return self.output_folder", "didgelab/analysis.py": "\"\"\"\nAnalysis and visualization of evolution logs for DidgeLab.\n\nReads population/evolution logs (e.g. population.json.gz), builds lineage graphs\n(nodes = genomes, edges = mutation/crossover), and provides success-probability\nand loss-over-time plots for analyzing runs.\n\"\"\"\n\nimport json\nimport sys\nimport os\nimport gzip\nimport logging\nimport numpy as np\nimport seaborn as sns\nimport matplotlib.pyplot as plt\n\nfrom didgelab.geo import Geo\nimport didgelab.fft\nfrom didgelab.sim.tlm_cython_lib.sim import *\nfrom didgelab.fft import *\nfrom didgelab.conv import *\nfrom didgelab.visualize import vis_didge\n\ndef get_latest_population(infile):\n    \"\"\"Open population.json.gz and return the latest generation (last line as JSON).\"\"\"\n    line = None\n    try:\n        for line in gzip.open(infile):\n            continue\n    except Exception as e:\n        logging.error(e)\n    finally:\n        return json.loads(line)\n\n\ndef get_latest_evolution_folder(basefolder=\"../../../saved_evolutions/\"):\n    \"\"\"Return the path to the newest subfolder in basefolder (by name sort).\"\"\"\n    dirs = list(filter(lambda f:os.path.isdir(os.path.join(basefolder, f)), os.listdir(basefolder)))\n    dirs = sorted(dirs, reverse=True)\n    dirs = [os.path.join(basefolder, f) for f in dirs]\n    return dirs[0]\n\n\ndef visualize_individuals(population, n=None, base_freq=440, max_error=1):\n    \"\"\"Plot geometry and impedance for up to n individuals; print notes and summary.\"\"\"\n\n    if n is not None and n<len(population):\n        population = population[0:n]\n\n    for i in range(len(population)):\n        geo = population[i][\"representation\"][\"geo\"]\n        geo = Geo(geo)\n        freqs = get_log_simulation_frequencies(1, 1000, 1)\n        segments = create_segments(geo)\n        impedance = compute_impedance(segments, freqs)\n        notes = get_notes(freqs, impedance, base_freq=base_freq)\n        print(\"************************\")\n        print(f\"Individual {i}\")\n        print(\"************************\")\n        vis_didge(geo)\n        plt.show()\n        plt.plot(freqs, impedance)\n        plt.title(\"Impedance spektrum\")\n        plt.show()\n        print(notes.round(2))\n        print(f\"Impedance sum: {notes.impedance.sum():.2f}\")\n        print(f\"Volume: {geo.compute_volume()/1000:.2f} cm3\")\n        print(f\"Length: {geo.geo[-1][0]/10:.2f} cm\")\n        print(f\"Bell diameter: {geo.geo[-1][1]/10:.2f} cm\")\n        print()\n\nclass Node:\n\n    def __init__(self, genome_id, losses, generation):\n        self.genome_id = genome_id\n        self.losses = losses\n        self.generation = generation\n        self.children = []\n        self.parents = []\n\n    def add_child(self, child_node, edge_name, edge_params):\n        con = Edge(edge_name, edge_params, self, child_node)\n        self.children.append(con)\n\n    def add_parent(self, parent_node, edge_name, edge_params):\n        con = Edge(edge_name, edge_params, parent_node, self)\n        self.parents.append(con)\n\nclass Edge:\n\n    def __init__(self, name, params, parent, child):\n        self.name = name\n        self.params = params\n        self.parent = parent\n        self.child = child\n\nclass Nodes:\n\n    def __init__(self):\n        self.nodes = {}\n\n    def add_node(self, node):\n        self.nodes[node.genome_id] = node\n\n    def has_node_id(self, node_id):\n        return node_id in self.nodes.keys()\n\n    def get_node(self, node_id):\n        return self.nodes[node_id]\n    \n    def get_generation(self, i_generation):\n        return list(filter(lambda x:x.generation==i_generation, self.nodes.values()))\n\n    def iterate_edges(self):\n        for node in self.nodes.values():\n            for edge in node.children:\n                yield edge\n\n    def iterate_nodes(self):\n        for node in self.nodes.values():\n            yield node\n\n    def connect(self, nodeid_parent, nodeid_child, edge_name, edge_params):\n        parent = self.get_node(nodeid_parent)\n        child = self.get_node(nodeid_child)\n        parent.add_child(child, edge_name, edge_params)\n        child.add_parent(parent, edge_name, edge_params)\n\ndef build_graph(infile):\n    generation_counter = 0\n    nodes = Nodes()\n    num_errors = 0\n    try:\n        for line in gzip.open(infile):\n            try:\n                data = json.loads(line)\n            except Exception as e:\n                num_errors += 1\n                if num_errors >= 3:\n                    break\n                logging.error(e)\n                continue\n            for i in range(len(data[\"genome_ids\"])):\n\n                losses = {key: data[\"losses\"][key][i] for key in data[\"losses\"].keys()}\n                node = Node(\n                    data[\"genome_ids\"][i], \n                    losses,\n                    generation_counter\n                )\n                nodes.add_node(node)\n            generation_counter += 1\n\n            mo = data[\"mutations_operations\"]\n            if len(mo)>0:\n                for i in range(len(mo[\"operation\"])):\n                    father_id = mo[\"father_id\"][i]\n                    child_id = mo[\"child_id\"][i]\n\n                    if nodes.has_node_id(child_id) and nodes.has_node_id(father_id):\n                        nodes.connect(\n                            father_id,\n                            child_id,\n                            mo[\"operation\"][i],\n                            {}\n                        )\n\n            co = data[\"crossover_operations\"]\n            if len(co)>0:\n                for i in range(len(co[\"operation\"])):\n                    parent1 = co[\"parent1_genome\"][i]\n                    parent2 = co[\"parent2_genome\"][i]\n                    child_id = co[\"child_id\"][i]\n                    if nodes.has_node_id(child_id) and nodes.has_node_id(parent1) and nodes.has_node_id(parent2):\n                            nodes.connect(\n                                parent1,\n                                child_id,\n                                co[\"operation\"][i],\n                                {}\n                            )\n                            nodes.connect(\n                                parent2,\n                                child_id,\n                                co[\"operation\"][i],\n                                {}\n                            )\n    except Exception as e:\n        logging.error(e)\n    finally:\n        return nodes\n\ndef get_deltas(infile=None, nodes=None):\n    assert infile is not None or nodes is not None\n\n    if infile is not None:\n        nodes = build_graph(infile)\n        \n    deltas = []\n    for edge in nodes.iterate_edges():\n        for key in edge.parent.losses.keys():\n            loss_delta = edge.parent.losses[key] - edge.child.losses[key]\n            deltas.append([edge.name, key, np.max((0, loss_delta)), edge.child.losses[key], edge.child.generation])\n    deltas = pd.DataFrame(deltas, columns=[\"operation\", \"loss_type\", \"delta\", \"loss_value\", \"generation\"])\n    return deltas\n\ndef get_success_probs(deltas):\n    success_probs = []\n    for loss in deltas.loss_type.unique():\n        for operation in deltas.operation.unique():\n            a = len(deltas.query(\"operation==@operation and loss_type==@loss and delta>0\"))    \n            b = len(deltas.query(\"operation==@operation and loss_type==@loss\"))\n            operation_str = operation\n            operation_str = operation_str.replace(\"Mutation\", \"\\nMutation\")\n            operation_str = operation_str.replace(\"Crossover\", \"\\nCrossover\")\n            success_probs.append([operation_str, loss, a/b])\n\n        a = len(deltas.query(\"delta>0\"))    \n        b = len(deltas)\n        success_probs.append([\"Total\\nAverage\", loss, a/b])\n\n    success_probs = pd.DataFrame(success_probs, columns=[\"operation\", \"loss_type\", \"success_prob\"])\n    success_probs = success_probs.sort_values(\"success_prob\", ascending=False)\n    return success_probs\n\n# plot the success probabilities of each operator over time.\n# data can change a lot so the function performs moving average filtering with a parameter window_size\ndef plot_success_probs_over_time(deltas, do_not_plot=False, window_size=20):\n    deltas = deltas.query(\"loss_type=='total'\").sort_values(by=\"generation\")\n\n    generation = -1\n    operations = deltas.operation.unique()\n    \n    total_operations = None\n    success_operations = None\n    result = []\n    for ix, row in deltas.iterrows():\n        if row[\"generation\"] != generation:\n\n            if generation>0:\n                for operation in operations:\n                    if total_operations[operation] > 0:\n                        prob = success_operations[operation] / total_operations[operation]\n                        result.append([generation, operation, prob])\n\n            generation = row[\"generation\"]\n            total_operations = {o:0 for o in operations}\n            success_operations = {o:0 for o in operations}\n\n        total_operations[row[\"operation\"]] += 1\n        if row[\"delta\"] > 0:\n            success_operations[row[\"operation\"]] += 1\n\n    for operation in operations:\n        if total_operations[operation] > 0:\n            prob = success_operations[operation] / total_operations[operation]\n            result.append([generation, operation, prob])\n\n    result = pd.DataFrame(result, columns=[\"generation\", \"operation\", \"success_prob\"])\n\n    if window_size>1:\n        result[\"chunk\"] = (result.generation/window_size).astype(int)\n        windowed_result = []\n        operations = result.operation.unique()\n        for chunk in result.chunk.unique():\n            df = result.query(\"chunk==@chunk\")\n            generation = int(df.generation.mean())\n            for operation in operations:\n                value = df.query(\"operation==@operation\").success_prob.mean()\n                windowed_result.append({\n                    \"generation\": generation,\n                    \"operation\": operation,\n                    \"success_prob\": value\n                })\n\n        result = pd.DataFrame(windowed_result)\n\n    if do_not_plot:\n        return result\n    \n    sns.lineplot(data=result, x=\"generation\", y=\"success_prob\", hue=\"operation\")\n    plt.title(\"Success probabilities over time\")\n\n\ndef plot_loss_over_time(nodes, do_not_plot=False):\n    generations = {}\n    for node in nodes.iterate_nodes():\n        if node.generation not in generations:\n            generations[node.generation] = []\n        generations[node.generation].append(node.losses)\n\n    indizes = sorted(generations.keys())\n    best_loss = None\n    losses = []\n    for i in indizes:\n\n        besti = np.argmin([x[\"total\"] for x in generations[i]])\n        loss = generations[i][besti]\n\n        if best_loss is None:\n            best_loss = loss\n\n        if loss[\"total\"] < best_loss[\"total\"]:\n            best_loss = loss\n        \n        for key, value in best_loss.items():\n            losses.append([i, key, value])\n\n    losses = pd.DataFrame(losses, columns=[\"generation\", \"loss_type\", \"loss\"])\n\n    if do_not_plot:\n        return losses\n    sns.lineplot(data=losses, x=\"generation\", y=\"loss\", hue=\"loss_type\")\n    plt.title(\"Loss over time\")", "didgelab/evo/__init__.py": "\"\"\"Evolutionary optimization: genomes, loss functions, operators, and Nuevolution.\"\"\"\n\nfrom .genome import Genome, GeoGenome, GeoGenomeA\nfrom .loss import LossFunction, TestLossFunction\nfrom .operators import (\n    MutationOperator,\n    CrossoverOperator,\n    SimpleMutation,\n    RandomMutation,\n    SingleMutation,\n    RandomCrossover,\n    AverageCrossover,\n    PartSwapCrossover,\n    PartAverageCrossover,\n)\nfrom .evolution import Nuevolution\nfrom .schedulers import AdaptiveProbabilities\nfrom .writer import NumpyEncoder, load_latest_evolution\n\n__all__ = [\n    \"Genome\",\n    \"GeoGenome\",\n    \"GeoGenomeA\",\n    \"LossFunction\",\n    \"TestLossFunction\",\n    \"MutationOperator\",\n    \"CrossoverOperator\",\n    \"SimpleMutation\",\n    \"RandomMutation\",\n    \"SingleMutation\",\n    \"RandomCrossover\",\n    \"AverageCrossover\",\n    \"PartSwapCrossover\",\n    \"PartAverageCrossover\",\n    \"Nuevolution\",\n    \"AdaptiveProbabilities\",\n    \"NumpyEncoder\",\n    \"load_latest_evolution\"\n]\n", "didgelab/evo/genome.py": "\"\"\"\nEvolvable genome types: base Genome, GeoGenome, and GeoGenomeA.\n\nGenomes are vectors of genes in [0, 1]; subclasses define how they are\ninterpreted (e.g. as bore geometry).\n\"\"\"\n\nimport numpy as np\nfrom abc import ABC, abstractmethod\nfrom copy import deepcopy\nimport threading\n\nfrom didgelab.geo import Geo\n\n\nclass Genome(ABC):\n    \"\"\"\n    Abstract base for an evolvable genome (vector of genes in [0, 1]).\n\n    Subclasses define how the genome is interpreted (e.g. as bore geometry).\n    Each instance has a unique id, optional loss dict, and optional named_parameters.\n    \"\"\"\n\n    genome_id_lock = threading.Lock()\n    genome_id_counter = 0\n\n    def __init__(self, n_genes=None, genome=None):\n        assert n_genes is not None or genome is not None\n\n        if n_genes is not None:\n            self.genome = np.random.sample(size=n_genes)\n        elif genome is not None:\n            self.genome = genome\n        self.loss = None\n\n        self.id = Genome.generate_id()\n        self.named_parameters = {}\n\n    def representation(self):\n        \"\"\"Return a serializable representation of this genome (e.g. for logging).\"\"\"\n        return self.genome.tolist()\n\n    def randomize_genome(self):\n        \"\"\"Replace the genome with random values in [0, 1], keeping the same length.\"\"\"\n        self.genome = np.random.sample(size=len(self.genome))\n\n    @staticmethod\n    def generate_id():\n        \"\"\"Return a new unique integer id for a genome (thread-safe).\"\"\"\n        Genome.genome_id_lock.acquire()\n        try:\n            id = Genome.genome_id_counter\n            Genome.genome_id_counter += 1\n        finally:\n            Genome.genome_id_lock.release()\n        return id\n\n    def clone(self):\n        \"\"\"Return a deep copy of this genome with a new id and loss cleared.\"\"\"\n        clone = deepcopy(self)\n        clone.id = Genome.generate_id()\n        clone.loss = None\n        return clone\n\n\nclass GeoGenome(Genome):\n    \"\"\"\n    Genome that encodes a didgeridoo bore geometry.\n\n    representation() returns geo data and a text analysis (impedance/notes).\n    Subclasses must implement genome2geo() to map the gene vector to a Geo.\n    \"\"\"\n\n    def representation(self):\n        from didgelab.sim.tlm_cython_lib.sim import (\n            get_log_simulation_frequencies,\n            create_segments,\n            compute_impedance,\n            get_notes,\n        )\n        geo = self.genome2geo()\n        freqs = get_log_simulation_frequencies(1, 1000, 1)\n        segments = create_segments(geo)\n        impedance = compute_impedance(segments, freqs)\n        notes = get_notes(freqs, impedance).to_string().split(\"\\n\")\n        return {\n            \"geo\": geo.geo,\n            \"analysis\": notes\n        }\n\n    @abstractmethod\n    def genome2geo(self) -> Geo:\n        \"\"\"Convert the genome to a didgeridoo geometry (Geo).\"\"\"\n        pass\n\n\nclass GeoGenomeA(GeoGenome):\n    \"\"\"\n    Genome that encodes a bore as segment lengths and diameters (linear interpolation).\n\n    Gene layout: one length scale plus (length, diameter) pairs per segment.\n    Total length is in [1000, 2000] mm; diameters are scaled to [25, 100] mm range,\n    with mouth diameter fixed at 32 mm.\n    \"\"\"\n\n    def build(n_segments):\n        \"\"\"Construct a new GeoGenomeA with random genes for n_segments (n_genes = n_segments*2 + 1).\"\"\"\n        return GeoGenomeA(n_genes=(n_segments*2)+1)\n\n    def genome2geo(self) -> Geo:\n\n        d0 = 32\n        x = [0]\n        y = [d0]\n        min_l = 1000\n        max_l = 2000\n\n        d_factor = 75\n        min_d = 25\n\n        l = self.genome[0] * (max_l-min_l) + min_l\n        i = 1\n        while i+2 < len(self.genome):\n            x.append(self.genome[i] + x[-1])\n            y.append(self.genome[i+1])\n            i += 2\n\n        x = np.array(x)\n\n        if x[-1] != 0:\n            x /= x[-1]\n\n        x = x * l\n        x[0] = 0\n        y = np.array(y) * d_factor + min_d\n        y[0] = d0\n\n        geo = list(zip(x, y))\n\n        return Geo(geo)\n", "didgelab/evo/schedulers.py": "\"\"\"\nSchedulers for mutation/crossover rates and adaptive operator probabilities.\n\"\"\"\n\nimport numpy as np\n\nfrom didgelab.app import get_app\nfrom .evolution import Nuevolution\n\n\nclass LinearDecreasingMutation:\n    \"\"\"Scheduler that decreases mutation_rate and gene_mutation_prob over evolution progress (4 steps).\"\"\"\n\n    def __init__(self):\n\n        n_steps = 4\n        self.schedule = np.arange(1, n_steps + 1) / n_steps\n        self.rates = 1 - (np.arange(n_steps) / n_steps)\n        self.i = -1\n\n        def update(i_generation, population):\n\n            if self.i >= len(self.schedule):\n                return\n\n            nuevolution = get_app().get_service(Nuevolution)\n            progress = nuevolution.get_evolution_progress()\n            if self.i == -1 or progress > self.schedule[self.i]:\n                self.i += 1\n                rate = self.rates[self.i]\n                nuevolution.evolution_parameters[\"mutation_rate\"] = rate\n                nuevolution.evolution_parameters[\"gene_mutation_prob\"] = rate\n                get_app().publish(\"recompute_loss\")\n\n        get_app().subscribe(\"generation_started\", update)\n\n\nclass LinearDecreasingCrossover:\n    \"\"\"Scheduler that decreases crossover_prob in evolution_parameters over progress (4 steps).\"\"\"\n\n    def __init__(self):\n\n        n_steps = 4\n        self.schedule = np.arange(1, n_steps + 1) / n_steps\n        self.rates = 0.5 - (np.arange(n_steps) / n_steps)\n        self.rates = [np.max(x, 0) for x in self.rates]\n        self.i = -1\n\n        def update(i_generation, population):\n            if self.i >= len(self.schedule):\n                return\n\n            nuevolution = get_app().get_service(Nuevolution)\n            progress = nuevolution.get_evolution_progress()\n            if self.i == -1 or progress > self.schedule[self.i]:\n                self.i += 1\n                rate = self.rates[self.i]\n                nuevolution.evolution_parameters[\"crossover_prob\"] = rate\n                get_app().publish(\"recompute_loss\")\n        get_app().subscribe(\"generation_started\", update)\n\n\nclass AdaptiveProbabilities:\n    \"\"\"\n    Adjusts evolution operator probabilities from recent loss deltas (success = child better than parent).\n\n    Subscribes to log_evolution_operations; keeps a sliding window of deltas per operator and sets\n    probabilities proportional to success rate (min 0.05), then updates Nuevolution.evolution_operator_probs.\n    \"\"\"\n\n    def __init__(self):\n        get_app().subscribe(\"log_evolution_operations\", self.log_evolution_operations)\n        self.loss_index = {}\n        self.loss_history = {}\n        self.window_size = 100\n        self.probabilities = {}\n\n    def compute_loss_delta_of_generation(self, mutation_operations, crossover_operations):\n        \"\"\"Return a dict mapping each operation name to a list of (child_loss - best_parent_loss) deltas.\"\"\"\n        generation = {}\n        for mutation in mutation_operations:\n\n            if mutation[\"father_id\"] not in self.loss_index:\n                continue\n            if mutation[\"child_id\"] not in self.loss_index:\n                continue\n\n            father_loss = self.loss_index[mutation[\"father_id\"]]\n            child_loss = self.loss_index[mutation[\"child_id\"]]\n\n            if mutation[\"operation\"] not in generation:\n                generation[mutation[\"operation\"]] = []\n\n            generation[mutation[\"operation\"]].append(child_loss - father_loss)\n\n        for crossover in crossover_operations:\n            if crossover[\"parent1_genome\"] not in self.loss_index:\n                continue\n            if crossover[\"parent2_genome\"] not in self.loss_index:\n                continue\n            if crossover[\"child_id\"] not in self.loss_index:\n                continue\n\n            p1_loss = self.loss_index[crossover[\"parent1_genome\"]]\n            p2_loss = self.loss_index[crossover[\"parent2_genome\"]]\n            child_loss = self.loss_index[crossover[\"child_id\"]]\n\n            minloss = np.min((p1_loss, p2_loss))\n            if crossover[\"operation\"] not in generation:\n                generation[crossover[\"operation\"]] = []\n            generation[crossover[\"operation\"]].append(child_loss - minloss)\n\n        return generation\n\n    def log_evolution_operations(self, i_generation, individuals, mutation_operations, crossover_operations):\n        \"\"\"Update loss index, compute deltas for this generation, and update operator probabilities.\"\"\"\n        if len(self.loss_index) == 0:\n            pop = get_app().get_service(Nuevolution).population\n            for i in pop:\n                self.loss_index[i.id] = i.loss[\"total\"]\n\n        for i in range(len(individuals)):\n            self.loss_index[individuals[i].id] = individuals[i].loss[\"total\"]\n\n        generation = self.compute_loss_delta_of_generation(mutation_operations, crossover_operations)\n\n        for operation, losses in generation.items():\n            if operation not in self.loss_history:\n                self.loss_history[operation] = []\n            self.loss_history[operation].extend(losses)\n            if len(self.loss_history[operation]) > self.window_size:\n                self.loss_history[operation] = self.loss_history[operation][-self.window_size:]\n\n            num_successful = (np.array(self.loss_history[operation]) < 0).astype(int).sum()\n            num_total = len(self.loss_history[operation])\n            self.probabilities[operation] = np.max((num_successful / num_total, 0.05))\n\n        # normalize probabilities\n        prob_sum = np.sum(list(self.probabilities.values()))\n        self.probabilities = {key: value / prob_sum for key, value in self.probabilities.items()}\n\n        # update probs in nuevolution\n        nuevo = get_app().get_service(Nuevolution)\n        probs = []\n        for i in range(len(nuevo.evolution_operators)):\n            o = nuevo.evolution_operators[i]\n            if type(o).__name__ in self.probabilities:\n                p = self.probabilities[type(o).__name__]\n            else:\n                p = nuevo.evolution_operator_probs[i]\n            probs.append(p)\n        nuevo.evolution_operator_probs = probs\n", "didgelab/evo/callbacks.py": "\"\"\"\nEvolution callbacks: progress bar, logging, early stopping.\n\"\"\"\n\nimport logging\nfrom typing import Callable, Optional\nfrom time import time\nimport numpy as np\nimport os\nfrom tqdm import tqdm\nfrom datetime import datetime\n\ntry:\n    from IPython.display import clear_output\nexcept ImportError:\n    def clear_output(wait=True):\n        pass\nimport gzip\nimport json\n\nfrom didgelab.app import get_app\nfrom .evolution import Nuevolution\n\n\ndef create_loss_progress_callback(\n    on_progress: Callable[[int, int, int], None],\n    *,\n    num_generations: Optional[int] = None,\n    throttle_interval: float = 0.1,\n) -> Callable[[int, int, int], None]:\n    \"\"\"\n    Create a callback for Nuevolution.callback_loss_progress that tracks progress\n    within a single generation (the pool.map loss computation step).\n\n    The callback receives (i_generation, completed, total) each time an individual's\n    loss is computed. Can be used for progress bars, streaming to a frontend, etc.\n\n    Args:\n        on_progress: Called with (i_generation, completed, total). May also receive\n            (progress_0_to_1,) if you use a simpler signature - see below.\n        num_generations: If provided, the wrapper can compute overall evolution progress\n            as (i_generation - 1 + completed/total) / num_generations. Pass-through if None.\n        throttle_interval: Minimum seconds between invocations (default 0.1) to avoid\n            flooding. Set to 0 to disable throttling.\n\n    Returns:\n        A callback suitable for evo.callback_loss_progress = create_loss_progress_callback(...)\n\n    Example (tqdm-style progress bar):\n        def update_bar(i_gen, completed, total):\n            pbar.n = (i_gen - 1) * generation_size + completed\n            pbar.refresh()\n        evo.callback_loss_progress = create_loss_progress_callback(update_bar)\n    \"\"\"\n    last_call_time = [0.0]  # use list to allow closure to mutate\n\n    def wrapper(i_generation: int, completed: int, total: int) -> None:\n        if throttle_interval > 0:\n            now = time()\n            if now - last_call_time[0] < throttle_interval and completed < total:\n                return\n            last_call_time[0] = now\n        on_progress(i_generation, completed, total)\n\n    return wrapper\nfrom .schedulers import LinearDecreasingCrossover, LinearDecreasingMutation, AdaptiveProbabilities\nfrom .loss import LossFunction\n\nfrom didgelab.visualize import plot_geo_impedance_notes\nfrom ..acoustical_simulation import get_log_simulation_frequencies, acoustical_simulation, get_notes\n\nclass EvolutionMonitor:\n\n    def __init__(self, target_freqs : np.array, loss : LossFunction):\n        self.target_freqs = target_freqs\n        self.losses = []\n        self.loss = loss\n\n    def evolution_monitor_callback(self, i_generation, population):\n\n        loss_value = self.loss.loss(population[0])\n        self.losses.append(loss_value[\"total\"])\n\n        frequencies = get_log_simulation_frequencies(30, 1000, 5)\n        geo = population[0].genome2geo()\n        impedances = acoustical_simulation(geo, frequencies)\n\n        notes = get_notes(frequencies, impedances, target_freqs=self.target_freqs)\n        clear_output()\n\n        print()\n\n        print(f\"Generation {i_generation}\")\n\n        loss_str = {key: round(value, 2) for key, value in loss_value.items()}\n        print(f\"losses: {loss_str}\")\n        print(notes.round(2))\n\n        fig, axes = plot_geo_impedance_notes(geo)\n\nclass SaveEvolution:\n\n    def __init__(self, output_dir = \"outputs\"):\n        self.output_dir = output_dir\n        current_datetime = datetime.now()\n        iso_format_string = current_datetime.isoformat()\n        self.outfile = os.path.join(self.output_dir, iso_format_string + \".json.gz\")\n        self.start_time = time()\n\n    def evolution_monitor_callback(self, i_generation, population):\n\n        if not os.path.exists(self.output_dir):\n            os.makedirs(self.output_dir)\n\n        def serialize_loss(loss):\n            return {key: float(value) for key, value in loss.items()}\n\n        log_message = {\n            \"population\": [p.genome.tolist() for p in population],\n            \"losses\": [serialize_loss(p.loss) for p in population],\n            \"i_generation\": i_generation,\n            \"loss0\": serialize_loss(population[0].loss),\n            \"time_elapsed\": time() - self.start_time\n        }\n\n        with gzip.open(self.outfile, \"wb\") as f:\n            log_message = json.dumps(log_message).encode('utf-8')\n            f.write(log_message)\n\ndef init_standard_evolution(target_freqs, evo):\n\n    schedulers = [\n        LinearDecreasingCrossover(),\n        LinearDecreasingMutation()\n    ]\n\n    AdaptiveProbabilities()\n\n    monitor = EvolutionMonitor(target_freqs, evo.loss)\n    se = SaveEvolution()\n    def evolution_monitor_callback(i_generation, population):\n        monitor.evolution_monitor_callback(i_generation, population)\n        se.evolution_monitor_callback(i_generation, population)\n\n    evo.callback_generation_ended = evolution_monitor_callback\n\ndef load_latest_evolution(output_folder = \"outputs\"):\n    files = os.listdir(output_folder)\n    files = sorted(files)\n    infile = os.path.join(output_folder, files[-1])\n    population = []\n    with gzip.open(infile, \"rb\") as f:\n        x = f.read().decode(\"utf-8\")\n        x = json.loads(x)\n\n        for i in range(len(x[\"population\"])):\n            ind = shape.clone()\n            ind.genome = np.array(x[\"population\"][i])\n            ind.loss = {key: np.float32(value) for key, value in x[\"losses\"][i].items()}\n            population.append(ind)\n        return population\n\nclass NuevolutionProgressBar:\n    \"\"\"Shows a tqdm progress bar that advances each generation and displays best total loss.\"\"\"\n\n    def __init__(self):\n\n        self.pbar = None\n\n        def update(i_generation, population):\n            if self.pbar is None:\n                num_generations = get_app().get_service(Nuevolution).num_generations\n                self.pbar = tqdm(total=num_generations)\n            self.pbar.update(1)\n            best_loss = population[0].loss['total']\n            self.pbar.set_description(f\"best loss: {best_loss:.2f}\")\n\n        get_app().subscribe(\"generation_ended\", update)\n\n\nclass TqdmLossProgressCallback:\n    \"\"\"\n    Reusable callback that shows tqdm progress during the loss computation (pool.map)\n    within each generation. Wire into Nuevolution via callback_loss_progress.\n    \"\"\"\n\n    def __init__(self, evo: Nuevolution):\n        self.evo = evo\n        self.pbar = None\n\n    def __call__(self, i_generation: int, completed: int, total: int) -> None:\n        if self.pbar is None or self.pbar.total != total:\n            if self.pbar is not None:\n                self.pbar.close()\n            self.pbar = tqdm(total=total, unit=\"ind\", desc=f\"gen {i_generation}\")\n        self.pbar.n = completed\n        self.pbar.refresh()\n        if completed >= total:\n            self.pbar.close()\n            self.pbar = None\n\n\nclass PrintEvolutionInformation:\n    \"\"\"Logs the best individual's loss and note analysis every interval generations (and generation 1).\"\"\"\n\n    def __init__(self, interval=5, base_freq=440):\n\n        self.base_freq = base_freq\n        self.interval = interval\n        self.last_generation_time = None\n\n        def generation_ended(i_generation, population):\n\n            duration = None\n            if self.last_generation_time is not None:\n                duration = time() - self.last_generation_time\n            self.last_generation_time = time()\n\n            if i_generation > 1 or i_generation % self.interval == 0:\n                from didgelab.sim.tlm_cython_lib.sim import (\n                    get_log_simulation_frequencies,\n                    create_segments,\n                    compute_impedance,\n                    get_notes,\n                )\n                genome = population[0]\n                losses = [f\"{key}: {value}\" for key, value in genome.loss.items()]\n                msg = \"Losses:\\n\" + \"\\n\".join(losses)\n\n                geo = genome.genome2geo()\n                freqs = get_log_simulation_frequencies(1, 1000, 5)\n                segments = create_segments(geo)\n                impedances = compute_impedance(segments, freqs)\n                notes = get_notes(freqs, impedances, base_freq=self.base_freq).round(2).to_string()\n                msg += \"\\n\" + notes\n\n                if duration is not None:\n                    msg += f\"\\nTime per generation: {duration:.2f} seconds\"\n\n                logging.info(msg)\n\n        get_app().subscribe(\"generation_ended\", generation_ended)\n\n\nclass EarlyStopping:\n    \"\"\"Stops evolution when the best loss has not improved for duration generations (intended use).\"\"\"\n\n    def __init__(self, duration=100):\n        self.duration = duration\n        self.best_loss = None\n        self.last_loss_update = None\n\n        def generation_ended(i_generation, population):\n            thisloss = population[0].loss[\"total\"]\n            if self.best_loss is None or thisloss < self.best_loss:\n                self.best_loss = thisloss\n                self.last_loss_update = i_generation\n            elif i_generation - self.last_loss_update > self.duration:\n                logging.info(\"stop evolution because it did not improve\")\n                evo = get_app().get_service(Nuevolution)\n                evo.continue_evolution = False\n\n        get_app().subscribe(\"generation_ended\", generation_ended)\n", "didgelab/evo/evolution.py": "\"\"\"\nEvolution runner: population, mutation/crossover, selection by loss.\n\"\"\"\n\nimport logging\nimport multiprocessing\nfrom concurrent.futures import ThreadPoolExecutor\n\nimport numpy as np\nfrom tqdm import tqdm\n\nfrom didgelab.app import get_app\nfrom .genome import Genome\nfrom .loss import LossFunction\nfrom .operators import (\n    MutationOperator,\n    CrossoverOperator,\n    RandomCrossover,\n    AverageCrossover,\n    SimpleMutation,\n    SingleMutation,\n    PartAverageCrossover,\n    PartSwapCrossover,\n)\n\n\nclass Nuevolution:\n    \"\"\"\n    Evolution runner: maintains a population, applies mutation/crossover, and selects by loss.\n\n    Initial population is built from father_genome (cloned and randomized) or from a list of genomes.\n    Each generation, generation_size offspring are created via chosen operators, losses computed\n    in parallel, then population is merged and trimmed to population_size by best total loss.\n    Publishes generation_started, generation_ended, evolution_ended, log_evolution_operations.\n    \"\"\"\n\n    def __init__(self,\n                 loss: LossFunction,\n                 father_genome: Genome,\n                 generation_size=5,\n                 num_generations=10,\n                 population_size=10,\n                 max_n_threads=None,\n                 evolution_parameters={\n                     \"mutation_rate\": 0.5,\n                     \"gene_mutation_prob\": 0.5,\n                 },\n                 evolution_operators=None,\n                 evolution_operator_probs=None,\n                 callback_generation_ended=None,\n                 callback_loss_progress=None):\n\n        if evolution_operators is None:\n            evolution_operators = [\n                RandomCrossover(),\n                AverageCrossover(),\n                SimpleMutation(),\n                SingleMutation(),\n                PartAverageCrossover(),\n                PartSwapCrossover()\n            ]\n\n        self.loss = loss\n        self.father_genome = father_genome\n        self.generation_size = generation_size\n        self.num_generations = num_generations\n        self.population_size = population_size\n        self.evolution_parameters = evolution_parameters\n        self.evolution_operators = evolution_operators\n        self.max_n_threads = max_n_threads\n        self.callback_generation_ended = callback_generation_ended\n        self.callback_loss_progress = callback_loss_progress\n\n        if evolution_operator_probs is None:\n            evolution_operator_probs = [1/len(evolution_operators)] * len(evolution_operators)\n        self.evolution_operator_probs = evolution_operator_
