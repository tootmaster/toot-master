ENCE: Drives the EA to split a harmonic into a 'gritty' doublet.\n    \"\"\"\n    def __init__(self, harmonic_index: int, split_width_hz: float, weight: float):\n        self.h_idx = harmonic_index\n        self.split_width = split_width_hz\n        self.weight = weight\n\n    def calculate(self, peak_freqs_log, peak_impedances, all_freqs, all_impedances, peak_indices):\n        if len(peak_freqs_log) <= self.h_idx: return self.weight\n        f_target = np.power(2.0, peak_freqs_log[self.h_idx])\n        close_peaks = np.sum(np.abs(np.power(2.0, peak_freqs_log) - f_target) < self.split_width)\n        return 0.0 if close_peaks >= 2 else self.weight\n\n    def get_formula(self) -> Tuple[str, List[str]]:\n        formula = r\"L_{split} = w \\cdot [N(f_{peaks} \\in [f_n \\pm \\delta]) < 2]\"\n        explanations = [\n            \"f_n: The target harmonic frequency to be split.\",\n            \"δ: The frequency window (split width) in Hz.\",\n            \"N(...): Count of peaks within that window.\",\n            \"[...]: Iverson bracket (binary penalty if condition is true).\"\n        ]\n        return formula, explanations\n\nclass IntegerHarmonicLoss(LossComponent):\n    \"\"\"\n    PERFECT-INTEGER: Normalized by 600 cents.\n    \"\"\"\n    def __init__(self, weight: float):\n        self.weight = weight\n\n    def calculate(self, peak_freqs_log, peak_impedances, all_freqs, all_impedances, peak_indices):\n        f0 = np.power(2.0, peak_freqs_log[0])\n        # Calculate mean error in cents and divide by 600\n        total_error_cents = sum(np.abs(1200 * np.log2(np.power(2.0, f_log) / (f0 * (i + 1)))) \n                               for i, f_log in enumerate(peak_freqs_log))\n        avg_error_normalized = (total_error_cents / len(peak_freqs_log)) / 600.0\n        return avg_error_normalized * self.weight\n\n    def get_formula(self) -> Tuple[str, List[str]]:\n        formula = r\"L_{int} = w \\cdot \\frac{1}{600N} \\sum_{n=1}^{N} |1200 \\cdot \\log_2 \\left( \\frac{f_n}{n \\cdot f_0} \\right)|\"\n        explanations = [\n            \"f_n: Frequency of the n-th peak.\",\n            \"f_0: Fundamental (drone) frequency.\",\n            \"n: Harmonic integer (1, 2, 3, …).\",\n            \"N: Number of peaks.\",\n            \"600: Normalization constant (6 semitones).\",\n            \"w: Weight for mathematical purity.\",\n        ]\n        return formula, explanations\n\nclass NearIntegerLoss(LossComponent):\n    \"\"\"\n    NEAR-INTEGER: Normalized by 600 cents.\n    \"\"\"\n    def __init__(self, stretch_factor: float, weight: float):\n        self.stretch = stretch_factor\n        self.weight = weight\n\n    def calculate(self, peak_freqs_log, peak_impedances, all_freqs, all_impedances, peak_indices):\n        f0 = np.power(2.0, peak_freqs_log[0])\n        total_error_cents = sum(np.abs(1200 * np.log2(np.power(2.0, f_log) / (f0 * (i + 1) * (self.stretch ** i)))) \n                               for i, f_log in enumerate(peak_freqs_log))\n        return (total_error_cents / 600.0) * self.weight\n\n    def get_formula(self) -> Tuple[str, List[str]]:\n        formula = r\"L_{near} = w \\cdot \\frac{1}{600} \\sum_{n=1}^{N} |1200 \\cdot \\log_2 \\left( \\frac{f_n}{n \\cdot f_0 \\cdot s^n} \\right)|\"\n        explanations = [\n            \"s: Stretch factor (e.g., 1.002 for slightly sharp upper harmonics).\",\n            \"f_n: Actual peak frequency.\",\n            \"n: Harmonic rank.\",\n            \"f_0: Fundamental frequency.\",\n            \"600: Normalization divisor (6 semitones).\",\n            \"w: Weight for stretched-harmonic timbre.\",\n        ]\n        return formula, explanations\n\n\nclass StretchedOddLoss(LossComponent):\n    \"\"\"\n    STRETCHED/ODD: Normalized by 600 cents.\n    \"\"\"\n    def __init__(self, weight: float):\n        self.weight = weight\n\n    def calculate(self, peak_freqs_log, peak_impedances, all_freqs, all_impedances, peak_indices):\n        f0 = np.power(2.0, peak_freqs_log[0])\n        targets = [f0 * 1, f0 * 3.1, f0 * 5.2]\n        total_loss_cents = sum(np.abs(1200 * np.log2(np.power(2.0, peak_freqs_log[np.argmin(np.abs(np.power(2.0, peak_freqs_log) - t))]) / t)) \n                              for t in targets)\n        return (total_loss_cents / 600.0) * self.weight\n\n    def get_formula(self) -> Tuple[str, List[str]]:\n        formula = r\"L_{odd} = \\frac{w}{600} \\cdot \\sum |1200 \\cdot \\log_2 \\left( \\frac{f_{closest}}{f_{target}} \\right)|\"\n        explanations = [\n            \"f_closest: The peak nearest to the target odd harmonic (1st, 3rd, 5th).\",\n            \"f_target: Stretched odd harmonic targets (1·f_0, 3.1·f_0, 5.2·f_0).\",\n            \"600: Normalization divisor.\",\n            \"w: Weight for odd-dominant timbre.\",\n        ]\n        return formula, explanations\n\n\nclass HighInharmonicLoss(LossComponent):\n    \"\"\"\n    HIGH INHARMONIC: Maximizes 'dissonance' by pushing ratios toward irrational numbers.\n    \"\"\"\n    def __init__(self, weight: float):\n        self.weight = weight\n\n    def calculate(self, peak_freqs_log, peak_impedances, all_freqs, all_impedances, peak_indices):\n        f0 = np.power(2.0, peak_freqs_log[0])\n        ratios = np.power(2.0, peak_freqs_log) / f0\n        dist_to_int = np.abs(ratios - np.round(ratios)).mean()\n        return self.weight * (0.5 - dist_to_int)\n\n    def get_formula(self) -> Tuple[str, List[str]]:\n        formula = r\"L_{inharm} = w \\cdot (0.5 - \\text{avg}(| \\frac{f_n}{f_0} - \\lfloor \\frac{f_n}{f_0} \\rceil |))\"\n        explanations = [\n            \"⌊x⌉: Nearest integer (rounding).\",\n            \"f_n/f_0: Harmonic ratio.\",\n            \"0.5: Maximum possible deviation from an integer ratio.\",\n            \"w: Weight for metallic/chaotic timbre.\"\n        ]\n        return formula, explanations\n\n# --- Orchestrator ---\n\nclass CompositeTairuaLoss:\n    \"\"\"\n    Orchestrates acoustic simulation and multi-objective loss distribution.\n    Uses real acoustical_simulation when available (didgelab); falls back to dummy data otherwise.\n    Compatible with Nuevolution: implement .loss(shape) returning a dict with \"total\".\n    Set .target_freqs (1D array of target frequencies in Hz) when using with init_standard_evolution.\n    \"\"\"\n    def __init__(self, max_error: float = 5.0):\n        self.max_error = max_error\n        self.components: Dict[str, LossComponent] = {}\n        self.target_freqs: Optional[np.ndarray] = None  # for init_standard_evolution / EvolutionMonitor\n\n    def add_component(self, name: str, component: LossComponent):\n        self.components[name] = component\n\n    def loss(self, shape) -> Dict[str, float]:\n        if getattr(shape, \"loss\", None) is not None:\n            return shape.loss\n\n        try:\n            geo = shape.genome2geo()\n            freq_grid = get_log_simulation_frequencies(1, 1000, self.max_error)\n            impedances = np.asarray(acoustical_simulation(geo, freq_grid))\n\n            peak_indices, _ = find_peaks(impedances, prominence=0.05)\n\n            if len(peak_indices) == 0:\n                return {\"total\": 1_000_000}\n\n            peak_freqs_log = np.log2(freq_grid[peak_indices])\n            peak_impedances = impedances[peak_indices] / (impedances.max() + 1e-9)\n\n            results = {}\n            for name, comp in self.components.items():\n                results[name] = comp.calculate(peak_freqs_log, peak_impedances, freq_grid, impedances, peak_indices)\n\n            results[\"total\"] = sum(results.values())\n            shape.loss = results\n            return results\n\n        except Exception as e:\n            logging.exception(f\"EA Loss failed: {e}\")\n            return {\"total\": 1e8}\n\n\nclass ScaleTuningLoss(LossComponent):\n    \"\"\"\n    SCALE TUNING: Normalized by 600 cents.\n    \"\"\"\n    def __init__(self, base_note: int, intervals: List[int], weight: float):\n        self.weight = weight\n        self.base_note = base_note\n        self.intervals = intervals\n        self.scale_freqs_log = self._compute_scale_log(base_note, intervals)\n\n    def calculate(self, peak_freqs_log, peak_impedances, all_freqs, all_impedances, peak_indices):\n        total_dist_cents = 0\n        for f_log in peak_freqs_log:\n            dist = np.min(np.abs(self.scale_freqs_log - f_log))\n            total_dist_cents += dist * 1200 \n        avg_dist_normalized = (total_dist_cents / len(peak_freqs_log)) / 600.0\n        return avg_dist_normalized * self.weight\n\n    def get_formula(self) -> Tuple[str, List[str]]:\n        formula = r\"L_{scale} = w \\cdot \\frac{1}{600N} \\sum_{i=1}^{N} \\min |1200 \\cdot (\\log_2 f_{peak,i} - \\log_2 F_{scale})|\"\n        explanations = [\n            \"F_scale: Set of allowed log2 frequencies (scale notes from base + intervals).\",\n            \"f_peak,i: Detected resonance frequency.\",\n            \"min|…|: Distance to the closest in-tune note in the scale.\",\n            \"N: Number of peaks.\",\n            \"600: Normalization factor (6 semitones).\",\n            \"w: Weight for scale adherence.\",\n        ]\n        return formula, explanations\n\n    def _compute_scale_log(self, base_note: int, intervals: List[int]) -> np.ndarray:\n        # Generates a log2 frequency scale across the human hearing range\n        freqs_log = []\n        for octave in range(0, 5): # Cover 5 octaves\n            for interval in intervals:\n                # MIDI-style note calculation: note = base + octave*12 + interval\n                note = base_note + (octave * 12) + interval\n                # Conversion: freq = 440 * 2^((note-69)/12)\n                freq = 440.0 * (2.0 ** ((note - 69.0) / 12.0))\n                freqs_log.append(np.log2(freq))\n\n        return np.array(freqs_log)\n\nclass PeakQuantityLoss(LossComponent):\n    \"\"\"\n    PEAK QUANTITY (More Peaks): Penalizes 'dead' bore shapes that only support \n    one or two resonances. Encourages complex, multi-resonant geometry.\n    \"\"\"\n    def __init__(self, target_count: int, weight: float):\n        self.target_count = target_count\n        self.weight = weight\n\n    def calculate(self, peak_freqs_log, peak_impedances, all_freqs, all_impedances, peak_indices):\n        current_count = len(peak_indices)\n        # Loss is high if we have fewer peaks than the target\n        diff = max(0, self.target_count - current_count)\n        return diff * self.weight\n\n    def get_formula(self) -> Tuple[str, List[str]]:\n        formula = r\"L_{qty} = w \\cdot \\max(0, N_{target} - N_{actual})\"\n        explanations = [\n            \"N_target: Minimum desired number of resonance peaks.\",\n            \"N_actual: Number of peaks currently detected in the simulation.\",\n            \"w: Penalty per missing peak.\"\n        ]\n        return formula, explanations\n\nclass PeakAmplitudeLoss(LossComponent):\n    \"\"\"\n    PEAK AMPLITUDE (Higher Peaks): Penalizes low-impedance resonances.\n    Higher peaks generally correlate to better 'backpressure' and \n    more efficient energy transfer from the player's lips.\n    \"\"\"\n    def __init__(self, target_min_amplitude: float, weight: float):\n        self.target_min_amplitude = target_min_amplitude\n        self.weight = weight\n\n    def calculate(self, peak_freqs_log, peak_impedances, all_freqs, all_impedances, peak_indices):\n        # target_min_amplitude should be normalized relative to your simulation's max\n        # Penalize the average peak height if it falls below target\n        avg_amp = np.mean(peak_impedances)\n        loss = max(0, self.target_min_amplitude - avg_amp)\n        return loss * self.weight\n\n    def get_formula(self) -> Tuple[str, List[str]]:\n        formula = r\"L_{amp} = w \\cdot \\max(0, A_{target} - \\bar{A}_{peaks})\"\n        explanations = [\n            \"A_target: Desired average normalized impedance amplitude.\",\n            \"A_bar: Mean amplitude of all detected peaks.\",\n            \"w: Weight for resonance strength.\"\n        ]\n        return formula, explanations", "didgelab/visualize.py": "\"\"\"\nStub of didgelab.visualize for the in-browser build.\n\nThe real visualize uses matplotlib. The GUI uses Plotly directly, so we\nprovide no-op functions here for any code that imports the names but\nnever actually calls them.\n\"\"\"\n\ndef _noop(*args, **kwargs):\n    \"\"\"No-op stub. The browser GUI uses Plotly directly; matplotlib not loaded.\"\"\"\n    return None\n\n\ndef vis_didge(*args, **kwargs):\n    return _noop(*args, **kwargs)\n\n\ndef plot_bore(*args, **kwargs):\n    return _noop(*args, **kwargs)\n\n\ndef plot_impedance_spectrum(*args, **kwargs):\n    return _noop(*args, **kwargs)\n\n\ndef plot_notes(*args, **kwargs):\n    return _noop(*args, **kwargs)\n\n\ndef plot_geo_impedance_notes(*args, **kwargs):\n    return _noop(*args, **kwargs)\n", "streamlit_app.py": "\"\"\"\nDidgeLab GUI — spartan, browser edition (stlite / Pyodide).\n\nExposes every option of every public DidgeLab class. Minimal styling on\npurpose — every parameter in DidgeLab v3.0.16 should be reachable here.\n\"\"\"\nfrom __future__ import annotations\n\nimport io\nimport json\nimport time\nfrom typing import List, Optional, Tuple\n\nimport numpy as np\nimport pandas as pd\nimport streamlit as st\nimport plotly.graph_objects as go\n\n# -----------------------------------------------------------------------------\n# Bootstrap: monkey-patch DidgeLab so the default 'tlm_cython' backend silently\n# uses 'tlm_python' when the C extension isn't available (always the case in\n# the browser). Also disable output-folder creation in the App singleton.\n# -----------------------------------------------------------------------------\nimport didgelab.sim.tlm_cython as _tlm_cy\nif not _tlm_cy._CADSD_AVAILABLE:\n    from didgelab.sim.tlm_python import TransmissionLineModelPython as _Py\n    _py_sim = _Py()\n    _tlm_cy.TransmissionLineModelCython.get_impedance_spectrum = (\n        lambda self, geo, freqs: _py_sim.get_impedance_spectrum(geo, freqs)\n    )\n\nfrom didgelab.app import init_app\ninit_app(None, False)  # no output folder, no log file\n\nfrom didgelab import (\n    Geo,\n    acoustical_simulation,\n    get_log_simulation_frequencies,\n    get_notes,\n    compute_ground_spektrum,\n    note_to_freq,\n    note_name,\n    freq_to_note_and_cent,\n    freq_to_wavelength,\n    cent_diff,\n    Nuevolution,\n    GeoGenomeA,\n    KigaliShape,\n    TairuaLoss,\n    CompositeTairuaLoss,\n    FrequencyTuningLoss,\n    QFactorLoss,\n    ModalDensityLoss,\n    HarmonicSplittingLoss,\n    IntegerHarmonicLoss,\n    NearIntegerLoss,\n    StretchedOddLoss,\n    HighInharmonicLoss,\n    ScaleTuningLoss,\n    PeakQuantityLoss,\n    PeakAmplitudeLoss,\n    SimpleMutation,\n    RandomMutation,\n    SingleMutation,\n    RandomCrossover,\n    AverageCrossover,\n    PartSwapCrossover,\n    PartAverageCrossover,\n)\nfrom scipy.signal import find_peaks\nfrom didgelab.acoustical_simulation import interpolate_spectrum\n\n# -----------------------------------------------------------------------------\nst.set_page_config(page_title=\"DidgeLab GUI\", layout=\"wide\")\n\nSTARTER_GEO = [[0, 32], [300, 38], [700, 48], [1100, 60], [1500, 75]]\n\n\n# =============================================================================\n# Helpers\n# =============================================================================\ndef parse_geo_text(text: str) -> Optional[List[List[float]]]:\n    text = (text or \"\").strip()\n    if not text:\n        return None\n    try:\n        data = json.loads(text)\n        if isinstance(data, list) and data and isinstance(data[0], (list, tuple)):\n            return [[float(p[0]), float(p[1])] for p in data]\n    except Exception:\n        pass\n    pairs = []\n    for line in text.splitlines():\n        s = line.strip()\n        if not s or s.startswith(\"#\"):\n            continue\n        for sep in (\",\", \";\", \"\\t\", \"|\"):\n            s = s.replace(sep, \" \")\n        parts = [p for p in s.split() if p]\n        if len(parts) < 2:\n            continue\n        try:\n            pairs.append([float(parts[0]), float(parts[1])])\n        except ValueError:\n            continue\n    return pairs or None\n\n\ndef df_to_geo(df: pd.DataFrame) -> List[List[float]]:\n    rows = []\n    for _, row in df.iterrows():\n        try:\n            x = float(row[\"x_mm\"]); d = float(row[\"diameter_mm\"])\n        except (KeyError, TypeError, ValueError):\n            continue\n        if d <= 0:\n            continue\n        rows.append([x, d])\n    rows.sort(key=lambda p: p[0])\n    out = []\n    for p in rows:\n        if out and p[0] == out[-1][0]:\n            continue\n        out.append(p)\n    return out\n\n\ndef geo_volume_ml(pairs: List[List[float]]) -> float:\n    v = 0.0\n    for i in range(1, len(pairs)):\n        x0, d0 = pairs[i - 1]\n        x1, d1 = pairs[i]\n        L = x1 - x0\n        r0, r1 = d0 / 2, d1 / 2\n        v += (np.pi * L / 3.0) * (r0 ** 2 + r0 * r1 + r1 ** 2)\n    return v / 1000.0\n\n\ndef parse_note_name(name: str) -> Optional[int]:\n    if not name:\n        return None\n    name = name.strip()\n    i = 0\n    while i < len(name) and (name[i].isalpha() or name[i] in \"#b♯♭\"):\n        i += 1\n    head, octstr = name[:i], name[i:]\n    try:\n        oct_ = int(octstr)\n    except ValueError:\n        return None\n    head = head.replace(\"♯\", \"#\").replace(\"♭\", \"b\")\n    pcm = {\"C\": -9, \"C#\": -8, \"Db\": -8, \"D\": -7, \"D#\": -6, \"Eb\": -6, \"E\": -5,\n           \"F\": -4, \"F#\": -3, \"Gb\": -3, \"G\": -2, \"G#\": -1, \"Ab\": -1,\n           \"A\": 0, \"A#\": 1, \"Bb\": 1, \"B\": 2}\n    if head not in pcm:\n        return None\n    return pcm[head] + 12 * (oct_ - 4)\n\n\ndef parse_csv_floats(s: str) -> List[float]:\n    out = []\n    for tok in (s or \"\").replace(\";\", \",\").split(\",\"):\n        tok = tok.strip()\n        if not tok:\n            continue\n        try:\n            out.append(float(tok))\n        except ValueError:\n            pass\n    return out\n\n\ndef parse_csv_ints(s: str) -> List[int]:\n    return [int(v) for v in parse_csv_floats(s)]\n\n\ndef figure_bore(pairs: List[List[float]], real_scale: bool = True) -> go.Figure:\n    if not pairs:\n        return go.Figure()\n    xs = [p[0] for p in pairs]\n    rs = [p[1] / 2 for p in pairs]\n    fig = go.Figure()\n    fig.add_trace(go.Scatter(\n        x=xs + xs[::-1],\n        y=rs + [-r for r in rs[::-1]],\n        fill=\"toself\", fillcolor=\"rgba(110,150,200,0.4)\",\n        line=dict(color=\"rgba(40,80,140,0.95)\", width=1.5),\n        hovertemplate=\"x=%{x:.1f} mm<br>r=%{y:.2f} mm<extra><\/extra>\",\n        showlegend=False,\n    ))\n    layout = dict(height=240, margin=dict(l=10, r=10, t=10, b=30),\n                  xaxis_title=\"x (mm)\", yaxis_title=\"radius (mm)\",\n                  plot_bgcolor=\"white\")\n    if real_scale:\n        layout[\"yaxis\"] = dict(scaleanchor=\"x\", scaleratio=1)\n    fig.update_layout(**layout)\n    return fig\n\n\ndef figure_spectrum(freqs, impedance, peaks_df=None,\n                    targets: Optional[List[Tuple[float, str]]] = None,\n                    title: str = \"\") -> go.Figure:\n    fig = go.Figure()\n    fig.add_trace(go.Scatter(\n        x=freqs, y=impedance, mode=\"lines\",\n        line=dict(color=\"#3060a0\", width=1.4), name=\"|Z|\",\n    ))\n    if peaks_df is not None and not peaks_df.empty:\n        fig.add_trace(go.Scatter(\n            x=peaks_df[\"freq\"], y=peaks_df[\"impedance\"],\n            mode=\"markers+text\", text=peaks_df[\"note_name\"],\n            textposition=\"top center\",\n            marker=dict(size=8, color=\"#d04040\"), name=\"peaks\",\n        ))\n    if targets:\n        for f, lbl in targets:\n            fig.add_vline(x=f, line=dict(color=\"rgba(60,160,80,0.6)\", dash=\"dash\", width=1))\n            fig.add_annotation(x=f, y=1, yref=\"paper\", text=lbl, showarrow=False,\n                               font=dict(color=\"#3a8050\"), yshift=-4)\n    fig.update_layout(height=360, margin=dict(l=10, r=10, t=30, b=30),\n                      title=title, xaxis_title=\"frequency (Hz)\",\n                      yaxis_title=\"|Z|\", yaxis_type=\"log\",\n                      plot_bgcolor=\"white\")\n    return fig\n\n\n# =============================================================================\n# Sidebar — common settings + current geometry\n# =============================================================================\ndef sidebar() -> List[List[float]]:\n    st.sidebar.header(\"DidgeLab GUI (browser)\")\n    st.sidebar.caption(\"Pyodide + stlite. All compute happens in your browser.\")\n\n    st.sidebar.subheader(\"Backend\")\n    backend = st.sidebar.selectbox(\n        \"simulation_method\",\n        [\"tlm_cython (auto-fallback to python)\", \"tlm_python\", \"1d_fem\"],\n        index=0,\n        help=\"The default `tlm_cython` is patched to use tlm_python in browser. \"\n             \"1d_fem requires scikit-fem (probably unavailable here).\",\n    )\n    if backend.startswith(\"tlm_cython\"):\n        backend_id = \"tlm_cython\"\n    elif backend == \"tlm_python\":\n        backend_id = \"tlm_python\"\n    else:\n        backend_id = \"1d_fem\"\n\n    st.sidebar.subheader(\"Frequency grid\")\n    grid_mode = st.sidebar.radio(\"mode\", [\"log\", \"linear\"], horizontal=True)\n    fmin = st.sidebar.number_input(\"fmin (Hz)\", 1.0, 5000.0, 30.0, 1.0)\n    fmax = st.sidebar.number_input(\"fmax (Hz)\", 1.0, 10000.0, 1000.0, 50.0)\n    if grid_mode == \"log\":\n        max_error = st.sidebar.number_input(\n            \"max_error (cents)\", 0.5, 50.0, 5.0, 0.5,\n            help=\"Argument to get_log_simulation_frequencies.\",\n        )\n        n_points = None\n    else:\n        n_points = st.sidebar.number_input(\"n_points\", 50, 20000, 2000, 50)\n        max_error = None\n\n    base_freq = st.sidebar.number_input(\"base_freq A4 (Hz)\", 415.0, 466.0, 440.0, 0.5)\n\n    st.session_state.sim_settings = dict(\n        backend=backend_id, grid_mode=grid_mode,\n        fmin=fmin, fmax=fmax, max_error=max_error, n_points=n_points,\n        base_freq=base_freq,\n    )\n\n    st.sidebar.divider()\n    st.sidebar.subheader(\"Geometry source\")\n    src = st.sidebar.radio(\"input\", [\"Edit table\", \"Paste text\", \"Cone preset\"],\n                           horizontal=True)\n    if \"current_geo\" not in st.session_state:\n        st.session_state.current_geo = list(STARTER_GEO)\n    geo = list(st.session_state.current_geo)\n\n    if src == \"Edit table\":\n        df = pd.DataFrame(geo, columns=[\"x_mm\", \"diameter_mm\"])\n        edited = st.sidebar.data_editor(df, num_rows=\"dynamic\",\n                                        use_container_width=True,\n                                        hide_index=True, key=\"geoed\")\n        new = df_to_geo(edited)\n        if new and len(new) >= 2:\n            geo = new\n    elif src == \"Paste text\":\n        text = st.sidebar.text_area(\n            \"JSON [[x,d],...] or `x d` lines\",\n            value=\"\\n\".join(f\"{x:g} {d:g}\" for x, d in geo),\n            height=180, key=\"geopaste\",\n        )\n        parsed = parse_geo_text(text)\n        if parsed and len(parsed) >= 2:\n            geo = parsed\n        elif text.strip():\n            st.sidebar.warning(\"Could not parse — keeping previous.\")\n    else:\n        c1, c2 = st.sidebar.columns(2)\n        L = c1.number_input(\"length\", 100.0, 5000.0, 1500.0, 10.0)\n        n_segs = c2.number_input(\"segments\", 2, 200, 20, 1)\n        d1 = c1.number_input(\"d_mouth\", 5.0, 80.0, 32.0, 0.5)\n        d2 = c2.number_input(\"d_bell\", 10.0, 300.0, 75.0, 0.5)\n        cone = Geo.make_cone(L, d1, d2, int(n_segs))\n        geo = [list(p) for p in cone.geo]\n\n    if geo and len(geo) >= 2:\n        st.session_state.current_geo = geo\n\n    st.sidebar.caption(\n        f\"len={geo[-1][0]:.0f}mm  bell={geo[-1][1]:.1f}mm  \"\n        f\"max_d={max(p[1] for p in geo):.1f}  segs={len(geo)}  \"\n        f\"vol={geo_volume_ml(geo):.0f}ml\"\n    )\n\n    return geo\n\n\n# =============================================================================\n# Tab — Geometry operations\n# =============================================================================\ndef tab_geometry(geo: List[List[float]]):\n    st.header(\"Geometry\")\n    st.caption(\"Operations from `Geo`: bubble, stretch, scale, scale_length, \"\n               \"scale_diameter, move_segments_x, sort, fix_zero_length.\")\n\n    st.plotly_chart(figure_bore(geo), use_container_width=True, key=\"geo_bore\")\n\n    if len(geo) < 2:\n        st.warning(\"Geometry needs at least 2 segments.\")\n        return\n\n    cur = Geo([list(p) for p in geo])\n\n    with st.expander(\"make_bubble(pos, width, height)\", expanded=False):\n        c1, c2, c3, c4 = st.columns(4)\n        b_pos = c1.number_input(\"pos (mm)\", 0.0, float(cur.length()),\n                                float(cur.length()) * 0.6, 1.0, key=\"bubpos\")\n        b_w = c2.number_input(\"width\", 1.0, 1000.0, 100.0, 1.0, key=\"bubw\")\n        b_h = c3.number_input(\"height (ø mm)\", 5.0, 300.0, 70.0, 0.5, key=\"bubh\")\n        if c4.button(\"Apply bubble\", use_container_width=True):\n            try:\n                cur.make_bubble(b_pos, b_w, b_h)\n                cur.sort_segments()\n                st.session_state.current_geo = [list(p) for p in cur.geo]\n                st.rerun()\n            except Exception as e:\n                st.error(f\"make_bubble failed: {e}\")\n\n    with st.expander(\"stretch(factor) — scale x only\"):\n        c1, c2 = st.columns(2)\n        sf = c1.number_input(\"factor\", 0.1, 10.0, 1.1, 0.05, key=\"strf\")\n        if c2.button(\"Apply stretch\", use_container_width=True):\n            cur.stretch(sf)\n            st.session_state.current_geo = [list(p) for p in cur.geo]\n            st.rerun()\n\n    with st.expander(\"scale(factor) — scale x and diameter\"):\n        c1, c2 = st.columns(2)\n        sf = c1.number_input(\"factor\", 0.1, 10.0, 1.0, 0.05, key=\"scf\")\n        if c2.button(\"Apply scale\", use_container_width=True):\n            cur.scale(sf)\n            st.session_state.current_geo = [list(p) for p in cur.geo]\n            st.rerun()\n\n    with st.expander(\"Geo.scale_length(geo, max_length)\"):\n        c1, c2 = st.columns(2)\n        ml = c1.number_input(\"max_length\", 100.0, 5000.0, float(cur.length()),\n                             10.0, key=\"sl\")\n        if c2.button(\"Apply scale_length\", use_container_width=True):\n            Geo.scale_length(cur, ml)\n            st.session_state.current_geo = [list(p) for p in cur.geo]\n            st.rerun()\n\n    with st.expander(\"Geo.scale_diameter(geo, max_d)\"):\n        c1, c2 = st.columns(2)\n        md = c1.number_input(\"max_d\", 5.0, 300.0,\n                             float(max(p[1] for p in geo)), 0.5, key=\"sd\")\n        if c2.button(\"Apply scale_diameter\", use_container_width=True):\n            Geo.scale_diameter(cur, md)\n            st.session_state.current_geo = [list(p) for p in cur.geo]\n            st.rerun()\n\n    with st.expander(\"move_segments_x(start, end, offset)\"):\n        c1, c2, c3, c4 = st.columns(4)\n        s = c1.number_input(\"start idx\", 0, len(geo) - 1, 0, 1, key=\"ms\")\n        e = c2.number_input(\"end idx\", 0, len(geo) - 1, len(geo) - 1, 1, key=\"me\")\n        off = c3.number_input(\"offset (mm)\", -2000.0, 2000.0, 50.0, 1.0, key=\"mo\")\n        if c4.button(\"Apply move\", use_container_width=True):\n            try:\n                cur.move_segments_x(int(s), int(e), off)\n                cur.sort_segments()\n                st.session_state.current_geo = [list(p) for p in cur.geo]\n                st.rerun()\n            except Exception as ex:\n                st.error(f\"move failed: {ex}\")\n\n    with st.expander(\"Cleanup ops\"):\n        c1, c2, c3 = st.columns(3)\n        if c1.button(\"sort_segments()\", use_container_width=True):\n            cur.sort_segments()\n            st.session_state.current_geo = [list(p) for p in cur.geo]\n            st.rerun()\n        if c2.button(\"fix_zero_length_segments()\", use_container_width=True):\n            fixed = Geo.fix_zero_length_segments(cur)\n            st.session_state.current_geo = [list(p) for p in fixed.geo]\n            st.rerun()\n        if c3.button(\"Reset to starter\", use_container_width=True):\n            st.session_state.current_geo = list(STARTER_GEO)\n            st.rerun()\n\n    with st.expander(\"diameter_at_x(x) — interpolation lookup\"):\n        c1, c2 = st.columns(2)\n        xq = c1.number_input(\"x (mm)\", 0.0, float(cur.length()),\n                             float(cur.length()) / 2, 1.0, key=\"dxq\")\n        if 0 <= xq <= cur.length():\n            try:\n                d_at = Geo.diameter_at_x(cur, xq)\n                c2.metric(\"diameter at x\", f\"{d_at:.3f} mm\")\n            except Exception as e:\n                c2.error(f\"{e}\")\n\n    st.subheader(\"Export current geometry\")\n    c1, c2 = st.columns(2)\n    c1.download_button(\"⬇ JSON\", json.dumps(geo, indent=2),\n                       file_name=\"bore.json\", mime=\"application/json\",\n                       use_container_width=True)\n    txt = \"\\n\".join(f\"{x:.6f} {d:.6f}\" for x, d in geo)\n    c2.download_button(\"⬇ TXT (Geo.write_geo format)\", txt,\n                       file_name=\"bore.txt\", mime=\"text/plain\",\n                       use_container_width=True)\n\n\n# =============================================================================\n# Simulation runner used by multiple tabs\n# =============================================================================\ndef build_freq_grid(s) -> np.ndarray:\n    if s[\"grid_mode\"] == \"log\":\n        return get_log_simulation_frequencies(s[\"fmin\"], s[\"fmax\"], s[\"max_error\"])\n    return np.linspace(s[\"fmin\"], s[\"fmax\"], int(s[\"n_points\"]))\n\n\ndef run_sim(geo_pairs, settings) -> Tuple[np.ndarray, np.ndarray, pd.DataFrame]:\n    geo = Geo([list(p) for p in geo_pairs])\n    freqs = build_freq_grid(settings)\n    impedance = np.asarray(\n        acoustical_simulation(geo, freqs, simulation_method=settings[\"backend\"]),\n        dtype=float,\n    )\n    notes = get_notes(freqs, impedance, base_freq=settings[\"base_freq\"])\n    notes = notes.copy()\n    notes[\"freq\"] = notes[\"freq\"].astype(float).round(3)\n    notes[\"cent_diff\"] = notes[\"cent_diff\"].astype(float).round(2)\n    notes[\"rel_imp\"] = notes[\"rel_imp\"].astype(float).round(4)\n    return freqs, impedance, notes\n\n\n# =============================================================================\n# Tab — Simulation\n# =============================================================================\ndef tab_simulation(geo: List[List[float]]):\n    st.header(\"Simulation\")\n    settings = st.session_state.sim_settings\n\n    c1, c2 = st.columns([2, 1])\n    with c2:\n        do_ground = st.checkbox(\"compute_ground_spektrum\", False)\n        do_interp = st.checkbox(\"interpolate_spectrum (integer Hz grid)\", False)\n        target_freqs_str = st.text_input(\n            \"target_freqs (Hz, comma-separated; passed to get_notes)\", value=\"\",\n            help=\"Adds a 'target' column with cent deviation per peak.\",\n        )\n        target_freqs = parse_csv_floats(target_freqs_str)\n\n    if len(geo) < 2:\n        st.warning(\"Geometry needs at least 2 segments.\")\n        return\n\n    t0 = time.perf_counter()\n    try:\n        freqs, impedance, notes = run_sim(geo, settings)\n    except Exception as e:\n        st.error(f\"Simulation failed: {e}\")\n        return\n    if target_freqs:\n        try:\n            notes = get_notes(freqs, impedance, base_freq=settings[\"base_freq\"],\n                              target_freqs=np.asarray(target_freqs))\n        except Exception as e:\n            st.warning(f\"target_freqs ignored: {e}\")\n    elapsed = time.perf_counter() - t0\n\n    with c1:\n        st.plotly_chart(figure_spectrum(freqs, impedance, notes),\n                        use_container_width=True, key=\"sim_sp\")\n\n    st.caption(f\"{len(notes)} peaks · {len(freqs)} grid points · {elapsed:.2f}s\")\n    st.dataframe(notes, use_container_width=True, hide_index=True, height=260)\n\n    csv = notes.to_csv(index=False)\n    st.download_button(\"⬇ Peaks (CSV)\", csv, file_name=\"peaks.csv\",\n                       mime=\"text/csv\")\n\n    if do_interp or do_ground:\n        try:\n            f_int, imp_int = interpolate_spectrum(freqs, impedance)\n        except Exception as e:\n            st.error(f\"interpolate_spectrum failed: {e}\")\n            return\n        if do_interp:\n            st.subheader(\"Interpolated spectrum (1 Hz grid)\")\n            fig = go.Figure()\n            fig.add_trace(go.Scatter(x=f_int, y=imp_int, mode=\"lines\",\n                                     line=dict(color=\"#608030\", width=1)))\n            fig.update_layout(height=260, margin=dict(l=10, r=10, t=10, b=30),\n                              xaxis_title=\"freq (Hz)\", yaxis_title=\"|Z|\",\n                              yaxis_type=\"log\", plot_bgcolor=\"white\")\n            st.plotly_chart(fig, use_container_width=True, key=\"sim_interp\")\n\n        if do_ground:\n            try:\n                gnd = compute_ground_spektrum(f_int, imp_int.copy())\n                st.subheader(\"Ground spectrum (dB)\")\n                fig = go.Figure()\n                fig.add_trace(go.Scatter(x=f_int, y=gnd, mode=\"lines\",\n                                         line=dict(color=\"#a04060\", width=1)))\n                fig.update_layout(height=260, margin=dict(l=10, r=10, t=10, b=30),\n                                  xaxis_title=\"freq (Hz)\", yaxis_title=\"dB\",\n                                  plot_bgcolor=\"white\")\n                st.plotly_chart(fig, use_container_width=True, key=\"sim_ground\")\n            except Exception as e:\n                st.error(f\"compute_ground_spektrum failed: {e}\")\n\n\n# =============================================================================\n# Tab — Evolution\n# =============================================================================\nOPERATOR_CLASSES = {\n    \"RandomCrossover\": RandomCrossover,\n    \"AverageCrossover\": AverageCrossover,\n    \"PartSwapCrossover\": PartSwapCrossover,\n    \"PartAverageCrossover\": PartAverageCrossover,\n    \"SimpleMutation\": SimpleMutation,\n    \"RandomMutation\": RandomMutation,\n    \"SingleMutation\": SingleMutation,\n}\n\n\ndef build_genome(name: str, params: dict):\n    if name == \"GeoGenomeA\":\n        return GeoGenomeA.build(int(params[\"n_segments\"]))\n    if name == \"KigaliShape\":\n        return KigaliShape(**params)\n    raise ValueError(name)\n\n\ndef kigali_form() -> dict:\n    \"\"\"Expose every KigaliShape constructor argument.\"\"\"\n    p = {}\n    c = st.columns(3)\n    p[\"n_segments\"] = c[0].number_input(\"n_segments\", 4, 80, 24, 1, key=\"ki_n\")\n    p[\"d0\"] = c[1].number_input(\"d0 (mouth ø)\", 5.0, 80.0, 32.0, 0.5, key=\"ki_d0\")\n    p[\"smoothness\"] = c[2].number_input(\"smoothness\", 0.0, 1.0, 0.3, 0.05, key=\"ki_sm\")\n\n    c = st.columns(3)\n    p[\"d_bell_min\"] = c[0].number_input(\"d_bell_min\", 10.0, 300.0, 50.0, 0.5, key=\"ki_bmin\")\n    p[\"d_bell_max\"] = c[1].number_input(\"d_bell_max\", 10.0, 400.0, 80.0, 0.5, key=\"ki_bmax\")\n    p[\"bell_accent\"] = c[2].number_input(\"bell_accent\", 0.0, 5.0, 0.0, 0.05, key=\"ki_ba\")\n\n    c = st.columns(3)\n    p[\"min_length\"] = c[0].number_input(\"min_length\", 100.0, 5000.0, 1500.0, 10.0, key=\"ki_minL\")\n    p[\"max_length\"] = c[1].number_input(\"max_length\", 100.0, 5000.0, 1900.0, 10.0, key=\"ki_maxL\")\n    p[\"bell_start\"] = c[2].number_input(\"bell_start\", 0.0, 5000.0, 300.0, 10.0, key=\"ki_bs\")\n\n    c = st.columns(3)\n    p[\"n_bubbles\"] = c[0].number_input(\"n_bubbles\", 0, 10, 0, 1, key=\"ki_nb\")\n    p[\"n_bell_segments\"] = c[1].number_input(\"n_bell_segments\", 2, 50, 10, 1, key=\"ki_nbs\")\n    p[\"sine_shape_n\"] = c[2].number_input(\"sine_shape_n\", 0.0, 10.0, 0.0, 0.1, key=\"ki_ssn\")\n    p[\"sine_shape_y\"] = st.number_input(\"sine_shape_y\", 0.0, 50.0, 0.0, 0.5, key=\"ki_ssy\")\n\n    with st.expander(\"Cylinder–cone hybrid\"):\n        p[\"enable_cylinder_cone\"] = st.checkbox(\"enable_cylinder_cone\", False, key=\"ki_ecc\")\n        cz = st.text_input(\"cylinder_cone_z_pos (csv of 2 floats 0–1)\", \"0.3, 0.7\", key=\"ki_czp\")\n        ct = st.text_input(\"cylinder_cone_transition_diameter (csv of 2 mm)\", \"32, 36\", key=\"ki_ctd\")\n        zp = parse_csv_floats(cz); td = parse_csv_floats(ct)\n        if len(zp) == 2:\n            p[\"cylinder_cone_z_pos\"] = zp\n        if len(td) == 2:\n            p[\"cylinder_cone_transition_diameter\"] = td\n\n    with st.expander(\"Mouthpiece taper\"):\n        p[\"enable_taper\"] = st.checkbox(\"enable_taper\", False, key=\"ki_et\")\n        c = st.columns(4)\n        p[\"taper_start\"] = c[0].number_input(\"taper_start\", 0.0, 500.0, 20.0, 1.0, key=\"ki_ts\")\n        p[\"taper_end\"] = c[1].number_input(\"taper_end\", 0.0, 500.0, 50.0, 1.0, key=\"ki_te\")\n        p[\"taper_diameter\"] = c[2].number_input(\"taper_diameter\", 5.0, 100.0, 20.0, 0.5, key=\"ki_td\")\n        p[\"taper_n_segments\"] = c[3].number_input(\"taper_n_segments\", 1, 50, 8, 1, key=\"ki_tns\")\n\n    return p\n\n\ndef loss_form_tairua(geo_settings) -> Optional[TairuaLoss]:\n    \"\"\"All TairuaLoss kwargs.\"\"\"\n    if \"ev_targets\" not in st.session_state:\n        st.session_state.ev_targets = [\n            {\"note\": \"D2\", \"freq_w\": 1.0, \"rel_imp\": 1.0, \"imp_w\": 0.5},\n            {\"note\": \"D3\", \"freq_w\": 1.0, \"rel_imp\": 0.5, \"imp_w\": 0.5},\n            {\"note\": \"F#3\", \"freq_w\": 0.8, \"rel_imp\": 0.3, \"imp_w\": 0.3},\n        ]\n    df = pd.DataFrame(st.session_state.ev_targets)\n    edited = st.data_editor(df, num_rows=\"dynamic\", use_container_width=True,\n                            hide_index=True, key=\"tedit\")\n    st.session_state.ev_targets = edited.to_dict(\"records\")\n    rows = edited.to_dict(\"records\")\n\n    target_freqs = []; tgt_imps = []; fw = []; iw = []\n    for r in rows:\n        nn = parse_note_name(str(r.get(\"note\", \"\")))\n        if nn is None:\n            continue\n        target_freqs.append(float(note_to_freq(nn)))\n        tgt_imps.append(float(r.get(\"rel_imp\", 0.5)))\n        fw.append(float(r.get(\"freq_w\", 1.0)))\n        iw.append(float(r.get(\"imp_w\", 0.5)))\n    if not target_freqs:\n        st.warning(\"No valid note targets.\")\n        return None\n\n    c1, c2, c3 = st.columns(3)\n    higher = c1.checkbox(\"higher_peaks\", False)\n    higher_w = c2.number_input(\"higher_peaks_weight\", 0.0, 100.0, 1.0, 0.1)\n    more = c3.checkbox(\"more_peaks\", False)\n    c1, c2, c3 = st.columns(3)\n    more_w = c1.number_input(\"more_peaks_weight\", 0.0, 100.0, 1.0, 0.1)\n    max_err = c2.number_input(\"max_error (cents)\", 0.5, 50.0, 5.0, 0.5,\n                              help=\"freq grid resolution used internally by TairuaLoss\")\n    use_scale = c3.checkbox(\"scale tuning\")\n    scale_kwargs = {}\n    if use_scale:\n        c = st.columns(3)\n        sk = c[0].text_input(\"scale_key (note like D2 or A2)\", \"D2\")\n        sv = c[1].text_input(\"scale (csv semitones, e.g. 0,2,4,5,7,9,11)\",\n                             \"0,2,4,5,7,9,11\")\n        sw = c[2].number_input(\"scale_weight\", 0.0, 100.0, 1.0, 0.1)\n        nn = parse_note_name(sk)\n        if nn is not None:\n            scale_kwargs[\"scale_key\"] = int(nn)\n            scale_kwargs[\"scale\"] = parse_csv_ints(sv)\n            scale_kwargs[\"scale_weight\"] = float(sw)\n\n    return TairuaLoss(\n        target_freqs=target_freqs,\n        target_impedances=tgt_imps,\n        freq_weights=fw,\n        impedance_weights=iw,\n        higher_peaks=higher,\n        higher_peaks_weight=higher_w,\n        more_peaks=more,\n        more_peaks_weight=more_w,\n        max_error=max_err,\n        **scale_kwargs,\n    )\n\n\ndef loss_form_composite() -> Optional[CompositeTairuaLoss]:\n    st.caption(\"Add per-component weights. Frequency tuning is required; \"\n               \"anything else is optional.\")\n    c = st.columns(2)\n    max_err = c[0].number_input(\"max_error (cents)\", 0.5, 50.0, 5.0, 0.5, key=\"cl_me\")\n    if \"cl_targets\" not in st.session_state:\n        st.session_state.cl_targets = [\n            {\"note\": \"D2\", \"rel_imp\": 1.0, \"weight\": 1.0},\n            {\"note\": \"D3\", \"rel_imp\": 0.5, \"weight\": 1.0},\n        ]\n    edt = st.data_editor(pd.DataFrame(st.session_state.cl_targets),\n                         num_rows=\"dynamic\", hide_index=True,\n                         use_container_width=True, key=\"cl_te\")\n    st.session_state.cl_targets = edt.to_dict(\"records\")\n\n    rows = edt.to_dict(\"records\")\n    tfl = []; til = []; tw = []\n    for r in rows:\n        nn = parse_note_name(str(r.get(\"note\", \"\")))\n        if nn is None:\n            continue\n        tfl.append(float(note_to_freq(nn)))\n        til.append(float(r.get(\"rel_imp\", 0.5)))\n        tw.append(float(r.get(\"weight\", 1.0)))\n    if not tfl:\n        st.warning(\"No valid targets\")\n        return None\n\n    composite = CompositeTairuaLoss(max_error=max_err)\n    composite.add_component(\n        \"tuning\",\n        FrequencyTuningLoss(\n            target_freqs_log=np.log2(np.array(tfl)),\n            target_impedances=np.array(til),\n            weights=tw,\n        ),\n    )\n\n    with st.expander(\"Optional components\"):\n        if st.checkbox(\"QFactorLoss\"):\n            c = st.columns(2)\n            q = c[0].number_input(\"target_q\", 0.1, 200.0, 30.0, 0.5, key=\"qf_q\")\n            w = c[1].number_input(\"weight\", 0.0, 100.0, 1.0, 0.1, key=\"qf_w\")\n            composite.add_component(\"q\", QFactorLoss(target_q=q, weight=w))\n\n        if st.checkbox(\"ModalDensityLoss\"):\n            c = st.columns(2)\n            r = c[0].number_input(\"cluster_range_cents\", 0.0, 1200.0, 200.0, 5.0, key=\"md_r\")\n            w = c[1].number_input(\"weight\", 0.0, 100.0, 1.0, 0.1, key=\"md_w\")\n            composite.add_component(\"modal\", ModalDensityLoss(cluster_range_cents=r, weight=w))\n\n        if st.checkbox(\"HarmonicSplittingLoss\"):\n            c = st.columns(3)\n            i = c[0].number_input(\"harmonic_index\", 0, 20, 1, 1, key=\"hs_i\")\n            sw = c[1].number_input(\"split_width_hz\", 0.1, 200.0, 5.0, 0.1, key=\"hs_sw\")\n            w = c[2].number_input(\"weight\", 0.0, 100.0, 1.0, 0.1, key=\"hs_w\")\n            composite.add_component(\n                \"split\",\n                HarmonicSplittingLoss(harmonic_index=int(i), split_width_hz=sw, weight=w),\n            )\n\n        if st.checkbox(\"IntegerHarmonicLoss\"):\n            w = st.number_input(\"weight (int harm)\", 0.0, 100.0, 1.0, 0.1, key=\"ih_w\")\n            composite.add_component(\"integer\", IntegerHarmonicLoss(weight=w))\n\n        if st.checkbox(\"NearIntegerLoss\"):\n            w = st.number_input(\"weight (near int)\", 0.0, 100.0, 1.0, 0.1, key=\"ni_w\")\n            composite.add_component(\"near_int\", NearIntegerLoss(weight=w))\n\n        if st.checkbox(\"StretchedOddLoss\"):\n            c = st.columns(2)\n            sf = c[0].number_input(\"stretch_factor\", 0.5, 2.0, 1.0, 0.005, key=\"so_sf\")\n            w = c[1].number_input(\"weight\", 0.0, 100.0, 1.0, 0.1, key=\"so_w\")\n            composite.add_component(\n                \"stretched_odd\", StretchedOddLoss(stretch_factor=sf, weight=w))\n\n        if st.checkbox(\"HighInharmonicLoss\"):\n            w = st.number_input(\"weight (highinharm)\", 0.0, 100.0, 1.0, 0.1, key=\"hi_w\")\n            composite.add_component(\"high_inharm\", HighInharmonicLoss(weight=w))\n\n        if st.checkbox(\"ScaleTuningLoss\"):\n            c = st.columns(3)\n            bk = c[0].text_input(\"base_note (e.g. D2)\", \"D2\", key=\"st_bk\")\n            sv = c[1].text_input(\"intervals (csv)\", \"0,2,4,5,7,9,11\", key=\"st_sv\")\n            w = c[2].number_input(\"weight\", 0.0, 100.0, 1.0, 0.1, key=\"st_w\")\n            nn = parse_note_name(bk)\n            if nn is not None:\n                composite.add_component(\n                    \"scale\", ScaleTuningLoss(base_note=int(nn),\n                                             intervals=parse_csv_ints(sv), weight=w))\n\n        if st.checkbox(\"PeakQuantityLoss\"):\n            c = st.columns(2)\n            tc = c[0].number_input(\"target_count\", 1, 30, 6, 1, key=\"pq_tc\")\n            w = c[1].number_input(\"weight\", 0.0, 100.0, 1.0, 0.1, key=\"pq_w\")\n            composite.add_component(\"peak_qty\",\n                                    PeakQuantityLoss(target_count=int(tc), weight=w))\n\n        if st.checkbox(\"PeakAmplitudeLoss\"):\n            w = st.number_input(\"weight (peak amp)\", 0.0, 100.0, 1.0, 0.1, key=\"pa_w\")\n            composite.add_component(\"peak_amp\", PeakAmplitudeLoss(weight=w))\n\n    return composite\n\n\ndef tab_evolution(geo: List[List[float]]):\n    st.header(\"Evolution\")\n    settings = st.session_state.sim_settings\n\n    st.subheader(\"Genome\")\n    genome_kind = st.radio(\"type\", [\"GeoGenomeA\", \"KigaliShape\"], horizontal=True)\n\n    genome_params: dict = {}\n    if genome_kind == \"GeoGenomeA\":\n        genome_params[\"n_segments\"] = st.number_input(\"n_segments\", 4, 60, 10, 1)\n    else:\n        genome_params = kigali_form()\n\n    st.subheader(\"Loss function\")\n    loss_kind = st.radio(\"loss\", [\"TairuaLoss\", \"CompositeTairuaLoss\"], horizontal=True)\n\n    loss_obj = None\n    if loss_kind == \"TairuaLoss\":\n        loss_obj = loss_form_tairua(settings)\n    else:\n        loss_obj = loss_form_composite()\n\n    st.subheader(\"Nuevolution parameters\")\n    c = st.columns(4)\n    pop = c[0].number_input(\"population_size\", 4, 500, 20, 1)\n    gen_size = c[1].number_input(\"generation_size\", 2, 200, 10, 1)\n    n_gens = c[2].number_input(\"num_generations\", 1, 1000, 30, 1)\n    max_threads = c[3].number_input(\"max_n_threads\", 1, 8, 1, 1,\n                                    help=\"Browser is single-threaded; leave at 1.\")\n\n    c = st.columns(2)\n    mr = c[0].number_input(\"evolution_parameters.mutation_rate\", 0.0, 1.0, 0.5, 0.05)\n    gmp = c[1].number_input(\"evolution_parameters.gene_mutation_prob\", 0.0, 1.0, 0.5, 0.05)\n\n    st.subheader(\"Operators (probabilities — automatically normalised)\")\n    op_probs = {}\n    cols = st.columns(4)\n    defaults = {\"RandomCrossover\": 0.16, \"AverageCrossover\": 0.16,\n                \"PartSwapCrossover\": 0.16, \"PartAverageCrossover\": 0.16,\n                \"SimpleMutation\": 0.16, \"RandomMutation\": 0.10,\n                \"SingleMutation\": 0.10}\n    for i, (name, default) in enumerate(defaults.items()):\n        op_probs[name] = cols[i % 4].number_input(name, 0.0, 10.0, default, 0.05,\n                                                  key=f\"op_{name}\")\n\n    run = st.button(\"▶ Run evolution\",\n                    type=\"primary\",\n                    disabled=(loss_obj is None))\n\n    if run and loss_obj is not None:\n        try:\n            father = build_genome(genome_kind, genome_params)\n        except Exception as e:\n            st.error(f\"Genome construction failed: {e}\")\n            return\n\n        op_objs = []; op_pr = []\n        for name, prob in op_probs.items():\n            if prob > 0:\n                op_objs.append(OPERATOR_CLASSES[name]())\n                op_pr.append(float(prob))\n        if not op_objs:\n            st.error(\"Need at least one operator with probability > 0.\")\n            return\n        s = sum(op_pr); op_pr = [p / s for p in op_pr]\n\n        prog = st.progress(0.0, text=\"Initialising…\")\n        loss_slot = st.empty()\n        loss_history: List[float] = []\n\n        def on_gen(i_gen, pop_):\n            best = pop_[0].loss[\"total\"]\n            loss_history.append(float(best))\n            prog.progress(min(i_gen / max(1, n_gens), 1.0),\n                          text=f\"gen {i_gen}/{n_gens} · best {best:.4f}\")\n            df = pd.DataFrame({\"gen\": list(range(len(loss_history))),\n                               \"best_loss\": loss_history})\n            fig = go.Figure()\n            fig.add_trace(go.Scatter(x=df[\"gen\"], y=df[\"best_loss\"],\n                                     mode=\"lines+markers\",\n                                     line=dict(color=\"#3060a0\")))\n            fig.update_layout(height=220, margin=dict(l=10, r=10, t=10, b=30),\n                              xaxis_title=\"generation\", yaxis_title=\"best loss\",\n                              plot_bgcolor=\"white\")\n            loss_slot.plotly_chart(fig, use_container_width=True,\n                                   key=f\"loss_{i_gen}\")\n\n        evo = Nuevolution(\n            loss=loss_obj,\n            father_genome=father,\n            generation_size=int(gen_size),\n            num_generations=int(n_gens),\n            population_size=int(pop),\n            max_n_threads=int(max_threads),\n            evolution_parameters={\"mutation_rate\": mr, \"gene_mutation_prob\": gmp},\n            evolution_operators=op_objs,\n            evolution_operator_probs=op_pr,\n            callback_generation_ended=on_gen,\n        )\n        with st.spinner(\"Evolving in your browser… one generation at a time.\"):\n            try:\n                final_pop = evo.evolve()\n            except Exception as e:\n                st.error(f\"Evolution failed: {e}\")\n                return\n\n        prog.progress(1.0, text=\"Done\")\n        best = final_pop[0]\n        bg = best.genome2geo()\n        bg_pairs = [list(p) for p in bg.geo]\n\n        st.subheader(f\"Best — total loss {best.loss['total']:.4f}\")\n        st.json({k: float(v) if isinstance(v, (int, float, np.floating)) else\n                str(v) for k, v in best.loss.items()})\n        st.plotly_chart(figure_bore(bg_pairs), use_container_width=True,\n                        key=\"evo_bore\")\n\n        try:\n            f_b, i_b, n_b = run_sim(bg_pairs, settings)\n            st.plotly_chart(figure_spectrum(f_b, i_b, n_b),\n                            use_container_width=True, key=\"evo_sp\")\n            st.dataframe(n_b, use_container_width=True, hide_index=True, height=240)\n        except Exception as e:\n            st.error(f\"Could not simulate best: {e}\")\n\n        c1, c2 = st.columns(2)\n        if c1.button(\"📥 Use best as current geometry\"):\n            st.session_state.current_geo = bg_pairs\n            st.success(\"Loaded — switch to Geometry or Simulation tab.\")\n        c2.download_button(\"⬇ Best (JSON)\", json.dumps(bg_pairs, indent=2),\n                           file_name=\"evolved.json\", mime=\"application/json\",\n                           use_container_width=True)\n\n\n# =============================================================================\n# Tab — Compare with tootMaster\n# =============================================================================\ndef parse_external_peaks(text: str) -> Optional[pd.DataFrame]:\n    text = (text or \"\").strip()\n    if not text:\n        return None\n    for sep in [\",\", \"\\t\", \";\", r\"\\s+\"]:\n        try:\n            df = pd.read_csv(io.StringIO(text), sep=sep, engine=\"python\")\n        except Exception:\n            continue\n        if df.shape[1] >= 1 and df.shape[0] >= 1:\n            cols = {c.lower().strip(): c for c in df.columns}\n            freq_col = next((cols[k] for k in\n                             (\"freq\", \"frequency\", \"hz\", \"f\") if k in cols), None)\n            note_col = next((cols[k] for k in\n                             (\"note\", \"note_name\", \"name\") if k in cols), None)\n            cent_col = next((cols[k] for k in\n                             (\"cent\", \"cents\", \"cent_diff\") if k in cols), None)\n            if freq_col is not None:\n                out = pd.DataFrame()\n                if note_col:\n                    out[\"note\"] = df[note_col].astype(str)\n                out[\"freq\"] = pd.to_numeric(df[freq_col], errors=\"coerce\")\n                if cent_col:\n                    out[\"cent_diff\"] = pd.to_numeric(df[cent_col], errors=\"coerce\")\n                out = out.dropna(subset=[\"freq\"])\n                if not out.empty:\n                    return out.reset_index(drop=True)\n    rows = []\n    for line in text.splitlines():\n        s = line.strip()\n        if not s or s.startswith(\"#\"):\n            continue\n        toks = [t for t in s.replace(\",\", \" \").split() if t]\n        note = None; freq = None\n        for t in toks:\n            try:\n                f = float(t)\n                if 10 < f < 5000:\n                    freq = f; break\n            except ValueError:\n                if note is None and any(c.isalpha() for c in t):\n                    note = t\n        if freq is not None:\n            rows.append({\"note\": note or \"\", \"freq\": freq})\n    return pd.DataFrame(rows) if rows else None\n\n\ndef tab_compare(geo: List[List[float]]):\n    st.header(\"Compare with tootMaster\")\n    if len(geo) < 2:\n        st.warning(\"Geometry needs at least 2 segments.\")\n        return\n    settings = st.session_state.sim_settings\n    try:\n        freqs, impedance, dl_notes = run_sim(geo, settings)\n    except Exception as e:\n        st.error(f\"DidgeLab simulation failed: {e}\")\n        return\n\n    L, R = st.columns(2)\n    with L:\n        st.subheader(\"DidgeLab peaks\")\n        st.dataframe(dl_notes[[\"note_name\", \"freq\", \"cent_diff\", \"rel_imp\"]],\n                     use_container_width=True, hide_index=True, height=320)\n    with R:\n        st.subheader(\"tootMaster paste\")\n        ext = st.text_area(\"Paste peaks (CSV or loose lines)\",\n                           height=180, key=\"cmp_paste\",\n                           placeholder=\"note,freq,cents\\nD2,73.42,0\\n…\")\n        ext_df = parse_external_peaks(ext)\n        if ext_df is not None:\n            st.dataframe(ext_df, use_container_width=True, hide_index=True, height=200)\n        elif ext.strip():\n            st.warning(\"Could not parse\")\n\n    st.plotly_chart(figure_spectrum(freqs, impedance, dl_notes,\n                                    title=\"DidgeLab impedance + peaks\"),\n                    use_container_width=True, key=\"cmp_spec\")\n\n    if ext_df is not None and not ext_df.empty:\n        mode = st.radio(\"Pairing\", [\"By order\", \"By nearest\"], horizontal=True)\n        dl_freqs = dl_notes[\"freq\"].to_numpy()\n        dl_names = dl_notes[\"note_name\"].astype(str).to_numpy()\n        ef = ext_df[\"freq\"].to_numpy()\n        en = (ext_df[\"note\"].astype(str).to_numpy()\n              if \"note\" in ext_df.columns else np.array([\"\"] * len(ef)))\n        rows = []\n        if mode == \"By order\":\n            n = min(len(dl_freqs), len(ef))\n            for i in range(n):\n                rows.append({\"#\": i + 1,\n                             \"DidgeLab\": dl_names[i],\n                             \"DL Hz\": round(float(dl_freqs[i]), 2),\n                             \"tootMaster\": en[i],\n                             \"TM Hz\": round(float(ef[i]), 2),\n                             \"Δ cents (TM−DL)\": round(cent_diff(float(dl_freqs[i]), float(ef[i])), 2)})\n        else:\n            for i, df_hz in enumerate(dl_freqs):\n                j = int(np.argmin(np.abs(ef - df_hz)))\n                rows.append({\"#\": i + 1,\n                             \"DidgeLab\": dl_names[i],\n                             \"DL Hz\": round(float(df_hz), 2),\n                             \"tootMaster\": en[j],\n                             \"TM Hz\": round(float(ef[j]), 2),\n                             \"Δ cents (TM−DL)\": round(cent_diff(float(df_hz), float(ef[j])), 2)})\n        ad = pd.DataFrame(rows)\n        st.dataframe(ad, use_container_width=True, hide_index=True)\n        if not ad.empty:\n            d = ad[\"Δ cents (TM−DL)\"].astype(float).to_numpy()\n            c1, c2, c3 = st.columns(3)\n            c1.metric(\"Mean |Δ|\", f\"{np.mean(np.abs(d)):.2f} ¢\")\n            c2.metric(\"Max |Δ|\", f\"{np.max(np.abs(d)):.2f} ¢\")\n            c3.metric(\"# peaks\", f\"{len(d)}\")\n\n\n# =============================================================================\n# Tab — Note tools (conv module)\n# =============================================================================\ndef tab_conv():\n    st.header(\"Note / frequency tools (didgelab.conv)\")\n\n    c1, c2 = st.columns(2)\n    with c1:\n        st.subheader(\"note_to_freq / note_name → freq\")\n        n = st.text_input(\"note name (e.g. D2)\", \"D2\")\n        nn = parse_note_name(n)\n        bf = st.number_input(\"base_freq A4\", 415.0, 466.0, 440.0, 0.5, key=\"cv_bf\")\n        if nn is not None:\n            f = float(note_to_freq(nn, base_freq=bf))\n            st.write(f\"note number = **{nn}**, freq = **{f:.4f} Hz**, \"\n                     f\"wavelength = **{freq_to_wavelength(f) * 1000:.2f} mm**\")\n        else:\n            st.warning(\"Could not parse note.\")\n\n    with c2:\n        st.subheader(\"freq_to_note + cent_diff\")\n        f_in = st.number_input(\"freq (Hz)\", 1.0, 5000.0, 73.42, 0.01, key=\"cv_fin\")\n        nn2, cents = freq_to_note_and_cent(f_in, base_freq=bf)\n        st.write(f\"nearest note **{note_name(nn2)}** ({nn2}), \"\n                 f\"cents = **{cents:+.2f}**\")\n\n    st.divider()\n    st.subheader(\"cent_diff(f_target, f_actual)\")\n    c1, c2, c3 = st.columns(3)\n    a = c1.number_input(\"f_target (Hz)\", 1.0, 5000.0, 73.42, 0.01, key=\"cd_a\")\n    b = c2.number_input(\"f_actual (Hz)\", 1.0, 5000.0, 73.0, 0.01, key=\"cd_b\")\n    c3.metric(\"Δ cents\", f\"{cent_diff(a, b):+.3f}\")\n\n\n# =============================================================================\n# Main\n# =============================================================================\ndef main():\n    geo = sidebar()\n    t1, t2, t3, t4, t5, t6 = st.tabs(\n        [\"Geometry\", \"Simulation\", \"Evolution\", \"Compare\", \"Conv tools\", \"About\"]\n    )\n    with t1: tab_geometry(geo)\n    with t2: tab_simulation(geo)\n    with t3: tab_evolution(geo)\n    with t4: tab_compare(geo)\n    with t5: tab_conv()\n    with t6:\n        st.header(\"About\")\n        st.markdown(\n            \"\"\"\n            Browser build of the DidgeLab GUI. Runs entirely in your browser via\n            **Pyodide + stlite** — no server, no install.\n\n            - Default backend `tlm_cython` is patched to `tlm_python` (the C\n              extension can't be built for the browser; same numerical results,\n              ~10–30× slower). You can pick `tlm_python` explicitly to be sure.\n            - `1d_fem` requires `scikit-fem`; it'll error if scikit-fem isn't in\n              this Pyodide image.\n            - Output folder / file logging in `App` is disabled.\n            - `didgelab.visualize` is stubbed (matplotlib not loaded).\n\n            DidgeLab licence: **CC BY-NC-SA 4.0** (non-commercial only).\n            \"\"\"\n        )\n\n\nif __name__ == \"__main__\":\n    main()\n"}</script>

  <script type="module">
    import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.js";

    // Decode bundled files (didgelab/* tree + streamlit_app.py).
    const filesText = document.getElementById("bundled-files").textContent;
    const files = JSON.parse(filesText);

    // Hide the boot screen once Streamlit visibly mounts something.
    const boot = document.getElementById("boot");
    const root = document.getElementById("root");
    const obs = new MutationObserver(() => {
      if (root.querySelector("[data-testid], .stApp, iframe, section")) {
        boot.classList.add("hidden");
        setTimeout(() => boot.remove(), 600);
        obs.disconnect();
      }
    });
    obs.observe(root, { childList: true, subtree: true });

    mount(
      {
        entrypoint: "streamlit_app.py",
        requirements: ["scipy", "pandas", "tqdm", "configargparse", "plotly"],
        files: files,
      },
      root
    );
  </script>
</body>
</html>
