probs\n\n        self.i_generation = -1\n        self.population = None\n\n        self.recompute_losses = False\n\n        self.continue_evolution = True\n\n        get_app().register_service(self)\n\n        def recompute_loss():\n            self.recompute_losses = True\n\n        get_app().subscribe(\"recompute_loss\", recompute_loss)\n\n        if isinstance(father_genome, Genome):\n            genome_type = type(father_genome).__name__\n        elif isinstance(father_genome, list):\n            genome_type = type(father_genome[0]).__name__\n        else:\n            raise Exception()\n\n        logging_infos = {\n            \"loss\": type(loss).__name__,\n            \"father_genome\": genome_type,\n            \"generation_size\": generation_size,\n            \"num_generations\": num_generations,\n            \"population_size\": population_size,\n            \"evolution_parameters\": evolution_parameters,\n            \"evolution_operators\": [type(o).__name__ for o in evolution_operators],\n            \"evolution_operator_probs\": evolution_operator_probs\n        }\n        logging_infos = sorted([f\"{key}: {value}\" for key, value in logging_infos.items()])\n        logging_infos = \"Initialize Nuevolution\\n\" + \"\\n\".join(logging_infos)\n        logging.info(logging_infos)\n\n    def get_evolution_progress(self):\n        \"\"\"Return progress in [0, 1]: (current_generation + 1) / num_generations.\"\"\"\n        return (self.i_generation + 1) / self.num_generations\n\n    def _map_losses_with_progress(self, pool, individuals, i_generation=None):\n        \"\"\"Compute losses via pool.map, invoking callback_loss_progress as each completes.\n\n        Used for: initial population, recompute (e.g. after acoustic target change), and\n        per-generation new offspring. The callback receives (i_generation, completed, total)\n        so UIs can show \"progress of generation X\" during any of these phases.\n\n        i_generation: generation index for callback (default: self.i_generation).\n            Use 0 for initial population; use start_from_generation when resuming with recompute.\n        \"\"\"\n        total = len(individuals)\n        gen = i_generation if i_generation is not None else self.i_generation\n        if self.callback_loss_progress is None or total == 0:\n            return list(pool.map(self.loss.loss, individuals))\n        results = []\n        for i, loss in enumerate(pool.map(self.loss.loss, individuals)):\n            results.append(loss)\n            self.callback_loss_progress(gen, i + 1, total)\n        return results\n\n    def evolve(self, initial_population=None, start_from_generation=0):\n        \"\"\"\n        Run evolution for num_generations; return the final population (sorted by total loss).\n\n        Args:\n            initial_population: Optional list of Genome objects to use as starting population.\n                If provided, overrides father_genome. Each genome must have .loss set.\n            start_from_generation: If > 0, skip to this generation (for resuming).\n                The loop runs from start_from_generation+1 to num_generations.\n        \"\"\"\n        # initialize\n        num_workers = multiprocessing.cpu_count()\n        if self.max_n_threads is not None:\n            num_workers = np.min((self.max_n_threads, num_workers))\n\n        logging.info(f\"initialize threadpoolexecutor with {num_workers} workers\")\n        pool = ThreadPoolExecutor(max_workers=num_workers)\n\n        if initial_population is not None and len(initial_population) > 0:\n            self.population = initial_population\n            logging.info(\"resuming from initial population of %d individuals\", len(self.population))\n        elif isinstance(self.father_genome, Genome):\n            self.population = []\n            for i in range(self.generation_size):\n                mutant = self.father_genome.clone()\n                mutant.randomize_genome()\n                self.population.append(mutant)\n        elif isinstance(self.father_genome, list):\n            self.population = self.father_genome\n        else:\n            raise Exception()\n\n        if initial_population is None or not all(\n            hasattr(p, \"loss\") and p.loss is not None for p in self.population\n        ):\n            logging.info(\"compute initial generation\")\n            # Use 0 for fresh start; use start_from_generation when resuming so UI shows correct \"generation X\"\n            initial_gen = 0 if start_from_generation == 0 else start_from_generation\n            if self.callback_loss_progress is None:\n                losses = list(tqdm(pool.map(self.loss.loss, self.population), total=len(self.population)))\n            else:\n                losses = self._map_losses_with_progress(pool, self.population, i_generation=initial_gen)\n            for i in range(len(losses)):\n                self.population[i].loss = losses[i]\n        self.population = sorted(self.population, key=lambda x: x.loss[\"total\"])\n\n        self.i_generation = start_from_generation\n        get_app().publish(\"log_evolution_operations\", (self.i_generation, self.population, [], []))\n        # evolve\n        probs = []\n        for i_generation in range(start_from_generation + 1, self.num_generations + 1):\n\n            if not self.continue_evolution:\n                break\n\n            get_app().publish(\"generation_started\", (self.i_generation, self.population))\n\n            if len(probs) != len(self.population):\n                # compute probabilities that an individual will be selected\n                probs = (1 + np.arange(len(self.population))) / len(self.population)\n                probs = np.exp(probs)\n                probs = np.exp(probs)\n                probs = np.flip(probs)\n                probs /= probs.sum()\n\n            self.i_generation = i_generation\n\n            if self.recompute_losses:\n                # Recompute population losses (e.g. after acoustic target change); report progress for this generation\n                losses = self._map_losses_with_progress(pool, self.population, i_generation=self.i_generation)\n                for i in range(len(losses)):\n                    self.population[i].loss = losses[i]\n                self.recompute_losses = False\n\n            op_probs = np.asarray(self.evolution_operator_probs, dtype=float)\n            op_probs = op_probs / op_probs.sum()\n            operations = np.random.choice(\n                self.evolution_operators, size=self.generation_size, p=op_probs\n            )\n\n            new_generation = []\n            mutation_operations = []\n            crossover_operations = []\n            for operator in operations:\n\n                if isinstance(operator, MutationOperator):\n                    parent = np.random.choice(self.population, p=probs)\n                    individual, operation_description = operator.apply(parent, self.evolution_parameters)\n                    mutation_operations.append(operation_description)\n                    new_generation.append(individual)\n                elif isinstance(operator, CrossoverOperator):\n                    parent1 = np.random.choice(self.population, p=probs)\n                    parent2 = parent1\n                    while parent1.id == parent2.id:\n                        parent2 = np.random.choice(self.population, p=probs)\n                    individual, operation_description = operator.apply(parent1, parent2, self.evolution_parameters)\n                    crossover_operations.append(operation_description)\n                    new_generation.append(individual)\n\n            # compute losses\n            losses = self._map_losses_with_progress(pool, new_generation)\n            for i in range(len(losses)):\n                new_generation[i].loss = losses[i]\n\n            # collect logging data\n            get_app().publish(\n                \"log_evolution_operations\",\n                (self.i_generation, new_generation, mutation_operations, crossover_operations)\n            )\n\n            self.population = self.population + new_generation\n            self.population = sorted(self.population, key=lambda x: x.loss[\"total\"])\n\n            if len(self.population) > self.population_size:\n                self.population = self.population[0:self.population_size]\n\n            get_app().publish(\"generation_ended\", (self.i_generation, self.population))\n\n            if self.callback_generation_ended is not None:\n                self.callback_generation_ended(self.i_generation, self.population)\n\n        get_app().publish(\"evolution_ended\", (self.population))\n        return self.population\n", "didgelab/evo/writer.py": "\"\"\"\nEvolution logging: JSONL operations, population snapshots, loss CSV.\n\"\"\"\n\nimport json\nimport os\nimport csv\nimport gzip\nimport logging\nfrom collections import defaultdict\nfrom datetime import datetime\nfrom time import time\nfrom typing import List, DefaultDict\n\nimport numpy as np\n\nfrom didgelab.app import get_app\nfrom .genome import Genome\nfrom .evolution import Nuevolution\n\n\nclass NumpyEncoder(json.JSONEncoder):\n    \"\"\"JSON encoder that converts numpy scalars and arrays to Python int/float/list.\"\"\"\n\n    def default(self, obj):\n        if isinstance(obj, np.integer):\n            return int(obj)\n        if isinstance(obj, np.floating):\n            return float(obj)\n        if isinstance(obj, np.ndarray):\n            return obj.tolist()\n        return json.JSONEncoder.default(self, obj)\n\n\nclass NuevolutionWriter:\n    \"\"\"\n    Writes evolution logs: per-generation operations (JSONL), population snapshots, and optional loss CSV.\n\n    Subscribes to app events (generation_ended, evolution_ended, log_evolution_operations).\n    Output files go to the app output folder (evolution_operations.jsonl.gz, population.json.gz, losses.csv.gz).\n    \"\"\"\n\n    def __init__(self,\n                 interval=20,\n                 write_loss=False,\n                 write_population_interval=100,\n                 log_operations=True):\n\n        self.interval = interval\n        self.writer = None\n        self.format = None\n        self._write_loss_csv = write_loss\n        self.write_population_interval = write_population_interval\n        self.log_operations = log_operations\n        self.log_evolutions_file = None\n        self.write_population_writer = None\n        self.csvfile = None\n        self.current_generation = None\n\n        def generation_ended(i_generation, population):\n            self.current_generation = i_generation\n\n            if self._write_loss_csv:\n                self.write_loss(i_generation, population)\n            if self.write_population_interval > 0 and i_generation % self.write_population_interval == 0:\n                msg = f\"generation {i_generation} ended, writing population to file\\n\"\n                msg += \"loss:\\n\"\n                losses = [f\"{key}: {value}\" for key, value in population[0].loss.items()]\n                msg += \"\\n\".join(losses)\n                logging.info(msg)\n                self.write_population(population, i_generation)\n\n        if self.write_population_interval > 0 or self._write_loss_csv:\n            get_app().subscribe(\"generation_ended\", generation_ended)\n\n        def evolution_ended(population):\n            self.write_population(population)\n\n            if self.csvfile is not None:\n                self.csvfile.close()\n            self.log_evolutions_file.close()\n            self.writer = None\n            self.write_population_writer.close()\n\n        get_app().subscribe(\"evolution_ended\", evolution_ended)\n        get_app().subscribe(\"log_evolution_operations\", self.log_evolution_operations)\n        get_app().register_service(self)\n\n    def log_evolution_operations(self, i_generation, individuals, mutation_operations, crossover_operations):\n        \"\"\"Append one line (JSON) to evolution_operations.jsonl.gz for this generation.\"\"\"\n        if self.log_evolutions_file is None:\n            outfile = os.path.join(get_app().get_output_folder(), \"evolution_operations.jsonl.gz\")\n            self.log_evolutions_file = gzip.open(outfile, \"w\")\n\n        def flatten_dicts(list_of_dicts):\n            flattened = defaultdict(list)\n            for di in list_of_dicts:\n                for key, value in di.items():\n                    flattened[key].append(value)\n            return flattened\n\n        nuevo = get_app().get_service(Nuevolution)\n        operator_probs = {}\n        for i in range(len(nuevo.evolution_operators)):\n            op = type(nuevo.evolution_operators[i]).__name__\n            p = nuevo.evolution_operator_probs[i]\n            operator_probs[op] = p\n\n        data = {\n            \"genome_ids\": [g.id for g in individuals],\n            \"genomes\": [g.genome.tolist() for g in individuals],\n            \"losses\": flatten_dicts([g.loss for g in individuals]),\n            \"mutations_operations\": flatten_dicts(mutation_operations),\n            \"crossover_operations\": flatten_dicts(crossover_operations),\n            \"date\": datetime.now().isoformat(),\n            \"generation\": i_generation,\n            \"evolution_operator_probs\": operator_probs\n        }\n\n        self.log_evolutions_file.write(json.dumps(data).encode())\n        self.log_evolutions_file.write(\"\\n\".encode())\n\n    def write_population(self, population: List[Genome], generation=None):\n        \"\"\"Append top individuals (up to 20) to population.json.gz and update latest_population.json.\"\"\"\n        if generation is None:\n            generation = self.current_generation\n\n        if self.write_population_writer is None:\n            outfile = os.path.join(get_app().get_output_folder(), \"population.json.gz\")\n            self.write_population_writer = gzip.open(outfile, \"w\")\n\n        data = []\n        max_individuals = 20\n        i = 0\n\n        for p in population:\n            i += 1\n            if i > max_individuals:\n                break\n\n            data.append({\n                \"genome\": list(p.genome),\n                \"loss\": p.loss,\n                \"representation\": p.representation()\n            })\n\n        data2 = {\"generation\": generation, \"population\": data}\n        data2 = json.dumps(data2, cls=NumpyEncoder)\n        self.write_population_writer.write(data2.encode())\n        self.write_population_writer.write(\"\\n\".encode())\n\n        outfile = os.path.join(get_app().get_output_folder(), \"latest_population.json\")\n        with open(outfile, \"w\") as f:\n            json.dump(data2, f)\n\n    def write_loss(self, i_generation, population: List[Genome]):\n        \"\"\"Append one row per individual to losses.csv.gz (generation, step, time, genome, loss keys).\"\"\"\n        if self.writer is None and self._write_loss_csv:\n            outfile = os.path.join(get_app().get_output_folder(), \"losses.csv.gz\")\n            self.csvfile = gzip.open(outfile, \"a\")\n            self.writer = csv.writer(self.csvfile)\n\n        if self.format is None:\n            self.format = [\"i_generation\", \"step\", \"time\", \"genome\"]\n            for key in population[0].loss.keys():\n                self.format.append(key)\n            self.writer.writerow(self.format)\n\n        step = 0\n\n        for i in range(len(population)):\n            individual = population[i]\n            row = [i_generation, step, time(), individual.genome]\n            for key in self.format[len(row):]:\n                row.append(individual.loss[key])\n            self.writer.writerow(row)\n\ndef load_latest_evolution(shape, output_folder = \"outputs\"):\n    files = os.listdir(output_folder)\n    files = sorted(files)\n    infile = os.path.join(output_folder, files[-1])\n    population = []\n    with gzip.open(infile, \"rb\") as f:\n        x = f.read().decode(\"utf-8\")\n        x = json.loads(x)\n\n        for i in range(len(x[\"population\"])):\n            ind = shape.clone()\n            ind.genome = np.array(x[\"population\"][i])\n            ind.loss = {key: np.float32(value) for key, value in x[\"losses\"][i].items()}\n            population.append(ind)\n        return population\n", "didgelab/evo/__main__.py": "\"\"\"\nEntry point for: python -m didgelab.evo\n\"\"\"\n\nfrom . import (\n    NuevolutionWriter,\n    Nuevolution,\n    TestLossFunction,\n    GeoGenomeA,\n    LinearDecreasingMutation,\n    AdaptiveProbabilities,\n)\n\nif __name__ == \"__main__\":\n    writer = NuevolutionWriter()\n    evo = Nuevolution(\n        TestLossFunction(),\n        GeoGenomeA.build(5),\n        num_generations=10,\n        population_size=1000,\n        generation_size=20)\n\n    schedulers = [\n        LinearDecreasingMutation()\n    ]\n    AdaptiveProbabilities()\n    evo.evolve()\n", "didgelab/evo/loss.py": "\"\"\"\nLoss functions for evaluating genomes. Lower loss is better.\n\"\"\"\n\nimport numpy as np\nfrom abc import ABC, abstractmethod\n\nfrom .genome import Genome\n\n\nclass LossFunction(ABC):\n    \"\"\"Abstract loss used to evaluate a genome. Lower loss is better.\"\"\"\n\n    @abstractmethod\n    def loss(self, shape: Genome):\n        \"\"\"Compute loss for the given genome. Returns a dict (must include 'total' for selection).\"\"\"\n        pass\n\n\nclass TestLossFunction(LossFunction):\n    \"\"\"Example loss for testing: sum(first half) / sum(second half) plus dummy keys.\"\"\"\n\n    def loss(self, genome: Genome):\n        l = int(len(genome.genome)/2)\n        return {\"total\": np.sum(genome.genome[0:l]) / np.sum(genome.genome[l:]), \"test\": -5, \"test2\": 10}\n", "didgelab/evo/operators.py": "\"\"\"\nMutation and crossover operators for evolution.\n\"\"\"\n\nimport numpy as np\nfrom abc import ABC, abstractmethod\nfrom typing import Dict, Tuple\n\nfrom .genome import Genome\n\n\nclass MutationOperator(ABC):\n    \"\"\"Abstract operator that mutates a single genome to produce one offspring.\"\"\"\n\n    @abstractmethod\n    def apply(self, genome: Genome, evolution_parameters: Dict) -> Tuple[Genome, Dict]:\n        \"\"\"Apply mutation; return (child_genome, operation_description_dict).\"\"\"\n        pass\n\n    def describe(self, father_genome, child_genome):\n        \"\"\"Return a dict describing the mutation (operation name, father_id, child_id).\"\"\"\n        return {\n            \"operation\": type(self).__name__,\n            \"father_id\": father_genome.id,\n            \"child_id\": child_genome.id\n        }\n\n\nclass CrossoverOperator(ABC):\n    \"\"\"Abstract operator that combines two parent genomes to produce one offspring.\"\"\"\n\n    @abstractmethod\n    def apply(self, genome1: Genome, genome2: Genome, evolution_parameters: Dict) -> Tuple[Genome, Dict]:\n        \"\"\"Apply crossover; return (child_genome, operation_description_dict).\"\"\"\n        pass\n\n    def describe(self, parent1_genome, parent2_genome, child_genome):\n        \"\"\"Return a dict describing the crossover (operation name, parent ids, child_id).\"\"\"\n        return {\n            \"operation\": type(self).__name__,\n            \"parent1_genome\": parent1_genome.id,\n            \"parent2_genome\": parent2_genome.id,\n            \"child_id\": child_genome.id\n        }\n\n\nclass SimpleMutation(MutationOperator):\n    \"\"\"Add uniform random noise to genes; clamp to [0, 1]. Uses mutation_rate and gene_mutation_prob.\"\"\"\n\n    def apply(self, genome: Genome, evolution_parameters: Dict) -> Tuple[Genome, Dict]:\n\n        mr = evolution_parameters[\"mutation_rate\"]\n        if mr is None:\n            mr = 0.5\n        mp = evolution_parameters[\"gene_mutation_prob\"]\n        if mp is None:\n            mp = 0.5\n\n        mutation = np.random.uniform(low=-mr, high=mr, size=len(genome.genome))\n        mutation *= (np.random.sample(size=len(mutation)) < mp).astype(int)\n        mutation = genome.genome + mutation\n        mutation[mutation < 0] = 0\n        mutation[mutation > 1] = 1\n\n        new_genome = genome.clone()\n        new_genome.genome = mutation\n        return new_genome, self.describe(genome, new_genome)\n\n\nclass RandomMutation(MutationOperator):\n    \"\"\"Replace the entire genome with random values in [0, 1].\"\"\"\n\n    def apply(self, genome: Genome, evolution_parameters: Dict) -> Tuple[Genome, Dict]:\n        new_genome = genome.clone()\n        new_genome.genome = np.random.sample(len(genome.genome))\n        return new_genome, self.describe(genome, new_genome)\n\n\nclass SingleMutation(MutationOperator):\n    \"\"\"Change one randomly chosen gene by adding uniform noise in [-1, 1], then clamp to [0, 1].\"\"\"\n\n    def apply(self, genome: Genome, evolution_parameters: Dict) -> Tuple[Genome, Dict]:\n        new_genome = genome.clone()\n\n        i = np.random.randint(0, len(new_genome.genome))\n        v = new_genome.genome[i]\n        v += np.random.uniform(-1, 1)\n        if v < 0:\n            v = 0\n        if v > 1:\n            v = 1\n        new_genome.genome[i] = v\n        return new_genome, self.describe(genome, new_genome)\n\n\nclass RandomCrossover(CrossoverOperator):\n    \"\"\"For each gene, choose randomly from parent1 or parent2.\"\"\"\n\n    def apply(self, parent1: Genome, parent2: Genome, evolution_parameters: Dict) -> Tuple[Genome, Dict]:\n        assert type(parent1) == type(parent2)\n        new_genome = list(zip(parent1.genome, parent2.genome))\n        new_genome = np.array([np.random.choice(x) for x in new_genome])\n\n        offspring = parent1.clone()\n        offspring.genome = new_genome\n        return offspring, self.describe(parent1, parent2, offspring)\n\n\nclass AverageCrossover(CrossoverOperator):\n    \"\"\"Each gene is the mean of parent1 and parent2.\"\"\"\n\n    def apply(self, parent1: Genome, parent2: Genome, evolution_parameters: Dict) -> Tuple[Genome, Dict]:\n        assert type(parent1) == type(parent2)\n        new_genome = (parent1.genome + parent2.genome) / 2\n\n        offspring = parent1.clone()\n        offspring.genome = new_genome\n        return offspring, self.describe(parent1, parent2, offspring)\n\n\nclass PartSwapCrossover(CrossoverOperator):\n    \"\"\"Swap a contiguous slice of genes: parent1[0:i1], parent2[i1:i2], parent1[i2:]. Indices random.\"\"\"\n\n    def apply(self, parent1: Genome, parent2: Genome, evolution_parameters: Dict = {}) -> Tuple[Genome, Dict]:\n        assert type(parent1) == type(parent2)\n\n        indizes = np.random.choice(np.arange(len(parent1.genome)), size=2, replace=False)\n        i1 = np.min(indizes)\n        i2 = np.max(indizes)\n\n        offspring = parent1.clone()\n        offspring.genome = np.concatenate(\n            (parent1.genome[0:i1],\n             parent2.genome[i1:i2],\n             parent1.genome[i2:]))\n\n        assert len(offspring.genome) == len(parent1.genome)\n        return offspring, self.describe(parent1, parent2, offspring)\n\n\nclass PartAverageCrossover(CrossoverOperator):\n    \"\"\"Average a contiguous slice of genes between parents; rest from parent1. Indices random.\"\"\"\n\n    def apply(self, parent1: Genome, parent2: Genome, evolution_parameters: Dict = {}) -> Tuple[Genome, Dict]:\n        assert type(parent1) == type(parent2)\n\n        indizes = np.random.choice(np.arange(len(parent1.genome)), size=2, replace=False)\n        i1 = np.min(indizes)\n        i2 = np.max(indizes)\n\n        offspring = parent1.clone()\n        offspring.genome = np.concatenate(\n            (parent1.genome[0:i1],\n             (parent1.genome[i1:i2] + parent2.genome[i1:i2]) / 2,\n             parent1.genome[i2:]))\n\n        assert len(offspring.genome) == len(parent1.genome)\n        return offspring, self.describe(parent1, parent2, offspring)\n", "didgelab/shapes/__init__.py": "", "didgelab/shapes/MbeyaShape.py": "\"\"\"\nMbeya-style parametric didgeridoo shape (MbeyaGenome).\n\nGenome with named parameters: straight section, opening section, bell, and\noptional bubbles. Each parameter has min/max and is encoded in the genome.\n\"\"\"\n\nimport numpy as np\n\nfrom ..evo import GeoGenome\nfrom ..geo import Geo\n\n\nclass MbeyaGenome(GeoGenome):\n    \"\"\"\n    Parametric bore: straight tube, opening section, bell, then optional bubbles.\n\n    Uses named parameters (add_param / get_value) so each gene has a min/max.\n    Genome length = number of named params. build: mouth -> straight -> opening -> bell -> bubbles.\n    \"\"\"\n\n    def add_param(self, name: str, minval: float, maxval: float) -> None:\n        \"\"\"\n        Register a named parameter; next genome index, linear map [0,1] -> [minval, maxval].\n\n        Args:\n            name: Parameter name (used with get_value).\n            minval: Minimum value when genome gene is 0.\n            maxval: Maximum value when genome gene is 1.\n        \"\"\"\n        self.named_params[name] = {\n            \"index\": len(self.named_params),\n            \"min\": minval,\n            \"max\": maxval,\n        }\n\n    def get_value(self, name: str) -> float:\n        \"\"\"\n        Decode genome at this parameter's index to value in [min, max].\n\n        Args:\n            name: Parameter name previously registered with add_param.\n\n        Returns:\n            Value in the range [minval, maxval] for that parameter.\n        \"\"\"\n        p = self.named_params[name]\n        v = self.genome[p[\"index\"]]\n        return v * (p[\"max\"] - p[\"min\"]) + p[\"min\"]\n\n    def __init__(self, n_bubbles: int = 3, add_bubble_prob: float = 0.7):\n        \"\"\"\n        Args:\n            n_bubbles: Number of bubble (bulge) features along the bore; each has pos, width, height params.\n            add_bubble_prob: Probability used when sampling/evolving whether to add a bubble (0..1).\n        \"\"\"\n        self.named_params = {}\n\n        self.d1 = 32\n        self.add_bubble_prob = add_bubble_prob\n        self.n_bubbles = n_bubbles\n\n        # Straight cylindrical part (length, diameter factor)\n        self.add_param(\"l_gerade\", 500, 1500)\n        self.add_param(\"d_gerade\", 0.9, 1.2)\n\n        # Opening section (number of segments, x/y power factors, length)\n        self.add_param(\"n_opening_segments\", 0, 8)\n        self.add_param(\"opening_factor_x\", -2, 2)\n        self.add_param(\"opening_factor_y\", -2, 2)\n        self.add_param(\"opening_length\", 700, 1000)\n\n        # Bell (pre-bell diameter, bell length, bellsize increment)\n        self.add_param(\"d_pre_bell\", 40, 50)\n        self.add_param(\"l_bell\", 20, 50)\n        self.add_param(\"bellsize\", 5, 30)\n\n        # Per-bubble: height, position (0..1 along length), width\n        for i in range(self.n_bubbles):\n            self.add_param(f\"add_bubble_{i}\", 0, 1)\n            self.add_param(f\"bubble_height_{i}\", -0.5, 1)\n            self.add_param(f\"bubble_pos_{i}\", 0, 1)\n            self.add_param(f\"bubble_width_{i}\", 150, 300)\n\n        self.n_segments = 11\n\n        GeoGenome.__init__(self, n_genes=len(self.named_params))\n\n    def make_bubble(\n        self, shape: list, pos: float, width: float, height: float\n    ) -> list:\n        \"\"\"\n        Insert a sinusoidal bulge into shape: points before bubble, bubble arc, points after.\n\n        Args:\n            shape: List of [x, diameter] segment points (mm) defining the current bore.\n            pos: Center x position of the bubble (mm).\n            width: Length of the bubble along the bore (mm).\n            height: Bulge factor; local diameter is multiplied by 1 + sin(pi*j/n)*height over the bubble.\n\n        Returns:\n            New list of [x, diameter] points with the bubble segment replaced by the bulge arc.\n        \"\"\"\n        i = self.get_index(shape, pos - 0.5 * width)\n        bubbleshape = shape[0:i]\n\n        x = pos - 0.5 * width\n        y = Geo.diameter_at_x(shape, x)\n        if shape[i - 1][0] < x:\n            bubbleshape.append([x, y])\n\n        for j in range(1, self.n_segments):\n            x = pos - 0.5 * width + j * width / self.n_segments\n            y = Geo.diameter_at_x(shape, x)\n            factor = 1 + np.sin(j * np.pi / self.n_segments) * height\n            y *= factor\n            bubbleshape.append([x, y])\n\n        x = pos + 0.5 * width\n        y = Geo.diameter_at_x(shape, x)\n        bubbleshape.append([x, y])\n\n        while i < len(shape) and shape[i][0] <= bubbleshape[-1][0] + 1:\n            i += 1\n        bubbleshape.extend(shape[i:])\n\n        return bubbleshape\n\n    def get_index(self, shape: list, x: float) -> int:\n        \"\"\"\n        Return the first index i such that shape[i][0] > x (or len(shape)-1).\n\n        Args:\n            shape: List of [x, diameter] segment points (mm), x strictly increasing.\n            x: Position in mm along the bore.\n\n        Returns:\n            Smallest i with shape[i][0] > x, or len(shape)-1 if no such i.\n        \"\"\"\n        for i in range(len(shape)):\n            if shape[i][0] > x:\n                return i\n        return len(shape) - 1\n\n    def genome2geo(self) -> Geo:\n        \"\"\"\n        Build geometry: mouth -> straight -> opening (power-law) -> bell -> bubbles.\n\n        Returns:\n            Geo instance with bore as list of (x_mm, diameter_mm) segments; zero-length\n            segments removed via Geo.fix_zero_length_segments.\n        \"\"\"\n        shape = [[0, self.d1]]\n\n        # Straight section\n        p = [\n            self.get_value(\"l_gerade\"),\n            shape[-1][1] * self.get_value(\"d_gerade\"),\n        ]\n        shape.append(p)\n\n        # Opening section: power-law spacing in x and y, then normalised and scaled\n        n_seg = int(self.get_value(\"n_opening_segments\"))\n        seg_x = []\n        seg_y = []\n        for i in range(n_seg):\n            seg_x.append(pow(i + 1, self.get_value(\"opening_factor_x\")))\n            seg_y.append(pow(i + 1, self.get_value(\"opening_factor_y\")))\n\n        def normalize(arr):\n            m = sum(arr)\n            return [x / m for x in arr]\n\n        seg_x = normalize(seg_x)\n        seg_y = normalize(seg_y)\n        seg_x = [x * self.get_value(\"opening_length\") for x in seg_x]\n        seg_y = [y * self.get_value(\"d_pre_bell\") for y in seg_y]\n\n        start_x, start_y = shape[-1][0], shape[-1][1]\n        for i in range(n_seg):\n            shape.append([\n                sum(seg_x[0 : i + 1]) + start_x,\n                sum(seg_y[0 : i + 1]) + start_y,\n            ])\n\n        # Bell\n        shape.append([\n            shape[-1][0] + self.get_value(\"l_bell\"),\n            shape[-1][1] + self.get_value(\"bellsize\"),\n        ])\n\n        # Bubbles (position clamped so bubble stays inside bore)\n        for i in range(self.n_bubbles):\n            pos = shape[-1][0] * self.get_value(f\"bubble_pos_{i}\")\n            width = self.get_value(f\"bubble_width_{i}\")\n            height = self.get_value(f\"bubble_height_{i}\")\n            if pos - width / 2 < -10:\n                pos = width / 2 + 10\n            if pos + width / 2 + 10 > shape[-1][0]:\n                pos = shape[-1][0] - width / 2 - 10\n            shape = self.make_bubble(shape, pos, width, height)\n\n        geo = Geo(shape)\n        geo = Geo.fix_zero_length_segments(geo)\n        return geo\n\n", "didgelab/shapes/KigaliShape.py": "\"\"\"\nKigali-style parametric didgeridoo shape.\n\n### **1\\. The Genetic Foundation**\n\nFirst, the model takes the genome (a list of values between 0 and 1\\) and scales them to real-world dimensions.\n\n* **Length & Bell:** Determine the bounding box.  \n* **Power-Law Curve:** This creates the \"ideal\" taper. If the power is $1.0$, it’s a straight cone; if it’s $\\>1.0$, it becomes a parabolic horn.\n\n### **2\\. The Jitter Layer**\n\nThe genome provides x\\_genome and y\\_genome offsets. These act like \"noise\" that pushes the diameter in or out at various segments. This gives the didgeridoo its unique, organic character and complex overtones.\n\n### **3\\. The \"Exact\" Constraint Layer (RBF)**\n\nThis is where your forced\\_diameters come in. To make the diameter exact at a specific $x$ without creating a sharp, unplayable edge, we use **Radial Basis Function (RBF) Interpolation**.\n\n* **Error Calculation:** The code looks at the current diameter at your target distance ($x=800$) and calculates the \"error\" ($\\\\Delta$).  \n* **Anchor Points:** We set the error at the mouthpiece ($x=0$) and the bell ($x=L$) to zero so the ends don't move.  \n* **Smooth Warping:** The RBF creates a continuous mathematical function that passes **exactly** through your required $\\\\Delta$ at $x=800$ and $x=1400$, while remaining $0$ at the ends.  \n* **Addition:** This function is added to the bore. The entire shape \"bends\" just enough to hit your exact numbers while preserving the \"genetic\" ripples from step 2\\.\n\n### **4\\. Acoustic Features**\n\n* **Bell Accent:** If a bell accent is defined, the last section of the bore is mathematically flared outward to increase volume and projection.  \n* **Bubbles:** Finally, \"bubbles\" (sinusoidal bulges) are added. These are local expansions used to tune specific resonances or \"toots\" without changing the overall taper of the instrument.\n\"\"\"\n\nimport numpy as np\nfrom typing import Any, List, Tuple, Optional\n\nfrom ..geo import Geo\nfrom ..evo.genome import GeoGenome\n\nfrom scipy.interpolate import Rbf # Ensure scipy is available\n\n\n\nclass KigaliShape(GeoGenome):\n    \"\"\"\n    Parametric bore shape: supports power-law taper, hybrid cylinder-cone \n    transitions, mouthpiece leadpipe tapers, and optional bubbles.\n\n    Genome layout:\n    - [0]: length (min_length .. max_length)\n    - [1]: bell diameter (d_bell_min .. d_bell_max)\n    - [2]: power exponent for taper curve\n    - [3 + 3*k : 3 + 3*(k+1)]: per bubble k: position, width, height\n    - [geo_offset + 2*j]: x/y jitter offsets for segment j\n    - [cyl_offset]: (Optional) transition position for cylinder-cone\n    - [cyl_offset + 1]: (Optional) transition diameter for cylinder-cone\n    \"\"\"\n    def __init__(\n        self,\n        n_segments: int = 24,\n        d0: float = 32,\n        d_bell_min: float = 50,\n        d_bell_max: float = 80,\n        max_length: float = 1900,\n        min_length: float = 1500,\n        n_bubbles: int = 0,\n        smoothness: float = 0.3,\n        bell_accent: float = 0.0,\n        bell_start: float = 300,\n        n_bell_segments: int = 10,\n        forced_diameters: Optional[List[Tuple[float, float, float]]] = None,        \n        sine_shape_n : float = 0.0,\n        sine_shape_y : float = 0.0,\n        enable_cylinder_cone : bool = False,\n        cylinder_cone_z_pos : List[float] = [0.3, 0.7],\n        cylinder_cone_transition_diameter : List[float] = [32, 36],\n        enable_taper : bool = False,\n        taper_start: float = 20,\n        taper_end: float = 50,\n        taper_diameter: float = 20,\n        taper_n_segments: int = 8,\n    ):\n        \"\"\"\n        Args:\n            n_segments: Number of bore segments (excluding endpoints) for the base taper.\n            d0: Mouthpiece (input) diameter in mm.\n            d_bell_min: Minimum bell diameter in mm (genome maps [0,1] to [d_bell_min, d_bell_max]).\n            d_bell_max: Maximum bell diameter in mm.\n            max_length: Maximum bore length in mm.\n            min_length: Minimum bore length in mm.\n            n_bubbles: Number of optional bulge (bubble) features along the bore.\n            smoothness: Fraction of bell size used to scale segment y-offsets (0..1).\n            bell_accent: If > 0, the last bell_start mm of the bore is accentuated by this factor.\n            bell_start: Length (mm) from the bell end over which the bell accent is applied.\n            n_bell_segments: Number of points used to build the accentuated bell curve.\n            forced_diameters: A list of triples [(pos_pct, diam, length), ...] defining \n                geometric constraints along the bore:\n                - pos_pct (float): The longitudinal position expressed as a percentage of \n                the total bore length (0 = mouthpiece, 1 = bell end).\n                - diam (float): The target internal diameter in mm to be enforced \n                at that position.\n                - length (float): The longitudinal distance (mm) over which this diameter \n                should be maintained. If > 0, the code creates a cylindrical section \n                centered at the calculated position.            \n            taper_start: Distance (mm) where the mouthpiece restriction begins.\n            taper_end: Distance (mm) where the bore returns to its natural diameter.\n            taper_diameter: The target internal diameter (mm) of the mouthpiece bottleneck.\n            enable_cylinder_cone: If True, replaces power-law with a cylindrical-to-conical transition.\n            cylinder_cone_z_pos: Min/Max relative range [0, 1] for the transition point.\n            cylinder_cone_transition_diameter: Min/Max range (mm) for the diameter at the transition.\n        \"\"\"\n\n        self.max_length = max_length\n        self.min_length = min_length\n        self.n_segments = n_segments\n        self.d0 = d0\n        self.d_bell_min = d_bell_min\n        self.d_bell_max = d_bell_max\n        self.n_bubbles = n_bubbles\n        self.smoothness = smoothness\n        self.bell_accent = bell_accent\n        self.bell_start = bell_start\n        self.n_bell_segments = n_bell_segments\n        self.forced_constraints = forced_diameters if (forced_diameters is not None and len(forced_diameters) > 0) else []\n        self.sine_shape_n : float = sine_shape_n\n        self.sine_shape_y : float = sine_shape_y\n\n        self.bubble_width = 300\n        self.bubble_height = 40\n        self.geo_offset = 3 + self.n_bubbles * 3\n        genome_length = self.geo_offset + 2 * (n_segments - 1)\n\n        self.n_bubble_segments = 10\n\n        self.enable_cylinder_cone = enable_cylinder_cone\n        self.cylinder_cone_z_pos = cylinder_cone_z_pos\n        self.cylinder_cone_transition_diameter = cylinder_cone_transition_diameter\n\n        if self.enable_cylinder_cone:\n            self.cyliner_cone_genome_offset = genome_length\n            genome_length += 2\n\n        self.enable_taper = enable_taper\n        self.taper_start = taper_start\n        self.taper_end = taper_end\n        self.taper_diameter = taper_diameter\n        self.taper_n_segments = taper_n_segments\n        \n        GeoGenome.__init__(self, n_genes=genome_length)\n\n    def get_properties(self) -> Tuple[float, float, float, np.ndarray, np.ndarray, List]:\n        \"\"\"\n        Decode genome into length, bell size, power, segment offsets, and bubble list.\n\n        Returns:\n            Tuple of (length_mm, bell_size_mm, power, x_genome, y_genome, bubbles).\n            bubbles is a list of (pos, width, height) per bubble.\n        \"\"\"\n        length = self.genome[0] * (self.max_length - self.min_length) + self.min_length\n        bell_size = self.genome[1] * (self.d_bell_max - self.d_bell_min) + self.d_bell_min\n        power = self.genome[2] * 4\n\n        bubbles = []\n        j = 3\n        for i in range(self.n_bubbles):\n            pos = self.bubble_width + self.genome[j] * (length - 2 * self.bubble_width)\n            width = self.bubble_width * (0.2 + self.genome[j + 1]) / 1.2\n            height = (0.2 + self.genome[j + 2]) * self.bubble_height / 1.2\n            j += 3\n            bubbles.append((pos, width, height))\n\n        # FIX: Define exactly where the jitter genes end so we don't \n        # accidentally include the cylinder/cone genes in the x/y jitter arrays.\n        jitter_end = self.geo_offset + 2 * (self.n_segments - 1)\n        \n        jitter_genes = self.genome[self.geo_offset : jitter_end]\n        x_genome = jitter_genes[0::2] # Every even index\n        y_genome = jitter_genes[1::2] # Every odd index\n\n        return length, bell_size, power, x_genome, y_genome, bubbles\n        \n    def apply_mouthpiece_taper(self, x: np.ndarray, y: np.ndarray) -> Tuple[np.ndarray, np.ndarray]:\n        \"\"\"\n        Creates a restricted 'bottleneck' effect:\n        - d0 until taper_start\n        - Smooth transition to taper_diameter\n        - Smooth transition back to main bore by taper_end\n        \"\"\"\n        # Define the key transition points within the taper zone\n        # We'll split the space between start and end into thirds for the sigmoids\n        zone_width = (self.taper_end - self.taper_start) / 3\n        p1 = self.taper_start + zone_width # End of first sigmoid\n        p2 = self.taper_start + 2 * zone_width # Start of second sigmoid\n\n        # 1. Fixed Entry (0 to taper_start)\n        x_0 = np.linspace(0, self.taper_start, 5)\n        y_0 = np.full_like(x_0, self.d0)\n\n        # 2. Inbound Sigmoid (taper_start to p1)\n        x_1 = np.linspace(self.taper_start, p1, self.taper_n_segments)\n        s1 = 1 / (1 + np.exp(-np.linspace(5, -5, self.taper_n_segments))) # Inverted sigmoid\n        y_1 = self.taper_diameter + (self.d0 - self.taper_diameter) * s1\n\n        # 3. The Bottleneck (p1 to p2)\n        x_2 = np.linspace(p1, p2, 5)\n        y_2 = np.full_like(x_2, self.taper_diameter)\n\n        # 4. Outbound Sigmoid (p2 to taper_end)\n        x_3 = np.linspace(p2, self.taper_end, self.n_segments // 2)\n        temp_geo = Geo(list(zip(x, y)))\n        target_d = Geo.diameter_at_x(temp_geo, self.taper_end)\n        s2 = 1 / (1 + np.exp(-np.linspace(-5, 5, len(x_3))))\n        y_3 = self.taper_diameter + (target_d - self.taper_diameter) * s2\n\n        # 5. Combine and Clean\n        mask_after = x > self.taper_end\n        x_new = np.concatenate((x_0, x_1, x_2, x_3, x[mask_after]))\n        y_new = np.concatenate((y_0, y_1, y_2, y_3, y[mask_after]))\n        \n        # Unique/Sorted to prevent Geo errors\n        _, indices = np.unique(x_new, return_index=True)\n        return x_new[indices], y_new[indices]\n\n\n    def force_diameters(self, x, y, length):\n        if len(self.forced_constraints) > 0:\n            # We will use RBF to find the 'deformation' required to hit targets\n            target_pts = []\n            target_diams = []\n            \n            for pos_pct, diam, f_length in self.forced_constraints:\n                center_x = pos_pct * length\n                \n                if f_length > 0:\n                    # To ensure it's a perfect cylinder, we sample multiple points \n                    # along the forced length to \"overpower\" any local jitter.\n                    half_len = f_length / 2\n                    side_pts = np.linspace(center_x - half_len, center_x + half_len, 5)\n                    for p in side_pts:\n                        target_pts.append(p)\n                        target_diams.append(diam)\n                else:\n                    target_pts.append(center_x)\n                    target_diams.append(diam)\n\n            # Create a temporary geometry to see how far off the current \"genetic\" bore is\n            temp_geo = Geo(list(zip(x, y)))\n            f_x = np.array(target_pts)\n            f_d_target = np.array(target_diams)\n            \n            # Calculate the difference (delta) between target and current evolved shape\n            f_d_current = np.array([Geo.diameter_at_x(temp_geo, xi) for xi in f_x])\n            deltas = f_d_target - f_d_current\n            \n            # Anchor mouthpiece and bell (0 delta) so they remain at genetic values\n            all_f_x = np.concatenate([[0], f_x, [length]])\n            all_deltas = np.concatenate([[0], deltas, [0]])\n            \n            # RBF Interpolation with 'thin_plate' creates a smooth 'warp' function\n            # that hits your deltas exactly at the specified points.\n            # Fall back to linear interpolation if matrix is singular (e.g. duplicate/collinear points)\n            try:\n                itp = Rbf(all_f_x, all_deltas, function='thin_plate')\n                y += itp(x)\n            except np.linalg.LinAlgError:\n                y += np.interp(x, all_f_x, all_deltas)\n\n        return x,y\n\n    def create_cylinder_cone_y(self, bell_size: float) -> np.ndarray:\n        \"\"\"\n        Generates a diameter profile that starts cylindrical (up to a genome-defined point)\n        and then opens conically to the bell size.\n        \"\"\"\n        # Linear spacing of segments from 0 to 1\n        z_relative = np.linspace(0, 1, self.n_segments + 1)\n        \n        # Extract genome values for the transition\n        g_pos = self.genome[self.cyliner_cone_genome_offset]\n        g_diam = self.genome[self.cyliner_cone_genome_offset + 1]\n\n        # Map genome to real-world transition values\n        # transition_z: relative position [0..1] along the length\n        z_min, z_max = self.cylinder_cone_z_pos\n        transition_z = g_pos * (z_max - z_min) + z_min\n        \n        # transition_d: diameter at the end of the cylindrical section\n        d_min, d_max = self.cylinder_cone_transition_diameter\n        transition_d = g_diam * (d_max - d_min) + d_min\n\n        y = np.zeros_like(z_relative)\n\n        for i, z in enumerate(z_relative):\n            if z <= transition_z:\n                # Cylindrical/Linear transition from mouthpiece to transition_d\n                # (Allows it to be non-strictly cylindrical if d0 != transition_d)\n                y[i] = self.d0 + (z / transition_z) * (transition_d - self.d0)\n            else:\n                # Conical flare from the transition point to the bell\n                # Calculate progress from transition point to the end (1.0)\n                flare_progress = (z - transition_z) / (1.0 - transition_z)\n                y[i] = transition_d + flare_progress * (bell_size - transition_d)\n        \n        return y\n\n\n    def genome2geo(self) -> Geo:\n        length, bell_size, power, x_genome, y_genome, bubbles = self.get_properties()\n\n        # 1. Generate Base Geometry (Power-law taper)\n        x = np.linspace(0, length, self.n_segments + 1)\n\n        if self.enable_cylinder_cone:\n            y = self.create_cylinder_cone_y(bell_size)\n        else:\n            y = np.power(np.linspace(0, 1, self.n_segments + 1), power)\n            # Linear scale from mouthpiece to bell_size\n            y = y * (bell_size - self.d0) + self.d0\n\n        # Apply genome jitter/offsets\n        shift_x = length / self.n_segments\n        x += np.concatenate(([0], (x_genome - 0.5) * shift_x, [0]))\n        shift_y = (1 - self.smoothness) * bell_size\n        y += np.concatenate(([0], 0.3 * (y_genome - 0.5) * shift_y, [0]))\n\n        # 2. Apply the Mouthpiece Taper\n        if self.enable_taper:\n            x, y = self.apply_mouthpiece_taper(x, y)\n\n        # 2. Apply Bell Accent\n        x, y = self.apply_bell_accent(x, y, length, bell_size)\n\n        # 3. Add Bubbles\n        for bubble in bubbles:\n            # Unpack the tuple: (position, width, height)\n            pos, width, height = bubble\n            x, y = self.make_bubble(x, y, pos, width, height)\n\n        x, y = self.add_sine_shape(x, y)\n        \n        # 4. Force Exact Diameters (RBF)\n        x, y = self.force_diameters(x, y, length)\n\n        # 5. Finalize (Clamp to ensure d_bell_max is respected)\n        # We clamp to bell_size specifically here\n        x, y = self.fix_didge(x, y, self.d0, bell_size)\n        \n        return Geo(list(zip(x, y)))\n\n    def fix_didge(\n        self, x: np.ndarray, y: np.ndarray, d0: float, bellsize: float\n    ) -> Tuple[np.ndarray, np.ndarray]:\n        \"\"\"\n        Clamp bore diameter to [0.9*d0, 1.3*bellsize] to avoid invalid geometry.\n\n        Args:\n            x: Array of x positions along the bore (mm).\n            y: Array of bore diameters at each x (mm).\n            d0: Mouthpiece diameter in mm; minimum allowed is 0.9*d0.\n            bellsize: Bell diameter in mm; maximum allowed is 1.3*bellsize.\n\n        Returns:\n            Tuple (x, y) of arrays with y clamped; x unchanged.\n        \"\"\"\n        mind = d0 * 0.5\n        x, y = x.copy(), y.copy()\n        y[y < mind] = mind\n        y[y > bellsize * 1.3] = bellsize * 1.3\n        return x, y\n\n    def make_bubble(\n        self,\n        x: np.ndarray,\n        y: np.ndarray,\n        pos: float,\n        width: float,\n        height: float,\n    ) -> Tuple[np.ndarray, np.ndarray]:\n        \"\"\"\n        Insert a sinusoidal bulge (bubble) at pos with given width and height.\n\n        The bubble is clamped so it does not extend past the bore ends. Bore diameter\n        inside the bubble is existing diameter plus a half-sine bulge of given height.\n\n        Args:\n            x: Array of x positions along the bore (mm).\n            y: Array of bore diameters at each x (mm).\n            pos: Center x position of the bubble (mm).\n            width: Length of the bubble along the bore (mm).\n            height: Amplitude of the bulge in mm (added to local bore diameter).\n\n        Returns:\n            Tuple (x_new, y_new) of arrays with the segment in [pos-width/2, pos+width/2]\n            replaced by bubble points.\n        \"\"\"\n        bubble_start_x = pos - 0.5 * width\n        bubble_end_x = pos + 0.5 * width\n\n        if bubble_start_x < 20:\n            diff = 20-bubble_start_x\n            bubble_start_x += diff\n            bubble_end_x += diff\n\n        if bubble_end_x > x[-1]:\n            diff = bubble_end_x-x[-1]\n            bubble_start_x -= diff\n            bubble_end_x -= diff\n\n        bubble_x = np.linspace(\n            bubble_start_x, bubble_end_x, self.n_bubble_segments, endpoint=False\n        )\n\n        # Bore diameter at bubble x, plus half-sine bulge\n        geo = Geo(list(zip(x, y)))\n        bubble_y_1 = np.array([Geo.diameter_at_x(geo, xi) for xi in bubble_x])\n        bubble_y_2 = height * np.sin(\n            np.pi * np.arange(self.n_bubble_segments) / self.n_bubble_segments\n        )\n        bubble_y = bubble_y_1 + bubble_y_2\n\n        # Replace segment inside [bubble_start_x, bubble_end_x] with bubble points\n        y = np.concatenate((y[x < bubble_start_x], bubble_y, y[x > bubble_end_x]))\n        x = np.concatenate((x[x < bubble_start_x], bubble_x, x[x > bubble_end_x]))\n        return x, y\n\n    def apply_bell_accent(self, x: np.ndarray, y: np.ndarray, length: float, bell_size: float) -> np.ndarray:\n        \"\"\"\n        Applies a flare to the end of the didgeridoo. \n        If bell_accent is 0, it follows the existing taper.\n        If bell_accent is 1, it adds a sharp parabolic flare.\n        \"\"\"\n        if self.bell_accent <= 0:\n            return x, y\n\n        if self.bell_accent > 1:\n            self.bell_accent = 1\n\n        # insert a segment at bell_start position\n        bell_start = x[-1] - self.bell_start\n        if bell_start < 1:\n            bell_start = 1\n\n        if bell_start not in x:\n            segments = list(zip(x,y))\n            geo = Geo(segments)\n            bell_start_diameter = Geo.diameter_at_x(geo, bell_start)\n            segments.append([bell_start, bell_start_diameter])\n            segments = sorted(segments, key=lambda x:x[0])\n            segments = np.array(segments)\n            x = segments[:,0]\n            y = segments[:,1]\n\n        bell_size_before = y[-1]\n\n        y = (1-0.7*self.bell_accent)*(y-self.d0)\n        y += self.d0\n\n        segments = list(zip(x,y))\n        geo = Geo(segments)\n\n        x_bell = np.linspace(bell_start, length, self.n_bell_segments)\n        y_bell = [Geo.diameter_at_x(geo, _x) for _x in x_bell]\n\n        x_sigmoid = np.linspace(-5, 5., self.n_bell_segments)\n        delta = (bell_size_before-y[-1]) * (1-(1/(1 + np.exp(x_sigmoid)))) # sigmoid function\n        y_bell += delta\n\n        i1 = x<bell_start\n\n        x = np.concatenate((x[i1], x_bell))\n        y = np.concatenate((y[i1], y_bell))\n\n        return x, y\n\n    def add_sine_shape(self, x, y):\n\n        if self.sine_shape_n <= 0 or self.sine_shape_y <= 0:\n            return x, y\n\n        x_sine = 2*self.sine_shape_n*np.pi*x/x.max()\n        y_sine = np.sin(x_sine)\n        y_sine[y_sine<0] = 0\n\n        y += self.sine_shape_y * y_sine\n        return x,y\n", "didgelab/sim/__init__.py": "", "didgelab/sim/tlm_cython.py": "\"\"\"\nCython-backed transmission-line model for didgeridoo acoustics.\n\nUses the compiled _cadsd extension (from _cadsd.pyx) for faster impedance\nspectrum computation. Build with: ``pip install -e .`` from the package root\n(or ``python setup.py build_ext --inplace`` in ``sim/tlm_cython_lib/``).\n\nIf the extension is not built, this module still loads (e.g. for pdoc); using\n``TransmissionLineModelCython`` will raise at runtime.\n\"\"\"\n\ntry:\n    from .tlm_cython_lib._cadsd import create_segments_from_geo, cadsd_Ze\n    _CADSD_AVAILABLE = True\nexcept ImportError:\n    create_segments_from_geo = None  # type: ignore\n    cadsd_Ze = None  # type: ignore\n    _CADSD_AVAILABLE = False\n\nfrom .sim_interface import AcousticSimulationInterface\nfrom ..geo import Geo\nimport numpy as np\n\n\nclass TransmissionLineModelCython(AcousticSimulationInterface):\n    \"\"\"TLM simulator using Cython-compiled CADSD core.\"\"\"\n\n    def get_impedance_spectrum(self, geo: Geo, frequencies: np.array):\n        \"\"\"Return list of impedance magnitudes at each frequency in Hz.\"\"\"\n        if not _CADSD_AVAILABLE:\n            raise ImportError(\n                \"didgelab.sim.tlm_cython_lib._cadsd is not built. \"\n                \"Install the package with 'pip install -e .' from the package root to compile the Cython extension.\"\n            )\n        segments = create_segments_from_geo(geo.geo)\n        impedances = np.array([cadsd_Ze(segments, f) for f in frequencies])\n        return impedances", "didgelab/sim/sim_interface.py": "\"\"\"\nAbstract interface for acoustic simulation backends in DidgeLab.\n\nAny simulator (e.g. TLM Python or Cython) implements get_impedance_spectrum(geo, frequencies).\n\"\"\"\n\nfrom abc import ABC, abstractmethod\nimport numpy as np\n\nfrom ..geo import Geo\n\n\nclass AcousticSimulationInterface(ABC):\n    \"\"\"Interface for computing acoustic impedance spectrum of a didgeridoo geometry.\"\"\"\n\n    @abstractmethod\n    def get_impedance_spectrum(self, geo: Geo, frequencies: np.array) -> np.array:\n        \"\"\"Return impedance values at each frequency in Hz for the given geometry.\"\"\"\n        pass", "didgelab/sim/fem.py": "import numpy as np\nimport skfem as fem\nfrom skfem.helpers import dot, grad\nfrom .sim_interface import AcousticSimulationInterface\nfrom ..geo import Geo\n\nc = 343000.0  # Speed of sound in mm/s\n\ndef fem1d(geo, frequencies):\n\n\n    x_coords = geo[:, 0]\n    diameters = geo[:, 1]\n\n    def get_area(x):\n        d = np.interp(x, x_coords, diameters)\n        return np.pi * (d / 2.0)**2\n\n    # 2. Mesh and Basis\n    mesh = fem.MeshLine(np.linspace(0, x_coords[-1], 600))\n    element = fem.ElementLineP1()\n    basis = fem.Basis(mesh, element)\n\n    # 3. Define Forms\n    def stiffness_fun(u, v, w):\n        return get_area(w.x[0]) * dot(grad(u), grad(v))\n\n    def mass_fun(u, v, w):\n        return get_area(w.x[0]) * u * v\n\n    K = fem.BilinearForm(stiffness_fun).assemble(basis)\n    M = fem.BilinearForm(mass_fun).assemble(basis)\n\n    # 4. Boundary Setup\n    # Bell end: Pressure = 0 (Dirichlet)\n    bell_dof_data = basis.get_dofs(lambda x: np.isclose(x[0], x_coords[-1])).nodal\n    # Extract indices from dictionary if necessary\n    bell_dofs = np.concatenate([v for v in bell_dof_data.values()]) if isinstance(bell_dof_data, dict) else bell_dof_data\n\n    # Mouthpiece: Setup the source vector\n    b_mouth = np.zeros(basis.N)\n\n    # FIXED: Safely extract nodal indices from the Dofs object (handling dict structure)\n    mouth_dof_data = basis.get_dofs(lambda x: np.isclose(x[0], 0)).nodal\n    if isinstance(mouth_dof_data, dict):\n        mouth_indices = np.concatenate([v for v in mouth_dof_data.values()]).astype(int)\n    else:\n        mouth_indices = np.array(mouth_dof_data).astype(int)\n\n    b_mouth[mouth_indices] = 1.0 \n\n    # 5. Frequency Sweep\n    impedance_magnitude = []\n\n    # Add viscothermal damping to prevent infinite peaks and simulate wall friction\n    # damping factor alpha is proportional to sqrt(frequency)\n    for f in frequencies:\n        omega = 2 * np.pi * f\n        k = (omega / c) - 1j * (2e-6 * np.sqrt(f)) \n        k_sq = k**2\n        \n        A = K - k_sq * M\n        \n        # Solve for complex pressure p\n        p = fem.solve(*fem.condense(A, b_mouth, D=bell_dofs))\n        \n        # Input Impedance Z = p_mouth / U_mouth. Since U=1, Z = p[mouth]\n        z_val = p[mouth_indices[0]]\n        impedance_magnitude.append(np.abs(z_val))\n\n    impedance_magnitude = np.array(impedance_magnitude)\n    return impedance_magnitude\n\nclass FiniteElementsModeling1D(AcousticSimulationInterface):\n\n    \"\"\"FiniteElementsModeling1D simulator.\"\"\"\n\n    def get_impedance_spectrum(self, geo: Geo, frequencies: np.array):\n        \n        \"\"\"Return list of impedance magnitudes at each frequency in Hz.\"\"\"\n        impedances = fem1d(np.array(geo.geo), frequencies)\n        return impedances", "didgelab/sim/tlm_python.py": "\"\"\"\nPure-Python transmission-line model (TLM) for didgeridoo acoustics (CADSD-style).\n\nImplements conical/cylindrical segment chain and impedance at the mouthpiece.\nBased on transmission line modeling (Mapes-Riordan) and Frank Geipel's CADSD.\nGeometry is in m; constants: air density p, viscosity n, speed of sound c.\n\"\"\"\n\nimport math\nimport cmath\nimport numpy as np\nimport pandas as pd\nfrom ..geo import Geo\n\nfrom .sim_interface import AcousticSimulationInterface\n\n# Physical constants (float64 preferred but caused issues on some MacOS)\np = np.float64(1.2929)   # air density kg/m³\nn = np.float64(1.708e-5) # dynamic viscosity\nc = np.float64(343.37)   # speed of sound m/s\nPI = np.float64(np.pi)\n\n\nclass Segment:\n    \"\"\"Single conical/cylindrical segment: length L, diameters d0 (input), d1 (output).\"\"\"\n\n    def __init__(self, L, d0, d1):\n        self.L = L\n        self.d0 = d0\n        self.d1 = d1\n\n        self.a0 = PI * d0 * d0 / 4\n        self.a01 = PI * (d0 + d1) * (d0 + d1) / 16\n        self.a1 = PI * d1 * d1 / 4\n        self.phi = math.atan ((d1 - d0) / (2 * L))\n\n        x = (2 * math.sin (self.phi))\n        if x==0:\n            x=1e-20\n        self.l = (d1 - d0) / x\n        self.x1 = d1 / x\n        self.x0 = self.x1 - self.l\n        self.r0 = p * c / self.a0\n\n    @classmethod\n    def create_segments_from_geo(cls, geo):\n        \"\"\"Build list of Segment from geometry (list of [x_mm, d_mm]); converts mm to m.\"\"\"\n\n        segments=[]\n        shape=[[np.float64(x)[0]/1000, np.float64(x)[1]/1000] for x in geo]\n        for i_seg in range(1, len(shape)):\n            seg1=shape[i_seg]\n            seg0=shape[i_seg-1]\n            L=seg1[0]-seg0[0]\n            d0=seg0[1]\n            d1=seg1[1]\n            seg=Segment(L, d0, d1)\n            segments.append(seg)\n        return segments\n\ndef create_segments_from_geo(geo):\n    \"\"\"Convenience wrapper for Segment.create_segments_from_geo.\"\"\"\n    return Segment.create_segments_from_geo(geo)\n\n\ndef ap(w, segments):\n    \"\"\"Chain transfer matrices for angular frequency w; returns 2x2 product matrix.\"\"\"\n    x = [[1, 0], [0, 1]]\n    y=[[0,0], [0,0]]\n    z=[[0,0],[0,0]]\n\n    for t_seg in segments:\n\n        L=t_seg.L\n        d0=t_seg.d0\n        d1=t_seg.d1\n\n        a0 = t_seg.a0\n        a01 = t_seg.a01\n        a1 = t_seg.a1\n        l = t_seg.l\n        x0 = t_seg.x0\n        x1 = t_seg.x1\n        r0 = t_seg.r0\n\n        rvw = math.sqrt (p * w * a01 / (n * PI))\n        kw = w / c\n        Tw =np.complex128(kw * 1.045 / rvw + (kw * (1.0 + 1.045 / rvw))*1j)\n        Zcw = np.complex128(r0 * (1.0 + 0.369 / rvw) - 1j*r0 * 0.369 / rvw)\n\n        ccoshlwl = cmath.cosh(Tw * l)\n        csinhlwl = cmath.sinh(Tw * l)\n        ccoshlwL = cmath.cosh(Tw * L)\n        csinhlwL = cmath.sinh(Tw * L)\n\n        if (d0 != d1):\n            y[0][0] = x1 / x0 * (ccoshlwl - csinhlwl / (Tw * x1))\n            y[0][1] = x0 / x1 * Zcw * csinhlwl\n            y[1][0] = ((x1 / x0 - 1.0 / (Tw * Tw * x0 * x0)) * csinhlwl + Tw * l / ((Tw * x0) * (Tw * x0)) * ccoshlwl) / Zcw\n            y[1][1] = x0 / x1 * (ccoshlwl + csinhlwl / (Tw * x0))\n        else:\n            y[0][0] = ccoshlwL\n            y[0][1] = Zcw * csinhlwL\n            y[1][0] = csinhlwL / Zcw\n            y[1][1] = ccoshlwL\n\n        # dot product\n        z[0][0] = x[0][0] * y[0][0] + x[0][1] * y[1][0]\n        z[0][1] = x[0][0] * y[0][1] + x[0][1] * y[1][1]\n        z[1][0] = x[1][0] * y[0][0] + x[1][1] * y[1][0]\n        z[1][1] = x[1][0] * y[0][1] + x[1][1] * y[1][1]\n\n        x[0][0] = z[0][0]\n        x[0][1] = z[0][1]\n        x[1][0] = z[1][0]\n        x[1][1] = z[1][1]\n    return z\n\n\ndef Za(w, segments):\n    \"\"\"Radiation impedance at the bell (last segment) for angular frequency w.\"\"\"\n    t_seg = segments[-1]\n\n    L = t_seg.L\n    d1 = t_seg.d1\n    a01 = t_seg.a01\n    r0 = t_seg.r0\n\n    rvw = math.sqrt (p * w * a01 / (n * PI))\n    Zcw = np.complex128(r0*(1.0 + 0.369 / rvw) - 1j*r0 * 0.369 / rvw)\n\n    res = 0.5 * Zcw * np.complex128(w * w * d1 * d1 / c / c + 1j*0.6 * L * w * d1 / c)  # from Geipel\n    return res\n\n\ndef cadsd_Ze(segments, f):\n    \"\"\"Input impedance at mouthpiece (magnitude) for frequency f Hz.\"\"\"\n    w = 2.0 * PI * f\n    a = Za(w, segments)\n    b = ap(w, segments)\n    Ze = abs((a * b[0][0] + b[0][1]) / (a * b[1][0] + b[1][1]))\n    return Ze\n\n\ndef geo_fft(geo, gmax, offset):\n    \"\"\"Legacy: build impedance dict and peak/valley arrays; returns fft dict.\"\"\"\n    fft = {\n        \"impedance\": {},\n        \"overblow\": {},\n        \"ground\": {}\n    }\n\n    for key in fft.keys(): \n        fft[key][0]=0\n\n    segments=Segment.create_segments_from_geo(geo)\n    for f in range(1, gmax):\n        fft[\"impedance\"][f] = cadsd_Ze(segments, f)\n        fft[\"overblow\"][f] = 0\n        fft[\"ground\"][f] = 0\n\n\n    # search for peaks and valleys\n    peaks=[0,0]\n    vally=[0,0]\n\n    up=False\n    npeaks=0\n    nvally=0\n\n    freqs=fft[\"impedance\"].keys()\n    for i in range(2, len(freqs)):\n        if fft[\"impedance\"][i] > fft[\"impedance\"][i-1]:\n            if npeaks and not up:\n                vally[nvally]=i-1\n                nvally+=1\n            up=True\n        else:\n            if up:\n                peaks[npeaks] = i-1\n                npeaks+=1\n            up=False \n\n        if nvally>1:\n            break\n\n    if peaks[0]<0:\n        return None\n\n    k = 0.0001\n\n    mem0 = peaks[0]\n    mem0a = peaks[0]\n\n    mem0b = mem0a\n    return fft\n\n\nclass TransmissionLineModelPython(AcousticSimulationInterface):\n    \"\"\"TLM simulator implemented in pure Python (no Cython).\"\"\"\n\n    def get_impedance_spectrum(self, geo: Geo, frequencies: np.array):\n        \"\"\"Return list of impedance magnitudes at each frequency in Hz.\"\"\"\n        segments = Segment.create_segments_from_geo(geo.geo)\n        impedances = np.array([cadsd_Ze(segments, f) for f in frequencies])\n        return impedances", "didgelab/loss/__init__.py": "\"\"\"Loss components and composite loss for evolutionary optimization.\"\"\"\n\nfrom .loss import (\n    LossComponent,\n    FrequencyTuningLoss,\n    QFactorLoss,\n    ModalDensityLoss,\n    HarmonicSplittingLoss,\n    IntegerHarmonicLoss,\n    NearIntegerLoss,\n    StretchedOddLoss,\n    HighInharmonicLoss,\n    ScaleTuningLoss,\n    PeakQuantityLoss,\n    PeakAmplitudeLoss,\n    CompositeTairuaLoss,\n)\nfrom .TairuaLoss import TairuaLoss\n\n__all__ = [\n    \"LossComponent\",\n    \"FrequencyTuningLoss\",\n    \"QFactorLoss\",\n    \"ModalDensityLoss\",\n    \"HarmonicSplittingLoss\",\n    \"IntegerHarmonicLoss\",\n    \"NearIntegerLoss\",\n    \"StretchedOddLoss\",\n    \"HighInharmonicLoss\",\n    \"ScaleTuningLoss\",\n    \"PeakQuantityLoss\",\n    \"PeakAmplitudeLoss\",\n    \"CompositeTairuaLoss\",\n    \"TairuaLoss\",\n]\n", "didgelab/loss/TairuaLoss.py": "\"\"\"\nTairua loss function for evolutionary didgeridoo design.\n\nPenalises deviation of simulated resonances from target frequencies and\nimpedance ratios, with optional scale tuning and bonuses for more/higher peaks.\n\"\"\"\n\nfrom typing import List, Optional\nimport numpy as np\nimport logging\n\nfrom ..evo import LossFunction\nfrom ..acoustical_simulation import acoustical_simulation, get_log_simulation_frequencies\nfrom ..conv import note_to_freq, cent_diff\nfrom scipy.signal import find_peaks\n\n\nclass TairuaLoss(LossFunction):\n    \"\"\"\n    Loss that compares simulated impedance peaks to target frequencies and impedances.\n\n    Targets are specified as parallel lists (freqs, impedances, weights). Loss can\n    include scale-tuning (pull peaks toward a musical scale), and optional terms\n    for encouraging more peaks or higher relative impedance.\n    \"\"\"\n\n    def __init__(\n        self,\n        target_freqs: List[float],\n        target_impedances: List[float],\n        freq_weights: List[float],\n        impedance_weights: List[float],\n        scale_key: Optional[int] = None,\n        scale: Optional[List[int]] = None,\n        scale_weight: Optional[float] = None,\n        higher_peaks: bool = False,\n        higher_peaks_weight: float = 1.0,\n        more_peaks: bool = False,\n        more_peaks_weight: float = 1.0,\n        max_error: float = 5.0,\n    ):\n        \"\"\"\n        Args:\n            target_freqs: Target resonance frequencies in Hz (one per peak).\n            target_impedances: Target relative impedance (0..1) per peak; use < 0 to ignore.\n            freq_weights: Weight per target for frequency error in the total loss.\n            impedance_weights: Weight per target for impedance error in the total loss.\n            scale_key: Base note number for scale (e.g. A4=0); used only if scale and scale_weight set.\n            scale: List of scale intervals in semitones (e.g. [0,2,4,5,7,9,11] for major).\n            scale_weight: Weight for scale-tuning term (pull peaks toward scale).\n            higher_peaks: If True, add a term that rewards higher mean relative impedance.\n            higher_peaks_weight: Weight for the higher_peaks term.\n            more_peaks: If True, add a term that rewards more detected peaks.\n            more_peaks_weight: Weight for the more_peaks term.\n            max_error: Maximum frequency error in cents for simulation grid (log spacing).\n        \"\"\"\n        # Target tuning: stored in log2 for consistent cent-based comparison\n        self.target_freqs: List[float] = np.log2(np.asarray(target_freqs))\n        self.target_impedances: List[float] = list(target_impedances)\n        self.freq_weights: List[float] = list(freq_weights)\n        self.impedance_weights: List[float] = list(impedance_weights)\n        self.max_error: float = max_error\n        # Simulation frequency grid (log-spaced for tuning precision)\n        self.freqs: np.ndarray = get_log_simulation_frequencies(1, 1000, max_error)\n\n        # Scale tuning: scale_key = base note number, scale = list of intervals in semitones\n        self.scale_key: Optional[int] = scale_key\n        self.scale: Optional[List[int]] = scale\n        self.scale_weight: Optional[float] = scale_weight\n\n        # Optional loss terms\n        self.higher_peaks: bool = higher_peaks\n        self.higher_peaks_weight: float = higher_peaks_weight\n        self.more_peaks: bool = more_peaks\n        self.more_peaks_weight: float = more_peaks_weight\n\n        self.tune_to_scale: bool = False\n        if scale is not None and scale_key is not None and scale_weight is not None:\n            self.scale_freqs: np.ndarray = self.compute_scale_frequencies()\n            self.tune_to_scale = True\n\n    def compute_scale_frequencies(self) -> np.ndarray:\n        \"\"\"\n        Build list of scale frequencies (in log2) up to 1000 Hz from scale_key + scale intervals.\n\n        Returns:\n            Array of log2(frequency) for all scale notes from scale_key and scale up to 1000 Hz.\n        \"\"\"\n        scale_freqs = []\n        freq = -1\n        i = 0\n        while freq < 1000:\n            octave = np.floor(i / len(self.scale))\n            step_in_scale = i % len(self.scale)\n            note = self.scale_key + 12 * octave + self.scale[step_in_scale]\n            freq = note_to_freq(note)\n            i += 1\n            scale_freqs.append(freq)\n        return np.log2(np.array(scale_freqs))\n\n    def loss(self, shape):\n        \"\"\"\n        Evaluate loss for a genome (shape): tuning + optional scale/more_peaks/higher_peaks.\n\n        Converts genome to geometry, runs acoustical simulation, finds impedance peaks,\n        then sums weighted frequency and impedance errors vs targets. Caches result on\n        `shape.loss` if present.\n\n        Args:\n            shape: Genome-like object with `genome2geo()` and optional cached `loss` attribute.\n\n        Returns:\n            Dict with at least \"total\", \"freq_loss\", \"imp_loss\"; optionally \"scale_losses\",\n            \"more_peaks_loss\", \"higher_peaks_loss\". On exception, returns dict with very large \"total\".\n        \"\"\"\n        if getattr(shape, \"loss\", None) is not None:\n            return shape.loss\n        try:\n            geo = shape.genome2geo()\n            impedances = acoustical_simulation(geo, self.freqs)\n            peak_indices = find_peaks(impedances)[0]\n\n            # Peak frequencies and relative impedances (normalised by max)\n            peak_freqs = np.array([self.freqs[i] for i in peak_indices])\n            peak_freqs_log = np.log2(peak_freqs)\n            peak_impedances = np.array([impedances[i] for i in peak_indices]) / impedances.max()\n\n            # Deviation from target tuning table (each target matched to nearest peak)\n            freq_loss = []\n            imp_loss = []\n            imp_weights_used = []\n            for (target_freq, target_impedance), imp_w in zip(\n                zip(self.target_freqs, self.target_impedances), self.impedance_weights\n            ):\n                i = np.argmin(np.abs(peak_freqs_log - target_freq))\n                peak_freq_log = peak_freqs_log[i]\n                peak_imp = peak_impedances[i]\n                # cent_diff expects linear freq; we have log2, so use 2^log = peak_freq\n                diff_cents = cent_diff(\n                    np.power(2.0, target_freq),\n                    np.power(2.0, peak_freq_log),\n                )\n                freq_loss.append(np.abs(diff_cents / 600.0))\n\n                if target_impedance >= 0:\n                    imp_loss.append(np.abs(peak_imp - target_impedance))\n                    imp_weights_used.append(imp_w)\n\n            freq_loss = np.sum(np.array(freq_loss) * self.freq_weights)\n            imp_loss = (\n                np.sum(np.array(imp_loss) * np.array(imp_weights_used))\n                if imp_loss else 0.0\n            )\n\n            losses = {\"freq_loss\": freq_loss, \"imp_loss\": imp_loss}\n\n            # Extra term: pull peaks toward scale frequencies\n            if self.tune_to_scale:\n                nearest_scale_ix = [np.argmin(np.abs(self.scale_freqs - f)) for f in peak_freqs_log]\n                diffs = np.abs(peak_freqs_log - self.scale_freqs[nearest_scale_ix])\n                scale_losses = diffs.sum() * self.scale_weight / max(len(diffs), 1) * 10\n                losses[\"scale_losses\"] = 0.1*scale_losses\n\n            if self.more_peaks:\n                losses[\"more_peaks_loss\"] = self.more_peaks_weight / max(len(peak_indices), 1)\n\n            if self.higher_peaks:\n                losses[\"higher_peaks_loss\"] = self.higher_peaks_weight / np.mean(peak_impedances)\n\n            losses[\"total\"] = sum(losses.values())\n            return losses\n\n        except Exception as e:\n            logging.exception(e)\n            return {\n                \"total\": 100_000_000,\n                \"tuning_losses\": np.array([-1] * len(self.target_freqs)),\n                \"scale_losses\": np.array([-1] * len(self.target_freqs)),\n            }\n", "didgelab/loss/loss.py": "from typing import List, Optional, Dict, Any, Tuple\nimport numpy as np\nimport logging\nfrom abc import ABC, abstractmethod\nfrom scipy.signal import find_peaks\nfrom ..acoustical_simulation import acoustical_simulation, get_log_simulation_frequencies\n\n# Assuming these are available in your environment\n# from ..evo import LossFunction\n# from ..acoustical_simulation import acoustical_simulation, get_log_simulation_frequencies\n# from ..conv import note_to_freq, cent_diff\n\nclass LossComponent(ABC):\n    \"\"\"\n    Abstract base for individual loss terms.\n    Each component evaluates a specific psychoacoustic or physical property.\n    \"\"\"\n    \n    @abstractmethod\n    def calculate(self, peak_freqs_log: np.ndarray, peak_impedances: np.ndarray, \n                  all_freqs: np.ndarray, all_impedances: np.ndarray, peak_indices: np.ndarray) -> float:\n        \"\"\"Computes the loss value based on spectral data.\"\"\"\n        pass\n\n    @abstractmethod\n    def get_formula(self) -> Tuple[str, List[str]]:\n        \"\"\"\n        Returns a tuple:\n        - [0]: LaTeX formula string\n        - [1]: List of strings explaining each symbol used\n        \"\"\"\n        pass\n\n# --- Loss Components ---\n\nclass FrequencyTuningLoss(LossComponent):\n    \"\"\"\n    PITCH & AMPLITUDE TUNING: \n    Aligns peaks to specific frequencies and optionally specific impedance magnitudes.\n    Normalization: Frequency error is divided by 600 cents. Impedance error is absolute.\n    \"\"\"\n    def __init__(self, \n                 target_freqs_log: np.ndarray, \n                 target_impedances: np.ndarray, \n                 weights: List[float]):\n        \"\"\"\n        Args:\n            target_freqs_log: Array of target frequencies in log2.\n            target_impedances: Array of target normalized impedances [0, 1]. \n                               Set to -1 to ignore impedance loss for that peak.\n            weights: Per-peak weights for the total loss calculation.\n        \"\"\"\n        self.target_freqs_log = target_freqs_log\n        self.target_impedances = target_impedances\n        self.weights = weights\n\n    def calculate(self, peak_freqs_log, peak_impedances, all_freqs, all_impedances, peak_indices):\n        total_loss = 0.0\n        \n        for i, target_f_log in enumerate(self.target_freqs_log):\n            # 1. Find the closest actual peak to this target frequency\n            idx = np.argmin(np.abs(peak_freqs_log - target_f_log))\n            actual_f_log = peak_freqs_log[idx]\n            actual_amp = peak_impedances[idx]\n            \n            # 2. Calculate Frequency Loss (Normalized Cents)\n            # 600 cents (a tritone) = 1.0 base loss unit\n            freq_error_cents = 1200 * np.abs(target_f_log - actual_f_log)\n            freq_loss = freq_error_cents / 600.0\n            \n            # 3. Calculate Impedance Loss (if target != -1)\n            amp_loss = 0.0\n            if self.target_impedances[i] != -1:\n                amp_loss = np.abs(self.target_impedances[i] - actual_amp)\n            \n            # 4. Combine with per-peak weight\n            total_loss += (freq_loss + amp_loss) * self.weights[i]\n            \n        return total_loss\n\n    def get_formula(self) -> Tuple[str, List[str]]:\n        formula = r\"L_{tune} = \\sum_{i=1}^{N} w_i \\cdot \\left( \\frac{|1200 \\Delta \\log_2 f_i|}{600} + [Z_{target,i} \\neq -1] \\cdot |Z_{target,i} - Z_{peak,i}| \\right)\"\n        explanations = [\n            \"Δ log2 f_i: For each target i, the system finds the closest detected peak to that target; Δ log2 f_i = log2(f_target,i) − log2(f_peak,i) is the pitch error (positive when the peak is below the target).\",\n            \"w_i: Weight for the i-th target peak.\",\n            \"1200: Converts log2 ratio to cents.\",\n            \"600: Normalization factor (6 semitones) so 1 tritone ≈ 1.0 loss.\",\n            \"Z_target,i: Target normalized impedance (0.0 to 1.0) for peak i.\",\n            \"Z_peak,i: Normalized impedance of the closest detected peak to target i.\",\n            \"[Z ≠ −1]: Indicator; impedance loss is zero if target is −1 (ignore).\"\n        ]\n        return formula, explanations\n\nclass QFactorLoss(LossComponent):\n    \"\"\"\n    Q-FACTOR: Controls the sharpness/damping of resonances. \n    High Q creates a piercing tone; Low Q creates a warm, woody tone.\n    \"\"\"\n    def __init__(self, target_q: float, weight: float):\n        self.target_q = target_q\n        self.weight = weight\n\n    def calculate(self, peak_freqs_log, peak_impedances, all_freqs, all_impedances, peak_indices):\n        qs = []\n        for p_idx in peak_indices:\n            f_center = all_freqs[p_idx]\n            target_amp = all_impedances[p_idx] / np.sqrt(2)\n            \n            left_side = all_impedances[:p_idx]\n            f_low = all_freqs[np.argmin(np.abs(left_side - target_amp))]\n            \n            right_side = all_impedances[p_idx:]\n            f_high = all_freqs[p_idx + np.argmin(np.abs(right_side - target_amp))]\n            \n            qs.append(f_center / (f_high - f_low + 1e-9))\n            \n        avg_q = np.mean(qs) if qs else 0.0\n        return np.abs(avg_q - self.target_q) * self.weight\n\n    def get_formula(self) -> Tuple[str, List[str]]:\n        formula = r\"L_Q = w \\cdot | \\left( \\frac{1}{N} \\sum_{i=1}^{N} \\frac{f_{c,i}}{\\Delta f_{i,-3dB}} \\right) - Q_{target} |\"\n        explanations = [\n            \"w: Global weight for Q-factor consistency.\",\n            \"f_c: Center frequency of the peak.\",\n            \"Δf_-3dB: Bandwidth at half-power (Full Width at Half Maximum).\",\n            \"Q_target: The desired quality factor.\",\n            \"N: Number of peaks analyzed.\"\n        ]\n        return formula, explanations\n\nclass ModalDensityLoss(LossComponent):\n    \"\"\"\n    SHIMMERING CHORUS: Rewards the proximity of multiple peaks to create interference beats.\n    \"\"\"\n    def __init__(self, cluster_range_cents: float, weight: float):\n        self.cluster_range_cents = cluster_range_cents\n        self.weight = weight\n\n    def calculate(self, peak_freqs_log, peak_impedances, all_freqs, all_impedances, peak_indices):\n        if len(peak_freqs_log) < 2: return self.weight\n        diffs = np.diff(peak_freqs_log) * 1200\n        shimmer_score = np.sum(np.exp(-np.square(diffs - self.cluster_range_cents) / 100.0))\n        return self.weight / (1.0 + shimmer_score)\n\n    def get_formula(self) -> Tuple[str, List[str]]:\n        formula = r\"L_{shimmer} = \\frac{w}{1 + \\sum e^{-\\frac{(\\Delta c - C)^2}{\\sigma^2}}}\"\n        explanations = [\n            \"Δc: Cent distance between adjacent peaks.\",\n            \"C: Target cluster range (sweet spot for beating).\",\n            \"σ: Smoothing factor (bandwidth of the shimmer reward).\",\n            \"w: Importance of the shimmering texture.\"\n        ]\n        return formula, explanations\n\nclass HarmonicSplittingLoss(LossComponent):\n    \"\"\"\n    NODAL TURBUL
